<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CONSIA GLOBAL TRAVEL ECOSYSTEM</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#050913;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
border-bottom:1px solid #1a2135;
}

#logo{
font-size:22px;
letter-spacing:5px;
}

#container{
max-width:1500px;
margin:auto;
padding:40px 20px;
}

h1{
font-size:46px;
}

p{
color:#aab3c5;
}

.searchBox{
margin-top:30px;
background:#101626;
border:1px solid #1a2135;
border-radius:18px;
padding:25px;
display:grid;
grid-template-columns:repeat(6,1fr);
gap:15px;
}

input,select{
padding:14px;
border-radius:10px;
border:none;
background:#0d1424;
color:white;
}

button{
padding:14px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

.section{
margin-top:60px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:25px;
}

.card{
background:#101626;
border:1px solid #1a2135;
border-radius:14px;
padding:20px;
}

.price{
font-size:24px;
color:#3b82f6;
margin-top:10px;
}

.buy{
margin-top:10px;
background:#10b981;
}

.panel{
margin-top:60px;
background:#101626;
border:1px solid #1a2135;
border-radius:14px;
padding:25px;
}

.network{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:20px;
}

.node{
background:#0d1424;
padding:20px;
border-radius:10px;
border:1px solid #1a2135;
text-align:center;
}

.agent{
margin-top:25px;
padding:20px;
border-radius:12px;
background:#0d1424;
border:1px solid #1a2135;
}

</style>

</head>

<body>

<header>

<div id="logo">CONSIA TRAVEL ECOSYSTEM</div>

<button onclick="home()">HOME</button>

</header>

<div id="container">

<h1>CONSIA Global Travel Ecosystem</h1>

<p>El ecosistema global de viajes impulsado por inteligencia artificial.</p>

<div class="searchBox">

<select id="type">
<option value="flights">Vuelos</option>
<option value="hotels">Hoteles</option>
<option value="tours">Tours</option>
<option value="packages">Paquetes</option>
</select>

<input id="origin" placeholder="Origen">

<input id="destination" placeholder="Destino">

<input id="date" type="date">

<input id="returnDate" type="date">

<button onclick="search()">Buscar</button>

</div>

<div id="results" class="grid"></div>

<div class="panel">

<h2>Red global de proveedores</h2>

<div class="network">

<div class="node">Aerolíneas</div>
<div class="node">Hoteles</div>
<div class="node">Tours</div>
<div class="node">Transfers</div>

<div class="node">Agencias</div>
<div class="node">Experiencias</div>
<div class="node">Cruceros</div>
<div class="node">Seguros</div>

</div>

</div>

<div class="panel">

<h2>CONSIA Travel AI Agent</h2>

<div class="agent">

<textarea id="agentPrompt" style="width:100%;height:120px;background:#050913;border:none;color:white;padding:15px;border-radius:10px;" placeholder="Ej: organizame un viaje 12 días por Japón con hoteles 5 estrellas y excursiones"></textarea>

<button style="margin-top:15px" onclick="runAgent()">Planificar viaje con IA</button>

<div id="agentResult" style="margin-top:20px"></div>

</div>

</div>

</div>

<script>

function home(){
window.location="/"
}

async function search(){

const type=document.getElementById("type").value
const origin=document.getElementById("origin").value
const destination=document.getElementById("destination").value
const date=document.getElementById("date").value
const returnDate=document.getElementById("returnDate").value

const box=document.getElementById("results")

box.innerHTML="CONSIA buscando en la red global..."

try{

const res=await fetch("https://api.consia.world/travel/ecosystem",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
type,
origin,
destination,
date,
returnDate
})

})

const data=await res.json()

box.innerHTML=""

data.results.forEach(r=>{

box.innerHTML+=`

<div class="card">

<h3>${r.title}</h3>

<p>${r.provider}</p>

<div class="price">$${r.price}</div>

<button class="buy" onclick="book('${r.link}')">Reservar</button>

</div>

`

})

}catch(e){

box.innerHTML="Error generando resultados"

}

}

async function runAgent(){

const prompt=document.getElementById("agentPrompt").value

const box=document.getElementById("agentResult")

box.innerHTML="CONSIA Travel AI analizando..."

try{

const res=await fetch("https://api.consia.world/travel/agent",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({prompt})

})

const data=await res.json()

box.innerHTML="<p>"+data.plan+"</p>"

}catch(e){

box.innerHTML="Error generando plan"

}

}

function book(link){
window.open(link,"_blank")
}

</script>

</body>

</html>
