<!doctype html>
<html lang="es">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CONSIA</title>

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.header{
display:flex;
align-items:center;
gap:20px;
margin-bottom:30px;
}

.logo{
width:60px;
height:60px;
border-radius:14px;
background:linear-gradient(135deg,#4c6fff,#7aa6ff);
display:flex;
align-items:center;
justify-content:center;
font-size:28px;
font-weight:bold;
}

.title{
font-size:38px;
letter-spacing:6px;
}

.subtitle{
opacity:.6;
margin-top:6px;
}

.chatbtn{
margin-top:25px;
width:100%;
padding:18px;
font-size:18px;
border:none;
border-radius:14px;
background:linear-gradient(90deg,#4c6fff,#7aa6ff);
color:white;
cursor:pointer;
}

.section{
margin-top:35px;
opacity:.7;
letter-spacing:3px;
font-size:13px;
}

.module{
margin-top:14px;
padding:20px;
background:#0b1225;
border-radius:14px;
cursor:pointer;
border:1px solid #1c2747;
}

.module:hover{
background:#0f1836;
}

.footer{
margin-top:40px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.badge{
padding:8px 14px;
border-radius:20px;
background:#0b1225;
border:1px solid #1c2747;
font-size:12px;
}

.online{
color:#4cff8f;
}

</head>

<body>

<div class="logo">
C
</div>

</div>

</div>

Nuevo chat
</button>

<div class="section">
MODULES
</div>

<div class="module" onclick="openPage('dashboard.html')">
Dashboard
</div>

<div class="module" onclick="openPage('apps.html')">
AI App Store
</div>

<div class="module" onclick="openPage('marketplace.html')">
Marketplace
</div>

<div class="module" onclick="openPage('os.html')">

</div>

<div class="module" onclick="openPage('agents.html')">

<div class="module" onclick="openPage('wallet.html')">

<div class="module" onclick="openPage('autopilot.html')">

<div class="module" onclick="openPage('global-memory.html')">
Global Memory
</div>

Command Center
</div>

<div class="section">
HISTORIAL
</div>

<div class="footer">

<div class="badge online">
● CONSIA ONLINE
</div>

<div class="badge">
Mode: CHAT
</div>

<div class="badge">
Apps
</div>

<div class="badge">
Marketplace
</div>

<div class="badge">
Dashboard
</div>

</div>

}
