<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CONSIA</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

#sidebar{
width:260px;
background:#060912;
border-right:1px solid #1a2135;
display:flex;
flex-direction:column;
}

#logo{
padding:20px;
font-weight:bold;
letter-spacing:5px;
text-align:center;
border-bottom:1px solid #1a2135;
}

#newChat{
margin:15px;
padding:10px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

#history{
flex:1;
overflow-y:auto;
padding:10px;
}

.chatItem{
padding:8px;
cursor:pointer;
font-size:13px;
opacity:.8;
}

.chatItem:hover{
opacity:1;
}

#main{
flex:1;
display:flex;
flex-direction:column;
}

#mode{
display:flex;
justify-content:center;
gap:20px;
padding:12px;
border-bottom:1px solid #1a2135;
}

.modeBtn{
padding:6px 14px;
border-radius:20px;
background:#141b2e;
cursor:pointer;
font-size:13px;
}

.modeBtn.active{
background:#2563eb;
}

#chat{
flex:1;
overflow-y:auto;
padding:30px;
max-width:900px;
margin:auto;
width:100%;
}

.message{
margin-bottom:18px;
line-height:1.6;
}

.user{
color:#9ecbff;
}

.ai{
color:white;
}

#inputArea{
padding:20px;
background:#070a13;
display:flex;
gap:10px;
justify-content:center;
border-top:1px solid #1a2135;
}

#prompt{
width:600px;
max-width:80%;
padding:14px;
border-radius:10px;
border:none;
font-size:16px;
background:#101626;
color:white;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="sidebar">

<div id="logo">CONSIA</div>

<button id="newChat" onclick="newChat()">Nuevo chat</button>

<div id="history"></div>

</div>

<div id="main">

<div id="mode">

<div class="modeBtn active" onclick="setMode('chat')" id="chatBtn">CHAT</div>
<div class="modeBtn" onclick="setMode('image')" id="imageBtn">IMAGE</div>

</div>

<div id="chat"></div>

<div id="inputArea">

<input id="prompt" placeholder="Habla con CONSIA..." />

<button onclick="send()">Enviar</button>

</div>

</div>

<script>

let mode="chat"

let conversations=JSON.parse(localStorage.getItem("consiaChats")||"[]")
let currentChat=[]

function save(){

localStorage.setItem("consiaChats",JSON.stringify(conversations))

}

function newChat(){

currentChat=[]
document.getElementById("chat").innerHTML=""

}

function loadHistory(){

const history=document.getElementById("history")

history.innerHTML=""

conversations.forEach((c,i)=>{

const div=document.createElement("div")

div.className="chatItem"

div.innerText=c[0]?.text||"Chat "+i

div.onclick=()=>{

currentChat=c

renderChat()

}

history.appendChild(div)

})

}

function renderChat(){

const chat=document.getElementById("chat")

chat.innerHTML=""

currentChat.forEach(m=>{

addMessage(m.type,m.text,false)

})

}

function setMode(m){

mode=m

document.querySelectorAll(".modeBtn")
.forEach(b=>b.classList.remove("active"))

document.getElementById(m+"Btn").classList.add("active")

}

const chat=document.getElementById("chat")

function addMessage(type,text,saveMsg=true){

const div=document.createElement("div")

div.className="message "+type

if(type==="user"){

div.innerHTML="<strong>Tú:</strong> "+text

}else{

div.innerHTML="<strong>CONSIA:</strong> "+text

}

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

if(saveMsg){

currentChat.push({type,text})

}

}

async function send(){

const input=document.getElementById("prompt")

const text=input.value.trim()

if(!text) return

addMessage("user",text)

input.value=""

let endpoint="https://api.consia.world/ai/chat"

if(mode==="image"){

endpoint="https://api.consia.world/ai/image"

}

const res=await fetch(endpoint,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
user_id:"web",
message:text
})

})

const data=await res.json()

if(mode==="image" && data.image){

addMessage("ai","<img src='"+data.image+"' width='350'>")

}else{

streamText(data.answer)

}

conversations.push(currentChat)

save()

loadHistory()

}

function streamText(text){

let i=0

let output=""

const div=document.createElement("div")

div.className="message ai"

div.innerHTML="<strong>CONSIA:</strong> "

chat.appendChild(div)

const interval=setInterval(()=>{

output+=text[i]

div.innerHTML="<strong>CONSIA:</strong> "+output

i++

if(i>=text.length){

clearInterval(interval)

}

chat.scrollTop=chat.scrollHeight

},15)

}

document.getElementById("prompt")
.addEventListener("keypress",e=>{

if(e.key==="Enter") send()

})

loadHistory()

</script>

</body>
</html>
