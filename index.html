<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA Command Center</title>

<style>

body{
background:#05070c;
color:white;
font-family:Arial,Helvetica,sans-serif;
margin:0;
padding:0;
}

header{
padding:20px;
background:#0a0f1f;
border-bottom:1px solid #1a2b4a;
display:flex;
justify-content:space-between;
align-items:center;
}

h1{
margin:0;
font-size:20px;
letter-spacing:2px;
}

.container{
padding:30px;
max-width:1200px;
margin:auto;
}

.card{
background:#0c1429;
padding:20px;
border-radius:10px;
margin-bottom:20px;
border:1px solid #1b2b50;
}

button{
background:#2a63ff;
color:white;
border:none;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#1b4fd1;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:10px;
background:#0b1326;
border:1px solid #20305c;
color:white;
border-radius:6px;
}

#response{
white-space:pre-wrap;
font-family:monospace;
}

.status{
font-size:14px;
margin-top:10px;
color:#8aa4ff;
}

</style>
</head>

<body>

<header>

<h1>CONSIA COMMAND CENTER</h1>

<div id="systemStatus">Checking system...</div>

</header>

<div class="container">

<div class="card">

<h2>System Status</h2>

<button onclick="loadStatus()">Refresh</button>

<pre id="status"></pre>

</div>


<div class="card">

<h2>CONSIA AI Chat</h2>

<textarea id="prompt" rows="4" placeholder="Ask CONSIA..."></textarea>

<button onclick="sendChat()">Send</button>

<pre id="response"></pre>

</div>


<div class="card">

<h2>Agent Swarm</h2>

<input id="agentTask" placeholder="Task for agents">

<button onclick="runAgents()">Run Agents</button>

<pre id="agentOutput"></pre>

</div>


<div class="card">

<h2>Autopilot</h2>

<input id="objective" placeholder="Business objective">

<button onclick="startAutopilot()">Start Autopilot</button>

<pre id="autopilotOutput"></pre>

</div>

</div>

<script>

const API="https://api.consia.world"

async function loadStatus(){

const r=await fetch(API+"/v1/status")

const data=await r.json()

document.getElementById("status").textContent=
JSON.stringify(data,null,2)

document.getElementById("systemStatus").textContent=
data.system+" ONLINE"

}

async function sendChat(){

const prompt=document.getElementById("prompt").value

const r=await fetch(API+"/v1/ai/chat",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({prompt})

})

const data=await r.json()

document.getElementById("response").textContent=
JSON.stringify(data,null,2)

}

async function runAgents(){

const task=document.getElementById("agentTask").value

const r=await fetch(API+"/v1/agents/run",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({task})

})

const data=await r.json()

document.getElementById("agentOutput").textContent=
JSON.stringify(data,null,2)

}

async function startAutopilot(){

const objective=document.getElementById("objective").value

const r=await fetch(API+"/v1/autopilot/start",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({objective})

})

const data=await r.json()

document.getElementById("autopilotOutput").textContent=
JSON.stringify(data,null,2)

}

loadStatus()

</script>

</body>
</html>
