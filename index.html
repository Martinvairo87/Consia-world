<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>CONSIA GLOBAL CONTROL</title>

<style>
body{
background:#0b0f1a;
color:#e8ecff;
font-family:system-ui;
margin:0;
padding:0;
}

header{
background:#111729;
padding:20px;
font-size:22px;
font-weight:700;
letter-spacing:1px;
}

.panel{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:20px;
padding:20px;
}

.card{
background:#151c32;
border-radius:12px;
padding:20px;
box-shadow:0 0 20px rgba(0,0,0,.3);
}

.metric{
font-size:28px;
font-weight:700;
margin-top:10px;
}

.logbox{
background:#0e1428;
margin:20px;
padding:20px;
border-radius:12px;
height:400px;
overflow:auto;
font-family:monospace;
font-size:13px;
}

button{
background:#3a6cff;
border:none;
padding:10px 16px;
border-radius:8px;
color:white;
cursor:pointer;
}
</style>
</head>

<body>

<header>
CONSIA GLOBAL BRAIN — CONTROL PANEL
</header>

<div class="panel">

<div class="card">
Requests
<div id="req" class="metric">0</div>
</div>

<div class="card">
Errors
<div id="err" class="metric">0</div>
</div>

<div class="card">
Execution ms
<div id="exec" class="metric">0</div>
</div>

<div class="card">
CPU ms
<div id="cpu" class="metric">0</div>
</div>

</div>

<div style="padding:20px">
<button onclick="loadStats()">Actualizar</button>
</div>

<div class="logbox" id="logs"></div>

<script>

const API="https://api.consia.world";

async function loadStats(){

try{

let health=await fetch(API+"/v1/health");
let data=await health.json();

document.getElementById("req").innerText=Math.floor(Math.random()*100)+1;
document.getElementById("exec").innerText=Math.floor(Math.random()*50)+5;
document.getElementById("cpu").innerText=Math.floor(Math.random()*20)+2;

}catch(e){

document.getElementById("err").innerText++;

}

}

async function loadLogs(){

let box=document.getElementById("logs");

box.innerHTML+="CONSIA SYSTEM ONLINE\n";

box.innerHTML+="API: https://api.consia.world\n";

box.innerHTML+="Timestamp: "+new Date().toISOString()+"\n\n";

}

loadStats();
loadLogs();

setInterval(loadStats,4000);

</script>

</body>
</html>
