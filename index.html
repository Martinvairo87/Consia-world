<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CONSIA</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<style>

body{
margin:0;
font-family:system-ui;
background:#0a0f1e;
color:white;
display:flex;
height:100vh;
overflow:hidden
}

#sidebar{
width:260px;
background:#0f1630;
padding:20px;
box-sizing:border-box
}

#chat{
flex:1;
display:flex;
flex-direction:column
}

#messages{
flex:1;
overflow:auto;
padding:30px
}

.msg{
margin-bottom:20px;
max-width:700px
}

.user{
color:#5fa8ff
}

.ai{
color:#00ffb3
}

#inputbar{
display:flex;
padding:20px;
background:#0f1630
}

#input{
flex:1;
padding:14px;
border-radius:8px;
border:none;
font-size:16px
}

button{
margin-left:10px;
padding:12px 16px;
border:none;
border-radius:8px;
background:#3b82ff;
color:white;
cursor:pointer
}

#avatar{
position:absolute;
right:20px;
bottom:20px;
width:300px;
height:300px
}

#users{
font-size:14px;
margin-top:20px
}

</style>
</head>

<body>

<div id="sidebar">

<h2>CONSIA</h2>

<div id="users">
Usuarios online: <span id="online">0</span>
</div>

<br>

<button onclick="startVoice()">🎤 Voz</button>

<br><br>

<button onclick="openStripe()">Stripe</button>

<button onclick="openPaddle()">Paddle</button>

</div>

<div id="chat">

<div id="messages"></div>

<div id="inputbar">

<input id="input" placeholder="Preguntar a CONSIA">

<button onclick="send()">Enviar</button>

</div>

</div>

<div id="avatar"></div>

<script>

const API="https://api.consia.world"

function add(text,cls){

const m=document.createElement("div")
m.className="msg "+cls
m.innerText=text

document.getElementById("messages").appendChild(m)

}

async function send(){

const input=document.getElementById("input")
const msg=input.value

add(msg,"user")

input.value=""

const r=await fetch(API+"/v1/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:msg})
})

const data=await r.json()

add(data.answer,"ai")

}

function startVoice(){

const rec=new webkitSpeechRecognition()

rec.lang="es"

rec.onresult=e=>{

document.getElementById("input").value=e.results[0][0].transcript

send()

}

rec.start()

}

function openStripe(){

window.open("https://stripe.com")

}

function openPaddle(){

window.open("https://paddle.com")

}

function updateOnline(){

document.getElementById("online").innerText=Math.floor(Math.random()*1200)+1

}

setInterval(updateOnline,3000)

updateOnline()

</script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(
75,
300/300,
0.1,
1000
)

const renderer=new THREE.WebGLRenderer({alpha:true})

renderer.setSize(300,300)

document.getElementById("avatar").appendChild(renderer.domElement)

const geo=new THREE.SphereGeometry(1,32,32)

const mat=new THREE.MeshBasicMaterial({
wireframe:true,
color:0x00ffcc
})

const avatar=new THREE.Mesh(geo,mat)

scene.add(avatar)

camera.position.z=3

function animate(){

requestAnimationFrame(animate)

avatar.rotation.y+=0.01
avatar.rotation.x+=0.005

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
