<!DOCTYPE html>
<html>
<head>
  <title>CONSIA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: #fff;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    .msg {
      margin-bottom: 10px;
    }
    .user { color: #00ffcc; }
    .ai { color: #ffffff; }
    #input {
      display: flex;
      border-top: 1px solid #333;
    }
    input {
      flex: 1;
      padding: 15px;
      border: none;
      outline: none;
      font-size: 16px;
    }
    button {
      padding: 15px;
      background: #00ffcc;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div id="chat"></div>

<div id="input">
  <input id="msg" placeholder="Escribí..." />
  <button onclick="send()">Enviar</button>
</div>

<script>
async function send() {
  const msg = document.getElementById("msg").value;
  if (!msg) return;

  const chat = document.getElementById("chat");
  chat.innerHTML += `<div class="msg user">Vos: ${msg}</div>`;

  document.getElementById("msg").value = "";

  const res = await fetch("https://api.consia.world/v1/chat", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      message: msg
    })
  });

  const data = await res.json();

  chat.innerHTML += `<div class="msg ai">CONSIA: ${data.response}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
