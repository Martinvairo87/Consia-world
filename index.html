<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CONSIA</title>

<style>
body {
  margin: 0;
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
header {
  padding: 20px;
  text-align: center;
  font-size: 24px;
  font-weight: 600;
}
#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.message {
  margin-bottom: 15px;
  line-height: 1.5;
}
.user { color: #4ea1ff; }
.bot { color: #00ffcc; }
footer {
  display: flex;
  padding: 10px;
  border-top: 1px solid #222;
}
input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
  background: #111;
  border: none;
  color: white;
}
button {
  padding: 12px 20px;
  background: #00ffcc;
  border: none;
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<header>CONSIA</header>

<div id="chat"></div>

<footer>
  <input id="input" placeholder="Escribe tu mensaje..." />
  <button onclick="send()">Enviar</button>
</footer>

<script>
const API_URL = "https://api.consia.world/ask";

async function send() {
  const input = document.getElementById("input");
  const chat = document.getElementById("chat");

  const message = input.value.trim();
  if (!message) return;

  chat.innerHTML += `<div class="message user">Tú: ${message}</div>`;
  input.value = "";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    const data = await res.json();

    if (data.ok) {
      chat.innerHTML += `<div class="message bot">CONSIA: ${data.answer}</div>`;
    } else {
      chat.innerHTML += `<div class="message bot">Error: ${data.error}</div>`;
    }

  } catch (e) {
    chat.innerHTML += `<div class="message bot">Error conectando con API</div>`;
  }

  chat.scrollTop = chat.scrollHeight;
}

document.getElementById("input").addEventListener("keypress", function(e) {
  if (e.key === "Enter") send();
});
</script>

</body>
</html>
