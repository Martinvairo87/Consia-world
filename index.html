<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CONSIA</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<style>

body{
margin:0;
background:#0a0f1e;
font-family:system-ui;
color:white;
display:flex;
height:100vh
}

#sidebar{
width:280px;
background:#111731;
padding:20px
}

#main{
flex:1;
display:flex;
flex-direction:column
}

#messages{
flex:1;
overflow:auto;
padding:30px
}

.msg{margin-bottom:16px}

.user{color:#5fa8ff}

.ai{color:#00ffb3}

#inputbar{
display:flex;
padding:16px;
background:#111731
}

#input{
flex:1;
padding:14px;
border-radius:8px;
border:none
}

button{
margin-left:10px;
padding:12px;
border:none;
border-radius:8px;
background:#3b82ff;
color:white
}

#avatar{
position:absolute;
right:20px;
bottom:20px;
width:300px;
height:300px
}

#admin{
position:absolute;
top:20px;
right:20px;
background:#111731;
padding:20px;
border-radius:10px;
display:none
}

</style>

</head>

<body>

<div id="sidebar">

<h2>CONSIA</h2>

<div>

<input id="email" placeholder="email"><br><br>

<input id="password" type="password" placeholder="password"><br><br>

<button onclick="register()">Register</button>

<button onclick="login()">Login</button>

</div>

<br>

<button onclick="voice()">🎤 Voz</button>

<button onclick="openMarketplace()">Marketplace</button>

<button onclick="toggleAdmin()">Admin</button>

</div>

<div id="main">

<div id="messages"></div>

<div id="inputbar">

<input id="input" placeholder="preguntar a CONSIA">

<button onclick="send()">Enviar</button>

</div>

</div>

<div id="avatar"></div>

<div id="admin">

<h3>Panel Admin</h3>

<div id="stats"></div>

</div>

<script>

const API="https://api.consia.world"

let token=null
let user=null

function add(text,cls){

const m=document.createElement("div")
m.className="msg "+cls
m.innerText=text

document.getElementById("messages").appendChild(m)

}

async function register(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const r=await fetch(API+"/v1/auth/register",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
})

const d=await r.json()

add("usuario creado "+d.user_id,"ai")

}

async function login(){

const email=document.getElementById("email").value
const password=document.getElementById("password").value

const r=await fetch(API+"/v1/auth/login",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email,password})
})

const d=await r.json()

token=d.token

add("login ok","ai")

}

async function send(){

const msg=document.getElementById("input").value

add(msg,"user")

document.getElementById("input").value=""

const r=await fetch(API+"/v1/chat",{
method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},
body:JSON.stringify({message:msg})
})

const d=await r.json()

add(d.answer,"ai")

await saveMemory(msg,d.answer)

}

async function saveMemory(q,a){

await fetch(API+"/v1/memory/save",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id:user,
text:q+" "+a
})
})

}

function voice(){

const rec=new webkitSpeechRecognition()

rec.lang="es"

rec.onresult=e=>{

document.getElementById("input").value=e.results[0][0].transcript

send()

}

rec.start()

}

function openMarketplace(){

window.open(API+"/v1/marketplace")

}

async function toggleAdmin(){

const p=document.getElementById("admin")

p.style.display=p.style.display==="none"?"block":"none"

const r=await fetch(API+"/v1/admin/stats")

const d=await r.json()

document.getElementById("stats").innerText=JSON.stringify(d,null,2)

}

</script>

<script>

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(75,1,0.1,1000)

const renderer=new THREE.WebGLRenderer({alpha:true})

renderer.setSize(300,300)

document.getElementById("avatar").appendChild(renderer.domElement)

const geo=new THREE.SphereGeometry(1,64,64)

const mat=new THREE.MeshBasicMaterial({
wireframe:true,
color:0x00ffcc
})

const avatar=new THREE.Mesh(geo,mat)

scene.add(avatar)

camera.position.z=3

function animate(){

requestAnimationFrame(animate)

avatar.rotation.y+=0.01
avatar.rotation.x+=0.005

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
