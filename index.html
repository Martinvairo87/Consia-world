<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CONSIA</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0b0f1a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:20px;
text-align:center;
font-size:28px;
letter-spacing:6px;
font-weight:bold;
}

#chat{
flex:1;
overflow-y:auto;
padding:30px;
max-width:900px;
margin:auto;
width:100%;
}

.message{
margin-bottom:20px;
line-height:1.5;
}

.user{
color:#9ecbff;
}

.ai{
color:#ffffff;
}

#inputArea{
padding:20px;
background:#070a13;
display:flex;
gap:10px;
justify-content:center;
}

#prompt{
width:600px;
max-width:80%;
padding:14px;
border-radius:10px;
border:none;
font-size:16px;
background:#101626;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.core{
width:90px;
height:90px;
border-radius:50%;
margin:auto;
margin-top:40px;
margin-bottom:20px;
background:radial-gradient(circle,#3b82f6,#1e3a8a);
box-shadow:0 0 40px #3b82f6;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
letter-spacing:2px;
}

.tools{
text-align:center;
margin-bottom:20px;
font-size:14px;
opacity:0.7;
}

</style>
</head>

<body>

<header>CONSIA</header>

<div class="core">AI</div>

<div class="tools">
CHAT • IMAGE • VOICE • TOOLS
</div>

<div id="chat"></div>

<div id="inputArea">

<input id="prompt" placeholder="Habla con CONSIA..." />

<button onclick="send()">Enviar</button>

</div>

<script>

const chat = document.getElementById("chat")

async function send(){

const input = document.getElementById("prompt")
const text = input.value.trim()

if(!text) return

addMessage("user",text)

input.value=""

const res = await fetch(
"https://api.consia.world/ai/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id:"web",
message:text
})
}
)

const data = await res.json()

addMessage("ai",data.answer)

}

function addMessage(type,text){

const div=document.createElement("div")
div.className="message "+type

if(type==="user"){
div.innerHTML="<strong>Tú:</strong> "+text
}else{
div.innerHTML="<strong>CONSIA:</strong> "+text
}

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

document.getElementById("prompt")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){
send()
}

})

</script>

</body>
</html>
