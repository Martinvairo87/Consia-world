<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CONSIA</title>

<style>

body{
background:black;
color:white;
font-family:Arial;
text-align:center;
margin-top:150px;
}

button{
padding:20px;
font-size:20px;
border-radius:10px;
border:none;
background:#00c3ff;
color:white;
cursor:pointer;
}

#console{
margin-top:40px;
font-size:14px;
opacity:0.8;
line-height:1.6;
}

</style>

</head>

<body>

<h1>CONSIA</h1>

<button onclick="owner()">Entrar con Face ID</button>

<div id="console"></div>

<script>

async function owner(){

document.getElementById("console").innerHTML="Iniciando OWNER MODE..."

try{

let r=await fetch("https://api.consia.world/owner/one-tap")

let j=await r.json()

document.getElementById("console").innerHTML=
"OWNER ACTIVE<br>"+
"KEY ROTATION<br>"+
"SESSION CLEAN<br>"+
"CONSIA CORE BOOTING..."

boot()

}catch(e){

document.getElementById("console").innerHTML="Error conectando con CONSIA API"

}

}

async function boot(){

try{

await fetch("https://api.consia.world/status")

setTimeout(()=>{

document.getElementById("console").innerHTML+=
"<br><br>CONSIA CORE ACTIVE"

},1000)

}catch(e){

document.getElementById("console").innerHTML+="<br>Error iniciando CORE"

}

}

</script>

</body>
</html>
