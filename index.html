<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CONSIA WORLD</title>

<style>

body{
background:#05070c;
color:white;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto;
margin:0;
}

header{
padding:20px;
border-bottom:1px solid #222;
display:flex;
justify-content:space-between;
align-items:center;
}

.brand{
display:flex;
gap:12px;
align-items:center;
}

.orb{
width:36px;
height:36px;
border-radius:50%;
background:linear-gradient(135deg,#5ee7ff,#8b5cf6);
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.console{
background:black;
border-radius:12px;
padding:20px;
min-height:200px;
font-family:monospace;
overflow:auto;
}

textarea{
width:100%;
height:80px;
margin-top:10px;
background:#111;
border:1px solid #333;
color:white;
border-radius:10px;
padding:12px;
}

button{
background:#5ee7ff;
border:none;
padding:12px 16px;
border-radius:10px;
cursor:pointer;
margin-top:10px;
}

.quick{
margin-top:30px;
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
}

.card{
background:#111;
padding:15px;
border-radius:12px;
cursor:pointer;
}

.lock{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:#020408;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
}

.pin{
padding:12px;
border-radius:10px;
border:1px solid #444;
background:#111;
color:white;
text-align:center;
font-size:20px;
}

</style>

</head>

<body>

<div id="lock" class="lock">

<h2>OWNER SECURITY</h2>

<input id="pin" class="pin" placeholder="PIN OWNER">

<button onclick="unlock()">Entrar</button>

<button onclick="faceLogin()">Face ID</button>

<button onclick="demo()">Demo</button>

</div>

<header>

<div class="brand">
<div class="orb"></div>
<div>CONSIA WORLD</div>
</div>

<div id="state">CORE ONLINE</div>

</header>

<div class="container">

<h2>CONSIA SYSTEM CONSOLE</h2>

<div id="console" class="console"></div>

<textarea id="input" placeholder="Escribí una orden"></textarea>

<button onclick="send()">Enviar</button>

<div class="quick">

<div class="card" onclick="quick('Crear estrategia global para CONSIA')">
Strategic Engine
</div>

<div class="card" onclick="quick('Ejecutar plan de expansión')">
Execution Engine
</div>

<div class="card" onclick="quick('Organizar archivos Manglar')">
File Engine
</div>

<div class="card" onclick="quick('Activar agentes de análisis')">
Agent Swarm
</div>

</div>

</div>

<script>

const API="https://api.consia.world/v1/chat"
const PIN="1111"

let memory=[]
let agents=["research_agent","analysis_agent","execution_agent"]

function log(t){

const c=document.getElementById("console")

c.innerHTML+="<br>"+t

c.scrollTop=c.scrollHeight

}

function unlock(){

let p=document.getElementById("pin").value

if(p===PIN){

document.getElementById("lock").style.display="none"

log("Sesión OWNER iniciada")

}else{

alert("PIN incorrecto")

}

}

function demo(){

document.getElementById("lock").style.display="none"

log("Modo DEMO")

}

async function faceLogin(){

try{

const challenge=new Uint8Array(32)

crypto.getRandomValues(challenge)

await navigator.credentials.get({

publicKey:{challenge}

})

unlock()

}catch{

alert("Face ID cancelado")

}

}

function detectEngine(p){

p=p.toLowerCase()

if(p.includes("estrateg")) return "strategic"

if(p.includes("plan")) return "strategic"

if(p.includes("ejecut")) return "execution"

if(p.includes("archivo")) return "files"

if(p.includes("organizar")) return "files"

if(p.includes("agente")) return "agents"

return "brain"

}

function fallback(prompt){

let engine=detectEngine(prompt)

if(engine==="strategic"){

return{

engine,

answer:"Strategic Engine activo",

steps:["definir objetivo","analizar recursos","plan de ejecución"]

}

}

if(engine==="execution"){

return{

engine,

answer:"Execution Engine activo",

steps:["analizar orden","convertir en acciones","ejecutar"]

}

}

if(engine==="files"){

return{

engine,

answer:"File Engine activo",

status:"organización preparada"

}

}

if(engine==="agents"){

return{

engine,

agents

}

}

return{

engine:"brain",

answer:"CONSIA BRAIN analizando "+prompt

}

}

async function send(){

let prompt=document.getElementById("input").value

if(!prompt) return

log("OWNER > "+prompt)

document.getElementById("input").value=""

try{

let r=await fetch(API,{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({prompt})

})

let data=await r.json()

render(data)

}catch{

render(fallback(prompt))

}

}

function render(data){

if(data.answer) log("CONSIA > "+data.answer)

if(data.steps) log("STEPS > "+data.steps.join(", "))

if(data.agents) log("AGENTS > "+data.agents.join(", "))

memory.push(data)

}

function quick(p){

document.getElementById("input").value=p

send()

}

log("CONSIA WORLD iniciado")
log("Brain router activo")
log("Memory local activa")
log("Agents preparados")
log("File engine preparado")

</script>

</body>
</html>
