<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CONSIA</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0b0f1a;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
padding:18px;
text-align:center;
font-size:26px;
letter-spacing:6px;
font-weight:bold;
border-bottom:1px solid #1a2135;
}

#mode{
display:flex;
justify-content:center;
gap:20px;
padding:12px;
border-bottom:1px solid #1a2135;
}

.modeBtn{
padding:6px 14px;
border-radius:20px;
background:#141b2e;
cursor:pointer;
font-size:13px;
}

.modeBtn.active{
background:#2563eb;
}

#chat{
flex:1;
overflow-y:auto;
padding:25px;
max-width:900px;
margin:auto;
width:100%;
}

.message{
margin-bottom:18px;
line-height:1.6;
}

.user{
color:#9ecbff;
}

.ai{
color:#ffffff;
}

#inputArea{
padding:18px;
background:#070a13;
display:flex;
gap:10px;
justify-content:center;
border-top:1px solid #1a2135;
}

#prompt{
width:600px;
max-width:80%;
padding:14px;
border-radius:10px;
border:none;
font-size:16px;
background:#101626;
color:white;
}

button{
padding:12px 18px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.core{
width:80px;
height:80px;
border-radius:50%;
margin:auto;
margin-top:30px;
margin-bottom:15px;
background:radial-gradient(circle,#3b82f6,#1e3a8a);
box-shadow:0 0 30px #3b82f6;
display:flex;
align-items:center;
justify-content:center;
font-weight:bold;
letter-spacing:2px;
}

</style>

</head>

<body>

<header>CONSIA</header>

<div class="core">AI</div>

<div id="mode">

<div class="modeBtn active" onclick="setMode('chat')" id="chatBtn">CHAT</div>
<div class="modeBtn" onclick="setMode('image')" id="imageBtn">IMAGE</div>
<div class="modeBtn" onclick="setMode('voice')" id="voiceBtn">VOICE</div>

</div>

<div id="chat"></div>

<div id="inputArea">

<input id="prompt" placeholder="Habla con CONSIA..." />

<button onclick="send()">Enviar</button>

</div>

<script>

let mode="chat"

function setMode(m){

mode=m

document.querySelectorAll(".modeBtn")
.forEach(b=>b.classList.remove("active"))

document.getElementById(m+"Btn").classList.add("active")

}

const chat=document.getElementById("chat")

function addMessage(type,text){

const div=document.createElement("div")

div.className="message "+type

if(type==="user"){

div.innerHTML="<strong>Tú:</strong> "+text

}else{

div.innerHTML="<strong>CONSIA:</strong> "+text

}

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

async function send(){

const input=document.getElementById("prompt")
const text=input.value.trim()

if(!text) return

addMessage("user",text)

input.value=""

let endpoint="https://api.consia.world/ai/chat"

if(mode==="image"){

endpoint="https://api.consia.world/ai/image"

}

const res=await fetch(endpoint,{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

user_id:"web",

message:text

})

})

const data=await res.json()

if(mode==="image" && data.image){

addMessage("ai","<img src='"+data.image+"' width='300'>")

}else{

streamText(data.answer)

}

}

function streamText(text){

let i=0
let output=""

const div=document.createElement("div")
div.className="message ai"
div.innerHTML="<strong>CONSIA:</strong> "

chat.appendChild(div)

const interval=setInterval(()=>{

output+=text[i]

div.innerHTML="<strong>CONSIA:</strong> "+output

i++

if(i>=text.length){

clearInterval(interval)

}

chat.scrollTop=chat.scrollHeight

},15)

}

document.getElementById("prompt")
.addEventListener("keypress",function(e){

if(e.key==="Enter"){

send()

}

})

</script>

</body>
</html>
