<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CONSIA AI App Store</title>
<style>

body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

header{
padding:20px;
text-align:center;
font-size:28px;
letter-spacing:6px;
border-bottom:1px solid #1a2135;
}

#apps{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
padding:30px;
max-width:1200px;
margin:auto;
}

.card{
background:#101626;
border-radius:12px;
padding:20px;
text-align:center;
}

.card h3{
margin-top:0;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
margin-top:10px;
}

</style>
</head>
<body>
<header>CONSIA AI APP STORE</header>
<div id="apps"></div>
<script>

const apps=[

{
name:"AI Chat",
desc:"Conversación inteligente con IA",
run:"chat"
},

{
name:"Image Generator",
desc:"Genera imágenes con IA",
run:"image"
},

{
name:"Voice Assistant",
desc:"Habla con CONSIA",
run:"voice"
},

{
name:"Document AI",
desc:"Analiza documentos",
run:"doc"
},

{
name:"Marketing AI",
desc:"Crea campañas y textos",
run:"marketing"
},

{
name:"Code AI",
desc:"Genera código",
run:"code"
}

]

const container=document.getElementById("apps")

apps.forEach(a=>{

const div=document.createElement("div")

div.className="card"

div.innerHTML=`

<h3>${a.name}</h3>
<p>${a.desc}</p>
<button onclick="runApp('${a.run}')">Open</button>

`

container.appendChild(div)

})

function runApp(app){

if(app==="chat"){

window.location="https://consia.world"

}

if(app==="image"){

alert("Image generator ready")

}

if(app==="voice"){

alert("Voice assistant ready")

}

if(app==="doc"){

alert("Document AI ready")

}

if(app==="marketing"){

alert("Marketing AI ready")

}

if(app==="code"){

alert("Code AI ready")

}

}

</script>
</body>
</html>
:::
