<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CONSIA TRAVEL SUPER AGENT</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#050913;
color:white;
}

header{
padding:20px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #1a2135;
}

#logo{
font-size:20px;
letter-spacing:6px;
}

#container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

h1{
font-size:44px;
}

textarea{

width:100%;
height:130px;
padding:16px;
border-radius:10px;
border:none;
background:#0d1424;
color:white;
font-size:16px;

}

button{

margin-top:15px;
padding:14px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;

}

.section{

margin-top:40px;

}

.card{

background:#101626;
border:1px solid #1a2135;
border-radius:12px;
padding:20px;
margin-top:15px;

display:flex;
justify-content:space-between;
align-items:center;

}

.price{

font-size:22px;
color:#3b82f6;

}

.book{

background:#10b981;

}

#map{

width:100%;
height:400px;
margin-top:30px;
border-radius:12px;
border:1px solid #1a2135;

}

</style>

</head>

<body>

<header>

<div id="logo">CONSIA TRAVEL</div>

<button onclick="home()">HOME</button>

</header>

<div id="container">

<h1>CONSIA Travel Super Agent</h1>

<p>Describe tu viaje y CONSIA crea todo el itinerario automáticamente.</p>

<textarea id="prompt" placeholder="Ej: quiero viajar desde Buenos Aires a París 10 días en junio con hotel céntrico y excursiones importantes..."></textarea>

<button onclick="planTrip()">Crear viaje</button>

<div id="results"></div>

<div id="map"></div>

</div>

<script>

function home(){
window.location="/"
}

async function planTrip(){

const prompt=document.getElementById("prompt").value
const box=document.getElementById("results")

box.innerHTML="CONSIA creando tu viaje..."

try{

const res=await fetch("https://api.consia.world/travel/super-agent",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
prompt
})

})

const data=await res.json()

renderTrip(data)

}catch(e){

box.innerHTML="Error generando viaje"

}

}

function renderTrip(data){

const box=document.getElementById("results")

box.innerHTML=""

if(data.itinerary){

box.innerHTML+=`<div class="section"><h2>Itinerario sugerido</h2><p>${data.itinerary}</p></div>`

}

if(data.flights){

box.innerHTML+=`<div class="section"><h2>Vuelos</h2></div>`

data.flights.forEach(f=>{

box.innerHTML+=`

<div class="card">

<div>

<h3>${f.title}</h3>

<p>${f.description || ""}</p>

</div>

<div>

<div class="price">$${f.price}</div>

<button class="book" onclick="book('${f.link}')">Reservar</button>

</div>

</div>

`

})

}

if(data.hotels){

box.innerHTML+=`<div class="section"><h2>Hoteles</h2></div>`

data.hotels.forEach(h=>{

box.innerHTML+=`

<div class="card">

<div>

<h3>${h.title}</h3>

<p>${h.description || ""}</p>

</div>

<div>

<div class="price">$${h.price}</div>

<button class="book" onclick="book('${h.link}')">Reservar</button>

</div>

</div>

`

})

}

if(data.tours){

box.innerHTML+=`<div class="section"><h2>Tours</h2></div>`

data.tours.forEach(t=>{

box.innerHTML+=`

<div class="card">

<div>

<h3>${t.title}</h3>

<p>${t.description || ""}</p>

</div>

<div>

<div class="price">$${t.price}</div>

<button class="book" onclick="book('${t.link}')">Reservar</button>

</div>

</div>

`

})

}

if(data.map){

document.getElementById("map").innerHTML=data.map

}

}

function book(link){

window.open(link,"_blank")

}

</script>

</body>

</html>
