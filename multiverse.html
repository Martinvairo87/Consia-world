<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>CONSIA MULTIVERSE</title>

<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
background:#000;
color:#00ffff;
font-family:Arial;
overflow:hidden;
}

#title{
position:absolute;
top:40px;
left:50%;
transform:translateX(-50%);
padding:10px 30px;
background:#041a22;
border:1px solid #00ffff55;
letter-spacing:2px;
}

#panel{
position:absolute;
top:120px;
left:30px;
width:260px;
}

.box{
border:1px solid #00ffff33;
padding:12px;
margin-bottom:10px;
background:#020b11;
}

button{
background:#022;
border:1px solid #00ffff55;
color:#00ffff;
padding:6px 10px;
cursor:pointer;
}

#chat{
position:absolute;
right:30px;
bottom:30px;
width:320px;
background:#020b11;
border:1px solid #00ffff44;
padding:12px;
}

#log{
height:200px;
overflow:auto;
font-size:14px;
margin-bottom:10px;
}

input{
width:100%;
background:#000;
color:#00ffff;
border:1px solid #00ffff33;
padding:8px;
}

canvas{
display:block;
}

</style>

</head>


<body>

<div id="title">
CONSIA MULTIVERSE READY
</div>


<div id="panel">

<div class="box">
<b>SYSTEM</b>
<div id="system"></div>
</div>

<div class="box">
<b>AGENTS</b>
<div id="agents"></div>
</div>

<div class="box">
<b>AUTOPILOT</b><br>
<button onclick="runAutopilot()">RUN</button>
</div>

</div>



<div id="chat">

<div id="log"></div>

<input id="input" placeholder="habla con CONSIA">

</div>



<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

const API="https://api.consia.world"

async function loadSystem(){

const r=await fetch(API)
const j=await r.json()

document.getElementById("system").innerHTML=

"CORE: "+j.core+"<br>"+
"CHAT: "+j.chat+"<br>"+
"AGENTS: "+j.agents+"<br>"+
"VECTOR: "+j.vector

}



async function loadAgents(){

const r=await fetch(API+"/v1/agents")
const j=await r.json()

document.getElementById("agents").innerHTML=
j.agents.length+" agents"

}



async function runAutopilot(){

const r=await fetch(API+"/v1/autopilot/run")
const j=await r.json()

addLog("AUTOPILOT jobs: "+j.jobs)

}



document.getElementById("input").addEventListener("keypress",async e=>{

if(e.key==="Enter"){

const msg=e.target.value
e.target.value=""

addLog("YOU: "+msg)

const r=await fetch(API+"/v1/chat",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})

})

const j=await r.json()

addLog("CONSIA: "+j.answer)

}

})



function addLog(t){

const log=document.getElementById("log")

log.innerHTML+=t+"<br>"
log.scrollTop=log.scrollHeight

}



const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(

60,
window.innerWidth/window.innerHeight,
0.1,
1000

)

const renderer=new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)



camera.position.z=8



const geometry=new THREE.IcosahedronGeometry(3,2)

const material=new THREE.MeshBasicMaterial({

wireframe:true,
color:0x00ffff

})

const core=new THREE.Mesh(geometry,material)

scene.add(core)



const geometry2=new THREE.SphereGeometry(5,32,32)

const material2=new THREE.MeshBasicMaterial({

wireframe:true,
color:0x004444

})

const shell=new THREE.Mesh(geometry2,material2)

scene.add(shell)



function animate(){

requestAnimationFrame(animate)

core.rotation.y+=0.004
core.rotation.x+=0.002

shell.rotation.y-=0.001

renderer.render(scene,camera)

}

animate()



loadSystem()
loadAgents()

</script>

</body>
</html>
