<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CONSIA Travel</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#070b14;
color:white;
}

header{
padding:20px;
border-bottom:1px solid #1a2135;
display:flex;
justify-content:space-between;
align-items:center;
}

#logo{
font-size:20px;
letter-spacing:5px;
}

#container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

p{
opacity:.7;
}

.searchBox{
background:#101626;
border:1px solid #1a2135;
border-radius:16px;
padding:20px;
margin-top:30px;
}

input,select{

width:100%;
padding:14px;
border-radius:8px;
border:none;
margin-top:10px;
background:#0d1424;
color:white;

}

button{

margin-top:15px;
padding:14px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;

}

.results{

margin-top:40px;

}

.card{

background:#101626;
border:1px solid #1a2135;
border-radius:12px;
padding:20px;
margin-bottom:20px;

}

.price{

font-size:24px;
color:#3b82f6;

}

.book{

background:#10b981;
margin-top:10px;

}

</style>

</head>

<body>

<header>

<div id="logo">CONSIA TRAVEL</div>

<div>

<button onclick="goHome()">HOME</button>

</div>

</header>

<div id="container">

<h1>Buscar vuelos, hoteles y tours</h1>

<p>CONSIA encuentra las mejores opciones en todo el mundo.</p>

<div class="searchBox">

<select id="type">

<option value="flights">Vuelos</option>
<option value="hotels">Hoteles</option>
<option value="tours">Tours</option>

</select>

<input id="origin" placeholder="Origen / Ciudad salida">

<input id="destination" placeholder="Destino">

<input id="date" type="date">

<button onclick="searchTravel()">Buscar</button>

</div>

<div id="results" class="results"></div>

</div>

<script>

function goHome(){

window.location="/"

}

async function searchTravel(){

const type=document.getElementById("type").value
const origin=document.getElementById("origin").value
const destination=document.getElementById("destination").value
const date=document.getElementById("date").value

const resultsBox=document.getElementById("results")

resultsBox.innerHTML="Buscando..."

try{

const res=await fetch("https://api.consia.world/travel/search",{

method:"POST",

headers:{

"Content-Type":"application/json"

},

body:JSON.stringify({

type,
origin,
destination,
date

})

})

const data=await res.json()

renderResults(data.results)

}catch(e){

resultsBox.innerHTML="Error buscando resultados"

}

}

function renderResults(results){

const box=document.getElementById("results")

box.innerHTML=""

if(!results || results.length===0){

box.innerHTML="No se encontraron resultados"

return

}

results.forEach(item=>{

const div=document.createElement("div")

div.className="card"

div.innerHTML=`

<h3>${item.title}</h3>

<p>${item.description || ""}</p>

<div class="price">$${item.price}</div>

<button class="book" onclick="book('${item.link}')">Reservar</button>

`

box.appendChild(div)

})

}

function book(link){

window.open(link,"_blank")

}

</script>

</body>

</html>
