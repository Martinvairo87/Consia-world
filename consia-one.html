<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CONSIA ONE</title>

<style>
body{
background:#0b0f1a;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
}

#core{
width:120px;
height:120px;
border-radius:60px;
background:radial-gradient(circle,#3b82f6,#1e40af);
display:flex;
align-items:center;
justify-content:center;
margin-bottom:30px;
box-shadow:0 0 40px #3b82f6;
}

input{
width:400px;
padding:15px;
border-radius:10px;
border:none;
font-size:16px;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
font-size:16px;
}
</style>
</head>

<body>

<div id="core">CONSIA</div>

<input id="prompt" placeholder="Habla con CONSIA..." />

<button onclick="chat()">Enviar</button>

<p id="response"></p>

<script>

async function chat(){

const prompt=document.getElementById("prompt").value

const res = await fetch(
"https://api.consia.world/ai/chat",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id:"web",
message:prompt
})
}
)

const data = await res.json()

document.getElementById("response").innerText =
data.answer

}

</script>

</body>
</html>
