<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>CONSIA GLOBAL</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
margin:0;
font-family:Arial;
background:#020812;
color:#00f7ff;
}

header{
background:#031c26;
padding:20px;
font-size:22px;
letter-spacing:2px;
}

#container{
display:flex;
height:calc(100vh - 70px);
}

#left{
width:260px;
background:#041923;
padding:20px;
}

#main{
flex:1;
padding:20px;
}

button{
background:#062c36;
border:1px solid #00f7ff44;
color:#00f7ff;
padding:10px;
margin-top:10px;
cursor:pointer;
width:100%;
}

input{
width:100%;
padding:10px;
background:#000;
color:#00f7ff;
border:1px solid #00f7ff33;
margin-top:10px;
}

#chat{
height:300px;
overflow:auto;
border:1px solid #00f7ff33;
padding:10px;
margin-bottom:10px;
}

.agent{
font-size:13px;
margin-bottom:4px;
}

</style>

</head>

<body>

<header>
CONSIA GLOBAL NETWORK
</header>

<div id="container">

<div id="left">

<h3>Cuenta</h3>

<input id="email" placeholder="email">

<button onclick="createUser()">Crear cuenta</button>

<h3>Proyecto</h3>

<input id="idea" placeholder="idea">

<button onclick="createProject()">Crear proyecto</button>

<h3>Marketplace</h3>

<input id="agentName" placeholder="nombre agente">

<input id="agentDesc" placeholder="descripcion">

<button onclick="publishAgent()">Publicar agente</button>

</div>

<div id="main">

<h2>Chat CONSIA</h2>

<div id="chat"></div>

<input id="msg" placeholder="mensaje a CONSIA">

<button onclick="send()">Enviar</button>

<h2>Agentes disponibles</h2>

<div id="agents"></div>

</div>

</div>

<script>

const API="https://api.consia.world"

function log(text){

const chat=document.getElementById("chat")

chat.innerHTML+=text+"<br>"

chat.scrollTop=chat.scrollHeight

}



async function send(){

const msg=document.getElementById("msg").value

document.getElementById("msg").value=""

log("<b>YOU:</b> "+msg)

const r=await fetch(API+"/v1/chat",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})

})

const j=await r.json()

log("<b>CONSIA:</b> "+j.answer)

}



async function createUser(){

const email=document.getElementById("email").value

const r=await fetch(API+"/v1/network/user/create",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({email})

})

const j=await r.json()

log("Usuario creado: "+j.user.id)

}



async function createProject(){

const idea=document.getElementById("idea").value

const r=await fetch(API+"/v1/project/create",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({idea})

})

const j=await r.json()

log("Proyecto creado: "+j.project.id)

}



async function publishAgent(){

const name=document.getElementById("agentName").value
const description=document.getElementById("agentDesc").value

const r=await fetch(API+"/v1/network/agent/publish",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

name,
description,
price:10,
creator:"user"

})

})

const j=await r.json()

log("Agente publicado: "+j.agent.id)

}



async function loadAgents(){

const r=await fetch(API+"/v1/agents")
const j=await r.json()

const box=document.getElementById("agents")

j.agents.forEach(a=>{

const div=document.createElement("div")
div.className="agent"
div.innerText=a

box.appendChild(div)

})

}



loadAgents()

</script>

</body>
</html>
