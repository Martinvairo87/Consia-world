<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CONSIA CONTROL CENTER</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
margin:0;
background:#000;
color:#00f7ff;
font-family:Arial;
overflow:hidden;
}

canvas{
position:absolute;
top:0;
left:0;
}

#panel{
position:absolute;
top:40px;
left:40px;
background:rgba(0,0,0,0.7);
padding:20px;
border:1px solid #00f7ff55;
}

button{
background:#021c22;
border:1px solid #00f7ff55;
color:#00f7ff;
padding:10px;
margin-top:10px;
width:100%;
cursor:pointer;
}

#status{
margin-top:20px;
font-size:12px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div id="panel">

<h2>CONSIA CONTROL</h2>

<button onclick="system()">System Status</button>
<button onclick="agents()">Agents</button>
<button onclick="projects()">Projects</button>

<div id="status"></div>

</div>

<script>

const API="https://api.consia.world"

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let nodes=[]

for(let i=0;i<120;i++){

nodes.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5),
vy:(Math.random()-0.5)
})

}

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.fillStyle="#00f7ff"

nodes.forEach(n=>{

n.x+=n.vx
n.y+=n.vy

ctx.beginPath()
ctx.arc(n.x,n.y,2,0,Math.PI*2)
ctx.fill()

})

requestAnimationFrame(draw)

}

draw()

async function system(){

const r=await fetch(API)
const j=await r.json()

document.getElementById("status").innerText=JSON.stringify(j,null,2)

}

async function agents(){

const r=await fetch(API+"/v1/agents")
const j=await r.json()

document.getElementById("status").innerText="Agents: "+j.agents.length

}

async function projects(){

const r=await fetch(API+"/v1/projects")
const j=await r.json()

document.getElementById("status").innerText="Projects: "+j.projects.length

}

</script>

</body>
</html>
