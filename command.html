<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSIA COMMAND CENTER</title>

<style>
body{
background:#05070b;
color:white;
font-family:system-ui;
margin:0;
padding:0;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.title{
font-size:22px;
margin-bottom:20px;
}

input,textarea{
width:100%;
background:#0d1117;
border:1px solid #222;
color:white;
padding:12px;
border-radius:10px;
}

button{
background:#0d1b2a;
border:1px solid #29477b;
color:white;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
margin-right:10px;
}

.chat{
border:1px solid #222;
border-radius:12px;
height:400px;
overflow:auto;
padding:20px;
margin-bottom:20px;
}

.msg{
margin-bottom:12px;
padding:10px 14px;
border-radius:12px;
max-width:70%;
}

.user{
background:#132238;
margin-left:auto;
}

.ai{
background:#0e2c1f;
}

</style>
</head>

<body>

<div class="container">

<div class="title">CONSIA COMMAND CENTER</div>

<div style="margin-bottom:20px">
<label>API</label>
<input id="api" value="https://api.consia.world">
</div>

<div style="margin-bottom:20px">
<label>Owner Token</label>
<input id="token" placeholder="pegar owner token">
</div>

<button onclick="saveToken()">Guardar</button>
<button onclick="testChat()">Test Chat</button>

<br><br>

<div id="chat" class="chat"></div>

<textarea id="msg" placeholder="Escribí acá..."></textarea>

<br><br>

<button onclick="send()">Enviar</button>

</div>

<script>

const chat=document.getElementById("chat")

function add(text,type){

const div=document.createElement("div")

div.className="msg "+type

div.innerText=text

chat.appendChild(div)

chat.scrollTop=chat.scrollHeight

}

function saveToken(){

localStorage.setItem("CONSIA_TOKEN",document.getElementById("token").value)

}

window.onload=()=>{

const t=localStorage.getItem("CONSIA_TOKEN")

if(t)document.getElementById("token").value=t

}

async function testChat(){

sendMessage("Hola CONSIA")

}

async function send(){

const text=document.getElementById("msg").value

sendMessage(text)

document.getElementById("msg").value=""

}

async function sendMessage(text){

add(text,"user")

const api=document.getElementById("api").value

const token=document.getElementById("token").value

try{

const res=await fetch(api+"/v1/chat",{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+token
},

body:JSON.stringify({
message:text,
user_id:"martin"
})

})

const data=await res.json()

let reply=

data.reply ||

data.answer ||

data.message ||

data.output ||

data.text ||

data.choices?.[0]?.message?.content ||

"CONSIA activo pero el modelo no devolvió texto."

add(reply,"ai")

}catch(e){

add("ERROR: "+e,"ai")

}

}

</script>

</body>
</html>
