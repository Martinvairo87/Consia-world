<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CONSIA Dashboard</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
display:flex;
height:100vh;
}

#sidebar{
width:260px;
background:#060912;
border-right:1px solid #1a2135;
display:flex;
flex-direction:column;
}

#logo{
padding:20px;
font-weight:bold;
letter-spacing:6px;
text-align:center;
border-bottom:1px solid #1a2135;
}

.menu{
padding:14px 20px;
cursor:pointer;
font-size:14px;
opacity:.8;
}

.menu:hover{
opacity:1;
background:#101626;
}

#main{
flex:1;
padding:30px;
overflow:auto;
}

.card{
background:#101626;
border-radius:12px;
padding:20px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.metric{
font-size:28px;
margin-top:10px;
}

button{
padding:10px 16px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<div id="sidebar">

<div id="logo">CONSIA</div>

<div class="menu" onclick="openPage('chat')">AI Chat</div>
<div class="menu" onclick="openPage('image')">AI Image</div>
<div class="menu" onclick="openPage('voice')">AI Voice</div>
<div class="menu" onclick="openPage('apps')">AI Apps</div>
<div class="menu" onclick="openPage('wallet')">Wallet</div>
<div class="menu" onclick="openPage('stats')">System Stats</div>

</div>

<div id="main">

<h1>CONSIA Control Center</h1>

<div class="grid">

<div class="card">

<div>Status</div>
<div class="metric" id="status">Loading...</div>

</div>

<div class="card">

<div>Wallet Balance</div>
<div class="metric" id="balance">...</div>

</div>

<div class="card">

<div>AI Requests</div>
<div class="metric" id="requests">...</div>

</div>

<div class="card">

<div>System Version</div>
<div class="metric">V7</div>

</div>

</div>

<div class="card">

<h3>Quick Actions</h3>

<button onclick="openChat()">Open AI Chat</button>
<button onclick="openImage()">Generate Image</button>
<button onclick="openVoice()">Voice Mode</button>

</div>

</div>

<script>

async function loadStatus(){

try{

const res=await fetch("https://api.consia.world")

const data=await res.json()

document.getElementById("status").innerText="ONLINE"

}catch{

document.getElementById("status").innerText="OFFLINE"

}

}

async function loadWallet(){

try{

const res=await fetch("https://api.consia.world/wallet?user_id=web")

const data=await res.json()

document.getElementById("balance").innerText=data.wallet?.balance ?? "0"

}catch{

document.getElementById("balance").innerText="0"

}

}

async function loadStats(){

try{

const res=await fetch("https://api.consia.world/admin/stats")

const data=await res.json()

document.getElementById("requests").innerText=data.stats?.payments ?? "0"

}catch{

document.getElementById("requests").innerText="..."

}

}

function openPage(p){

if(p==="chat"){
window.location="https://consia.world"
}

}

function openChat(){
window.location="https://consia.world"
}

function openImage(){
alert("Image generator ready")
}

function openVoice(){
alert("Voice module ready")
}

loadStatus()
loadWallet()
loadStats()

</script>

</body>
</html>
