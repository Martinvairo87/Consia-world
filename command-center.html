<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA GLOBAL COMMAND CENTER</title>

<style>

body{
margin:0;
background:#02040a;
font-family:Arial;
color:white;
overflow:hidden;
}

#scene{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
}

.panel{
position:absolute;
top:20px;
left:20px;
background:rgba(0,20,40,0.8);
padding:16px;
border-radius:10px;
backdrop-filter:blur(8px);
}

button{
background:#00e5ff;
border:none;
padding:10px 18px;
margin:4px;
border-radius:8px;
cursor:pointer;
}

#chat{
position:absolute;
right:20px;
bottom:20px;
width:320px;
background:#000b1f;
border-radius:10px;
padding:10px;
}

#messages{
height:200px;
overflow:auto;
font-size:13px;
}

#input{
width:100%;
padding:8px;
margin-top:6px;
background:black;
color:white;
border:1px solid #333;
}

</style>

</head>

<body>

<div id="scene"></div>

<div class="panel">

<h3>CONSIA COMMAND CENTER</h3>

<button onclick="systemStatus()">SYSTEM STATUS</button>
<button onclick="launchAgents()">AGENT SWARM</button>
<button onclick="autopilot()">AUTOPILOT</button>
<button onclick="memory()">GLOBAL MEMORY</button>
<button onclick="avatar()">AVATAR</button>

</div>

<div id="chat">

<div id="messages"></div>

<input id="input" placeholder="Ask CONSIA...">

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

const renderer = new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth,window.innerHeight)

document.getElementById("scene").appendChild(renderer.domElement)

const geometry = new THREE.SphereGeometry(2,64,64)

const material = new THREE.MeshBasicMaterial({
color:0x00ffff,
wireframe:true
})

const sphere = new THREE.Mesh(geometry,material)

scene.add(sphere)

camera.position.z=5

function animate(){

requestAnimationFrame(animate)

sphere.rotation.y+=0.002

renderer.render(scene,camera)

}

animate()

</script>

<script>

const messages=document.getElementById("messages")
const input=document.getElementById("input")

input.addEventListener("keypress",async(e)=>{

if(e.key==="Enter"){

const text=input.value
input.value=""

messages.innerHTML+=`<div>YOU: ${text}</div>`

const r=await fetch("https://api.consia.world/v1/chat",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({message:text})
})

const data=await r.json()

messages.innerHTML+=`<div>CONSIA: ${data.reply || data.message}</div>`

messages.scrollTop=messages.scrollHeight

}

})

function systemStatus(){

alert("CONSIA CORE ACTIVE")

}

function launchAgents(){

fetch("https://api.consia.world/v1/actions/dispatch",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({
action:"launch_agents"
})
})

alert("Agent Swarm Activated")

}

function autopilot(){

alert("CONSIA AUTOPILOT READY")

}

function memory(){

fetch("https://api.consia.world/v1/memory/status")
.then(r=>r.json())
.then(d=>alert(JSON.stringify(d,null,2)))

}

function avatar(){

alert("CONSIA AVATAR ONLINE")

}

</script>

</body>
</html>
