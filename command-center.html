<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CONSIA GLOBAL COMMAND CENTER</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
body{
margin:0;
background:#000;
color:#00f7ff;
font-family:Arial;
}

#topbar{
height:60px;
background:#031821;
display:flex;
align-items:center;
padding-left:20px;
font-size:20px;
letter-spacing:2px;
}

#layout{
display:flex;
height:calc(100vh - 60px);
}

#sidebar{
width:260px;
background:#041c26;
padding:20px;
}

#content{
flex:1;
padding:20px;
overflow:auto;
}

.panel{
border:1px solid #00f7ff33;
padding:15px;
margin-bottom:20px;
}

button{
background:#052a33;
border:1px solid #00f7ff44;
color:#00f7ff;
padding:10px;
width:100%;
margin-top:10px;
cursor:pointer;
}

#brain{
width:100%;
height:300px;
background:#000;
border:1px solid #00f7ff33;
}

#status{
white-space:pre;
font-size:12px;
}
</style>
</head>

<body>

<div id="topbar">
CONSIA GLOBAL COMMAND CENTER
</div>

<div id="layout">

<div id="sidebar">

<h3>CONSIA</h3>

<button onclick="system()">System</button>
<button onclick="agents()">Agents</button>
<button onclick="projects()">Projects</button>
<button onclick="users()">Users</button>
<button onclick="economy()">Economy</button>
<button onclick="autopilot()">Autopilot</button>

</div>

<div id="content">

<div class="panel">

<h3>System Status</h3>

<div id="status"></div>

</div>

<div class="panel">

<h3>Global Brain</h3>

<canvas id="brain"></canvas>

</div>

</div>

</div>

<script>

const API="https://api.consia.world"

const canvas=document.getElementById("brain")
const ctx=canvas.getContext("2d")

canvas.width=canvas.offsetWidth
canvas.height=300

let nodes=[]

for(let i=0;i<80;i++){

nodes.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5),
vy:(Math.random()-0.5)
})

}

function draw(){

ctx.fillStyle="black"
ctx.fillRect(0,0,canvas.width,canvas.height)

ctx.strokeStyle="#00f7ff22"

for(let i=0;i<nodes.length;i++){

for(let j=i+1;j<nodes.length;j++){

const dx=nodes[i].x-nodes[j].x
const dy=nodes[i].y-nodes[j].y
const dist=Math.sqrt(dx*dx+dy*dy)

if(dist<120){

ctx.beginPath()
ctx.moveTo(nodes[i].x,nodes[i].y)
ctx.lineTo(nodes[j].x,nodes[j].y)
ctx.stroke()

}

}

}

ctx.fillStyle="#00f7ff"

nodes.forEach(n=>{

n.x+=n.vx
n.y+=n.vy

if(n.x<0||n.x>canvas.width) n.vx*=-1
if(n.y<0||n.y>canvas.height) n.vy*=-1

ctx.beginPath()
ctx.arc(n.x,n.y,2,0,Math.PI*2)
ctx.fill()

})

requestAnimationFrame(draw)

}

draw()

async function system(){

const r=await fetch(API)
const j=await r.json()

document.getElementById("status").innerText=
JSON.stringify(j,null,2)

}

async function agents(){

const r=await fetch(API+"/v1/agents")
const j=await r.json()

document.getElementById("status").innerText=
"Agents: "+j.agents.length

}

async function projects(){

const r=await fetch(API+"/v1/projects")
const j=await r.json()

document.getElementById("status").innerText=
"Projects: "+j.projects.length

}

async function users(){

const r=await fetch(API+"/v1/network/users")
const j=await r.json()

document.getElementById("status").innerText=
"Users: "+j.users

}

async function economy(){

const r=await fetch(API+"/v1/economy/products")
const j=await r.json()

document.getElementById("status").innerText=
"Products: "+j.products.length

}

async function autopilot(){

const idea=prompt("Idea de negocio")

const r=await fetch(API+"/v1/autopilot/create",{

method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({idea})

})

const j=await r.json()

document.getElementById("status").innerText=
JSON.stringify(j,null,2)

}

</script>

</body>
</html>
