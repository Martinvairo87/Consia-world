<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA GLOBAL COMMAND CENTER</title>

<style>

body{
margin:0;
background:#030712;
font-family:Arial;
color:white;
}

header{
display:flex;
justify-content:space-between;
padding:20px;
background:#0a1b3d;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.sidebar{
width:220px;
background:#07142b;
padding:20px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
padding:10px;
background:#0f2a5a;
border:none;
color:white;
cursor:pointer;
}

.main{
flex:1;
padding:30px;
}

.cards{
display:flex;
gap:20px;
}

.card{
background:#081c3c;
padding:20px;
border-radius:8px;
width:200px;
}

.status{
color:#00ff9d;
}

</style>

</head>

<body>

<header>

<h2>CONSIA GLOBAL COMMAND CENTER</h2>

<div id="status" class="status">
checking...
</div>

</header>

<div class="container">

<div class="sidebar">

<button onclick="loadAgents()">Agents</button>
<button onclick="loadProjects()">Projects</button>
<button onclick="loadMemory()">Memory</button>
<button onclick="loadSystem()">System</button>

</div>

<div class="main">

<div class="cards">

<div class="card">
<h3>CORE</h3>
<div id="core">loading...</div>
</div>

<div class="card">
<h3>API</h3>
<div id="api">loading...</div>
</div>

<div class="card">
<h3>AGENTS</h3>
<div id="agents">loading...</div>
</div>

</div>

</div>

</div>

<script>

const API="https://api.consia.world"

async function checkSystem(){

try{

const r=await fetch(API+"/v1/chat",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({message:"status"})
})

const data=await r.json()

document.getElementById("core").innerText="ACTIVE"
document.getElementById("api").innerText="ONLINE"
document.getElementById("agents").innerText="READY"
document.getElementById("status").innerText="SYSTEM ONLINE"

}catch(e){

document.getElementById("status").innerText="SYSTEM ERROR"

}

}

checkSystem()

function loadAgents(){

document.getElementById("agents").innerText="AGENT SWARM READY"

}

function loadProjects(){

alert("Projects module coming")

}

function loadMemory(){

fetch(API+"/v1/memory/status")
.then(r=>r.json())
.then(d=>{

alert(JSON.stringify(d,null,2))

})

}

function loadSystem(){

alert("CONSIA CORE ACTIVE")

}

</script>

</body>
</html>
