<!DOCTYPE html>
<html>
<head>

<title>CONSIA Dashboard</title>

<style>

body{
font-family:Arial;
background:#0b0f1a;
color:white;
margin:0;
}

header{
padding:20px;
background:#111a2e;
}

.container{
padding:40px;
}

.card{
background:#141f35;
padding:20px;
margin-bottom:20px;
border-radius:10px;
}

button{
padding:10px 20px;
border:none;
border-radius:6px;
background:#4c8bf5;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<header>
<h1>CONSIA GLOBAL DASHBOARD</h1>
</header>

<div class="container">

<div class="card">
<h2>Analytics</h2>
<button onclick="loadAnalytics()">Load</button>
<pre id="analytics"></pre>
</div>

<div class="card">
<h2>Create Agent</h2>
<button onclick="createAgent()">Create</button>
</div>

<div class="card">
<h2>Startup Generator</h2>
<button onclick="startup()">Generate</button>
<pre id="startup"></pre>
</div>

</div>

<script>

const API="https://api.consia.world"

async function loadAnalytics(){

const r = await fetch(API+"/v1/analytics")

const d = await r.json()

document.getElementById("analytics").textContent =
JSON.stringify(d,null,2)

}

async function createAgent(){

await fetch(API+"/v1/agents/create",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
name:"Demo Agent",
type:"automation",
price:10,
owner_email:"demo@consia.ai",
data:{}
})
})

alert("Agent created")

}

async function startup(){

const r = await fetch(API+"/v1/startup/generate",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({
idea:"AI Real Estate Platform"
})
})

const d = await r.json()

document.getElementById("startup").textContent =
JSON.stringify(d,null,2)

}

</script>

</body>
</html>
