<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA GLOBAL FILE SYSTEM</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial;
color:white;
}

.header{
text-align:center;
padding:30px;
font-size:28px;
color:#00eaff;
}

.container{
max-width:1000px;
margin:auto;
padding:30px;
}

.panel{
background:#071426;
padding:30px;
border-radius:12px;
}

input{
margin-top:15px;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:25px;
background:#00eaff;
color:#00151f;
cursor:pointer;
}

.files{
margin-top:30px;
background:#081424;
padding:20px;
border-radius:10px;
}

.file{
padding:8px;
border-bottom:1px solid #0f223c;
font-size:13px;
}

</style>

</head>

<body>

<div class="header">
CONSIA GLOBAL FILE SYSTEM
</div>

<div class="container">

<div class="panel">

<h3>Subir archivo</h3>

<input type="file" id="fileInput">

<br>

<button onclick="uploadFile()">Subir</button>

</div>

<div class="files" id="fileList">

Archivos aparecerán aquí

</div>

</div>

<script>

function uploadFile(){

const fileInput=document.getElementById("fileInput")

const file=fileInput.files[0]

if(!file) return

let files=JSON.parse(localStorage.getItem("consia_files")) || []

files.push({
name:file.name,
size:file.size,
date:new Date().toISOString()
})

localStorage.setItem("consia_files",JSON.stringify(files))

loadFiles()

}

function loadFiles(){

const data=JSON.parse(localStorage.getItem("consia_files")) || []

let html=""

data.forEach(f=>{

html+=`<div class="file">${f.name} (${Math.round(f.size/1024)} KB)</div>`

})

document.getElementById("fileList").innerHTML=html

}

loadFiles()

</script>

</body>
</html>
