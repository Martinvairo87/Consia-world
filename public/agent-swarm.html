<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA GLOBAL AGENT SWARM</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

.header{
text-align:center;
padding:30px;
font-size:28px;
color:#00eaff;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
}

.agent{
background:#071426;
padding:20px;
border-radius:10px;
text-align:center;
}

.agent h3{
margin-bottom:10px;
color:#00eaff;
font-size:15px;
}

button{
padding:10px 20px;
border:none;
border-radius:25px;
background:#00eaff;
color:#00151f;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:30px;
background:#081424;
padding:20px;
border-radius:10px;
white-space:pre-wrap;
font-size:13px;
}

</style>

</head>

<body>

<div class="header">
CONSIA GLOBAL AGENT SWARM
</div>

<div class="container">

<div class="grid">

<div class="agent">
<h3>Research Agent</h3>
<button onclick="runAgent('research')">Ejecutar</button>
</div>

<div class="agent">
<h3>Analysis Agent</h3>
<button onclick="runAgent('analysis')">Ejecutar</button>
</div>

<div class="agent">
<h3>Strategy Agent</h3>
<button onclick="runAgent('strategy')">Ejecutar</button>
</div>

<div class="agent">
<h3>Execution Agent</h3>
<button onclick="runAgent('execution')">Ejecutar</button>
</div>

<div class="agent">
<h3>Marketing Agent</h3>
<button onclick="runAgent('marketing')">Ejecutar</button>
</div>

<div class="agent">
<h3>Finance Agent</h3>
<button onclick="runAgent('finance')">Ejecutar</button>
</div>

<div class="agent">
<h3>Startup Agent</h3>
<button onclick="runAgent('startup')">Ejecutar</button>
</div>

<div class="agent">
<h3>Growth Agent</h3>
<button onclick="runAgent('growth')">Ejecutar</button>
</div>

</div>

<div class="result" id="result">
Esperando ejecución de agentes...
</div>

</div>

<script>

async function runAgent(agent){

const resultBox=document.getElementById("result")

resultBox.innerText="CONSIA ejecutando agente..."

try{

const r=await fetch(
"https://api.consia.world/v1/brain/run",
{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
objective:"run "+agent+" agent"
})
}
)

const data=await r.json()

resultBox.innerText=JSON.stringify(data,null,2)

}catch(e){

resultBox.innerText="Error ejecutando agente"

}

}

</script>

</body>
</html>
