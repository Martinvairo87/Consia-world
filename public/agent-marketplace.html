<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA AGENT MARKETPLACE</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial,Helvetica,sans-serif;
color:white;
}

.header{
text-align:center;
padding:30px;
font-size:28px;
color:#00eaff;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.market-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:25px;
}

.agent{
background:#071426;
padding:25px;
border-radius:12px;
box-shadow:0 0 15px rgba(0,234,255,0.08);
}

.agent h3{
margin-bottom:10px;
color:#00eaff;
}

.agent p{
font-size:13px;
opacity:0.9;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
border-radius:20px;
background:#00eaff;
color:#00151f;
font-weight:bold;
cursor:pointer;
}

.creator{
margin-top:40px;
background:#081424;
padding:25px;
border-radius:12px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:20px;
border:none;
background:#0f223c;
color:white;
}

.footer{
text-align:center;
padding:20px;
font-size:12px;
color:#3aaec9;
}

</style>

</head>

<body>

<div class="header">
CONSIA GLOBAL AGENT MARKETPLACE
</div>

<div class="container">

<div class="market-grid" id="market">

<div class="agent">
<h3>Marketing Agent</h3>
<p>Automatiza campañas y crecimiento.</p>
<button onclick="install('marketing_agent')">Instalar</button>
</div>

<div class="agent">
<h3>SEO Agent</h3>
<p>Optimiza contenido para buscadores.</p>
<button onclick="install('seo_agent')">Instalar</button>
</div>

<div class="agent">
<h3>Finance Agent</h3>
<p>Analiza finanzas y negocios.</p>
<button onclick="install('finance_agent')">Instalar</button>
</div>

<div class="agent">
<h3>Startup Agent</h3>
<p>Crea estrategias de startups.</p>
<button onclick="install('startup_agent')">Instalar</button>
</div>

</div>

<div class="creator">

<h3>Crear nuevo agente</h3>

<input id="agentName" placeholder="Nombre del agente">

<input id="agentDesc" placeholder="Descripción">

<button onclick="createAgent()">Publicar agente</button>

</div>

</div>

<div class="footer">
CONSIA AI PLATFORM
</div>

<script>

function install(agent){

alert("Agente instalado: "+agent)

}

function createAgent(){

const name=document.getElementById("agentName").value
const desc=document.getElementById("agentDesc").value

if(!name || !desc) return

const market=document.getElementById("market")

const div=document.createElement("div")
div.className="agent"

div.innerHTML=`
<h3>${name}</h3>
<p>${desc}</p>
<button onclick="install('${name}')">Instalar</button>
`

market.appendChild(div)

document.getElementById("agentName").value=""
document.getElementById("agentDesc").value=""

}

</script>

</body>
</html>
