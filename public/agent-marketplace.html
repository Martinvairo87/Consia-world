<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA AGENT MARKETPLACE</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial;
color:white;
}

.header{
text-align:center;
padding:30px;
font-size:28px;
color:#00eaff;
}

.container{
max-width:1400px;
margin:auto;
padding:30px;
}

.panel{
background:#071426;
padding:25px;
border-radius:12px;
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.agent{
background:#081424;
padding:20px;
border-radius:12px;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#00eaff;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

input,textarea{
width:100%;
padding:12px;
border-radius:10px;
border:none;
background:#0f223c;
color:white;
margin-top:10px;
}

</style>

</head>

<body>

<div class="header">
CONSIA AGENT MARKETPLACE
</div>

<div class="container">

<div class="panel">

<h3>Publicar agente</h3>

<input id="name" placeholder="Nombre del agente">

<textarea id="description" placeholder="Descripción"></textarea>

<input id="price" placeholder="Precio">

<button onclick="publish()">PUBLICAR</button>

</div>

<div class="panel">

<h3>Marketplace</h3>

<div id="agents" class="grid"></div>

</div>

</div>

<script>

const API="https://api.consia.world"

async function load(){

let r=await fetch(API+"/v1/agents")
let data=await r.json()

let html=""

data.agents.forEach(a=>{

html+=`
<div class="agent">
<h4>${a.name}</h4>
<p>${a.type}</p>
<button onclick="run('${a.name}')">USAR</button>
</div>
`

})

document.getElementById("agents").innerHTML=html

}

async function publish(){

const name=document.getElementById("name").value
const desc=document.getElementById("description").value
const price=document.getElementById("price").value

await fetch(API+"/v1/agents/create",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:name,
type:"marketplace-agent",
data:{
description:desc,
price:price
}

})

})

load()

}

function run(name){

alert("Ejecutando agente: "+name)

}

load()

</script>

</body>
</html>
