<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA GLOBAL AGENT RUNTIME</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial,Helvetica,sans-serif;
color:white;
}

.header{
text-align:center;
padding:30px;
font-size:28px;
color:#00eaff;
}

.container{
max-width:1200px;
margin:auto;
padding:40px;
}

.panel{
background:#071426;
padding:25px;
border-radius:12px;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
border-radius:20px;
border:none;
background:#0f223c;
color:white;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 24px;
border:none;
border-radius:25px;
background:#00eaff;
color:#00151f;
font-weight:bold;
cursor:pointer;
}

.agents{
margin-top:20px;
background:#081424;
padding:20px;
border-radius:10px;
font-size:13px;
}

.agent{
border-bottom:1px solid #0f223c;
padding:10px 0;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
margin-top:20px;
}

.box{
background:#081424;
padding:15px;
border-radius:10px;
text-align:center;
}

</style>

</head>

<body>

<div class="header">
CONSIA GLOBAL AGENT RUNTIME
</div>

<div class="container">

<div class="panel">

<h3>Ejecutar agentes</h3>

<input id="task" placeholder="Ej: analizar mercado inmobiliario">

<button onclick="runAgents()">
Ejecutar agentes
</button>

</div>

<div class="panel">

<h3>Agentes activos</h3>

<div class="agents" id="agents"></div>

</div>

<div class="panel">

<h3>Estadísticas</h3>

<div class="stats">

<div class="box">
<div id="totalAgents">0</div>
Agentes activos
</div>

<div class="box">
<div id="tasks">0</div>
Tareas ejecutadas
</div>

<div class="box">
<div id="projects">0</div>
Proyectos generados
</div>

</div>

</div>

</div>

<script>

function runAgents(){

const task=document.getElementById("task").value

if(!task) return

let runtime=JSON.parse(localStorage.getItem("consia_runtime"))||{
agents:[],
tasks:0
}

const newAgents=[
"research_agent",
"analysis_agent",
"strategy_agent",
"execution_agent"
]

newAgents.forEach(a=>{
runtime.agents.push({
name:a,
task:task
})
})

runtime.tasks+=1

localStorage.setItem("consia_runtime",JSON.stringify(runtime))

loadAgents()

}

function loadAgents(){

const runtime=JSON.parse(localStorage.getItem("consia_runtime"))||{
agents:[],
tasks:0
}

let html=""

runtime.agents.forEach(a=>{
html+=`<div class="agent">${a.name} ejecutando: ${a.task}</div>`
})

document.getElementById("agents").innerHTML=html

document.getElementById("totalAgents").innerText=runtime.agents.length
document.getElementById("tasks").innerText=runtime.tasks
document.getElementById("projects").innerText=Math.floor(runtime.tasks/2)

}

loadAgents()

</script>

</body>
</html>
