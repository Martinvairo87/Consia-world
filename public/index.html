<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSIA AVATAR GOD MODE</title>

<style>
body {
  margin:0;
  background:#0a0f1c;
  color:#00f0ff;
  font-family:Arial;
  text-align:center;
}

.container {
  padding:20px;
}

.avatar {
  width:220px;
  height:220px;
  border-radius:50%;
  margin:20px auto;
  background:url("https://i.imgur.com/8Km9tLL.png") center/cover;
  box-shadow:0 0 30px #00f0ff;
  animation:idle 3s infinite ease-in-out;
}

@keyframes idle {
  0% { transform:scale(1); }
  50% { transform:scale(1.03); }
  100% { transform:scale(1); }
}

.talking {
  animation:talk 0.3s infinite;
}

@keyframes talk {
  0% { transform:scale(1); }
  50% { transform:scale(1.05); }
  100% { transform:scale(1); }
}

.chat {
  max-width:500px;
  margin:20px auto;
  background:#11182b;
  padding:15px;
  border-radius:10px;
  height:250px;
  overflow:auto;
}

input {
  width:60%;
  padding:10px;
  border-radius:8px;
  border:none;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#00f0ff;
  margin:5px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<h1>CONSIA AVATAR</h1>

<div id="avatar" class="avatar"></div>

<div class="chat" id="chat"></div>

<input id="text" placeholder="Hablar con CONSIA"/>
<br>

<button onclick="enviar()">Enviar</button>
<button onclick="voz()">🎤 Voz</button>

</div>

<script>

const chat = document.getElementById("chat");
const avatar = document.getElementById("avatar");

function log(msg){
  chat.innerHTML += "<div>"+msg+"</div>";
  chat.scrollTop = chat.scrollHeight;
}

async function enviar(){
  const text = document.getElementById("text").value;

  log("🧑: "+text);

  const respuesta = "CONSIA: "+text;

  log("🤖: "+respuesta);

  hablar(respuesta);
}

async function voz(){
  hablar("Hola Martín, CONSIA está en modo dios con avatar activo");
}

async function hablar(texto){

  avatar.classList.add("talking");

  const res = await fetch("https://api.consia.world/v1/voice",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ text: texto })
  });

  const blob = await res.blob();
  const url = URL.createObjectURL(blob);

  const audio = new Audio(url);

  audio.onended = () => {
    avatar.classList.remove("talking");
  };

  audio.play();
}

</script>

</body>
</html>
