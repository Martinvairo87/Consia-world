<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSIA COMMAND CENTER</title>

<style>
body {
  margin:0;
  background:#03060d;
  color:#00e5ff;
  font-family:Arial;
}

.wrap {
  max-width:1200px;
  margin:auto;
  padding:20px;
}

h1 {
  font-size:32px;
}

.grid {
  display:grid;
  gap:12px;
}

.row {
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
}

input, textarea {
  width:100%;
  padding:12px;
  background:#111;
  color:#fff;
  border:1px solid #222;
  border-radius:10px;
}

button {
  padding:12px;
  background:#00e5ff;
  border:0;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

pre {
  background:#111;
  padding:14px;
  border-radius:10px;
  min-height:250px;
}
</style>
</head>

<body>

<div class="wrap">
<h1>CONSIA COMMAND CENTER</h1>

<div class="grid">

<input id="api" value="https://api.consia.world">

<textarea id="objective" placeholder="Objetivo..."></textarea>

<div class="row">
<button onclick="runSwarm()">SWARM RUN</button>
<button onclick="loadExecutions()">EXECUTIONS</button>
<button onclick="loadDashboard()">DASHBOARD</button>
</div>

<pre id="output">CONSIA READY</pre>

</div>
</div>

<script>

function API() {
  return document.getElementById("api").value;
}

function show(data) {
  document.getElementById("output").textContent =
    JSON.stringify(data,null,2);
}

// SWARM
async function runSwarm() {
  const objective = document.getElementById("objective").value;

  const res = await fetch(API()+"/v1/swarm/run", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ objective })
  });

  show(await res.json());
}

// EXECUTIONS
async function loadExecutions() {
  const res = await fetch(API()+"/v1/executions");
  show(await res.json());
}

// DASHBOARD
async function loadDashboard() {
  const res = await fetch(API()+"/v1/dashboard/summary");
  show(await res.json());
}

</script>

</body>
</html>
