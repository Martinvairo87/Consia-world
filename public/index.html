<script>
window.CONSIA_API = "https://api.consia.world";

async function consiaStatus() {
  const r = await fetch(`${window.CONSIA_API}/v1/status`);
  return await r.json();
}

async function consiaChat(message) {
  const r = await fetch(`${window.CONSIA_API}/v1/chat`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({ message })
  });
  return await r.json();
}

async function consiaMemory() {
  const r = await fetch(`${window.CONSIA_API}/v1/memory`);
  return await r.json();
}

async function consiaRealtime() {
  const r = await fetch(`${window.CONSIA_API}/v1/realtime/session`);
  return await r.json();
}
</script>
