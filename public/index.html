<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA HOLOGRAPHIC COMMAND CENTER</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020b16;
color:white;
overflow:hidden;
}

/* HOLOGRAPHIC BACKGROUND */

canvas{
position:fixed;
top:0;
left:0;
z-index:0;
}

/* HEADER */

header{
position:absolute;
top:0;
left:0;
width:100%;
padding:20px;
background:rgba(5,20,40,0.8);
border-bottom:1px solid #00eaff33;
z-index:5;
}

h1{
margin:0;
color:#00eaff;
font-size:34px;
}

/* LAYOUT */

.container{
position:absolute;
top:80px;
bottom:0;
left:0;
right:0;
display:grid;
grid-template-columns:260px 1fr;
z-index:5;
}

/* SIDEBAR */

.sidebar{
background:rgba(5,20,40,0.9);
padding:20px;
border-right:1px solid #00eaff33;
}

.sidebar button{
width:100%;
padding:14px;
margin-bottom:12px;
background:#0b2b4d;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

.sidebar button:hover{
background:#1a4d82;
}

/* MAIN */

.main{
padding:30px;
overflow:auto;
}

/* CARD */

.card{
background:rgba(10,35,60,0.9);
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

/* STATUS */

.status{
font-size:18px;
margin-bottom:10px;
}

.green{color:#00ff9c}
.red{color:#ff4d4d}

/* TEXTAREA */

textarea{
width:100%;
height:100px;
background:#020b16;
border:none;
border-radius:6px;
color:white;
padding:10px;
}

/* BUTTON */

button.run{
margin-top:10px;
padding:12px 20px;
background:#2f7cff;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

/* RESULT */

pre{
background:#01060c;
padding:15px;
border-radius:8px;
}

/* AVATAR */

.avatar{
position:absolute;
right:30px;
bottom:30px;
width:160px;
height:160px;
border-radius:50%;
border:2px solid #00eaff;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:#00eaff;
box-shadow:0 0 30px #00eaff;
z-index:5;
}

/* VOICE BUTTON */

.voice{
position:absolute;
left:50%;
transform:translateX(-50%);
bottom:30px;
padding:16px 24px;
background:#00eaff;
color:black;
border:none;
border-radius:30px;
cursor:pointer;
font-size:16px;
z-index:5;
}

</style>

</head>

<body>

<canvas id="bg"></canvas>

<header>
<h1>CONSIA HOLOGRAPHIC COMMAND CENTER</h1>
</header>

<div class="container">

<div class="sidebar">

<button onclick="loadSystem()">System</button>
<button onclick="loadBrain()">Global Brain</button>
<button onclick="loadAgents()">Agent Swarm</button>
<button onclick="loadAutopilot()">Autopilot</button>
<button onclick="loadEconomy()">Economy</button>

</div>

<div class="main">

<div class="card">

<div class="status">
CORE: <span id="core" class="red">offline</span>
</div>

<div class="status">
API: <span id="api" class="red">offline</span>
</div>

<div class="status">
AGENTS: <span id="agents" class="red">offline</span>
</div>

<div class="status">
ECONOMY: <span id="economy" class="red">offline</span>
</div>

</div>

<div class="card">

<h2>CONSIA GLOBAL BRAIN</h2>

<textarea id="objective">
crear negocio digital para Real Work
</textarea>

<br>

<button class="run" onclick="runBrain()">RUN BRAIN</button>

<pre id="result"></pre>

</div>

</div>

</div>

<div class="avatar">
CONSIA
</div>

<button class="voice" onclick="startVoice()">
🎤 Voice Command
</button>

<script>

const API="https://api.consia.world"

/* SYSTEM */

async function loadSystem(){

try{

const r=await fetch(API+"/health")
const j=await r.json()

if(j.ok){

document.getElementById("core").className="green"
document.getElementById("core").innerText="ACTIVE"

document.getElementById("api").className="green"
document.getElementById("api").innerText="ONLINE"

}

}catch(e){}

}

/* AGENTS */

async function loadAgents(){

try{

const r=await fetch(API+"/v1/agents")
const j=await r.json()

if(j.ok){

document.getElementById("agents").className="green"
document.getElementById("agents").innerText="ACTIVE"

}

}catch(e){}

}

/* ECONOMY */

async function loadEconomy(){

try{

const r=await fetch(API+"/v1/economy")
const j=await r.json()

if(j.ok){

document.getElementById("economy").className="green"
document.getElementById("economy").innerText="ACTIVE"

}

}catch(e){}

}

/* BRAIN */

async function loadBrain(){

const r=await fetch(API+"/v1/brain")
const j=await r.json()

document.getElementById("result").innerText=
JSON.stringify(j,null,2)

}

/* RUN BRAIN */

async function runBrain(){

const objective=document.getElementById("objective").value

const r=await fetch(API+"/v1/brain/run",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
objective
})

})

const j=await r.json()

document.getElementById("result").innerText=
JSON.stringify(j,null,2)

}

/* VOICE CONTROL */

function startVoice(){

const recognition =
new(window.SpeechRecognition ||
window.webkitSpeechRecognition)()

recognition.lang="es-ES"

recognition.onresult=function(event){

const text=event.results[0][0].transcript

document.getElementById("objective").value=text

}

recognition.start()

}

/* INIT */

async function init(){

await loadSystem()
await loadAgents()
await loadEconomy()

}

init()

/* HOLOGRAPHIC BACKGROUND */

const canvas=document.getElementById("bg")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

const particles=[]

for(let i=0;i<120;i++){
particles.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*0.5,
vy:(Math.random()-0.5)*0.5
})
}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

particles.forEach(p=>{

p.x+=p.vx
p.y+=p.vy

ctx.beginPath()
ctx.arc(p.x,p.y,2,0,Math.PI*2)
ctx.fillStyle="#00eaff"
ctx.fill()

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
