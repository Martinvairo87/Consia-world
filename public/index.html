<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONSIA — Realtime Voice + Avatar</title>
  <script src="https://cdn.jsdelivr.net/npm/livekit-client/dist/livekit-client.umd.min.js"></script>
  <style>
    :root{
      --bg:#07111f;
      --panel:#0d1b2e;
      --panel2:#0a1422;
      --line:rgba(255,255,255,.08);
      --text:#eef6ff;
      --muted:#9fb2c9;
      --cyan:#2fd3ff;
      --cyan2:#00b7ff;
      --ok:#1fd18a;
      --warn:#ffb547;
      --danger:#ff5d6c;
      --shadow:0 20px 50px rgba(0,0,0,.35);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:radial-gradient(circle at top, #10213d 0%, #07111f 45%, #050c16 100%);color:var(--text);font-family:Inter,Arial,sans-serif}
    body{min-height:100vh}

    .wrap{
      width:min(1280px, 96vw);
      margin:24px auto;
      display:grid;
      grid-template-columns: 380px 1fr;
      gap:20px;
    }

    .card{
      background:linear-gradient(180deg,var(--panel) 0%, var(--panel2) 100%);
      border:1px solid var(--line);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
    }

    .sidebar{
      padding:18px;
      display:flex;
      flex-direction:column;
      gap:16px;
      min-height:calc(100vh - 48px);
    }

    .brand{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      padding:10px 12px;
      border:1px solid var(--line);
      border-radius:18px;
      background:rgba(255,255,255,.02);
    }

    .brand h1{
      margin:0;
      font-size:22px;
      letter-spacing:.08em;
    }

    .pill{
      padding:8px 12px;
      border-radius:999px;
      border:1px solid var(--line);
      color:var(--muted);
      font-size:12px;
      white-space:nowrap;
    }

    .section{
      border:1px solid var(--line);
      border-radius:18px;
      padding:14px;
      background:rgba(255,255,255,.02);
    }

    .section h2{
      margin:0 0 10px 0;
      font-size:14px;
      color:var(--muted);
      font-weight:600;
      letter-spacing:.04em;
      text-transform:uppercase;
    }

    .grid2{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .btn{
      appearance:none;
      border:0;
      cursor:pointer;
      border-radius:14px;
      padding:14px 16px;
      font-weight:700;
      font-size:14px;
      color:#02111c;
      background:linear-gradient(135deg,var(--cyan),var(--cyan2));
      transition:.18s transform ease,.18s opacity ease,.18s filter ease;
      width:100%;
    }

    .btn:hover{transform:translateY(-1px);filter:brightness(1.04)}
    .btn:disabled{opacity:.45;cursor:not-allowed;transform:none}
    .btn.secondary{
      background:#12243b;
      color:var(--text);
      border:1px solid var(--line);
    }
    .btn.danger{
      background:linear-gradient(135deg,#ff8a95,#ff5d6c);
      color:#fff;
    }

    .statusRow{
      display:grid;
      grid-template-columns:1fr auto;
      gap:10px;
      align-items:center;
      padding:10px 0;
      border-top:1px solid var(--line);
    }
    .statusRow:first-child{border-top:0}
    .statusLabel{color:var(--muted);font-size:13px}
    .statusValue{
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--line);
      font-size:12px;
      color:var(--text);
      background:rgba(255,255,255,.03);
    }
    .ok{color:var(--ok)}
    .warn{color:var(--warn)}
    .dangerText{color:var(--danger)}

    .chatBox{
      background:#08111d;
      border:1px solid var(--line);
      border-radius:16px;
      padding:12px;
      min-height:140px;
      max-height:260px;
      overflow:auto;
      line-height:1.45;
      color:#dbe9f7;
      white-space:pre-wrap;
    }

    .main{
      padding:18px;
      min-height:calc(100vh - 48px);
      display:grid;
      grid-template-rows:auto 1fr auto;
      gap:16px;
    }

    .topbar{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:14px;
      padding:8px 4px;
    }

    .topbar h2{
      margin:0;
      font-size:20px;
      letter-spacing:.02em;
    }

    .avatarStage{
      position:relative;
      overflow:hidden;
      border-radius:24px;
      border:1px solid var(--line);
      background:
        radial-gradient(circle at 50% 20%, rgba(47,211,255,.18) 0%, rgba(47,211,255,0) 35%),
        linear-gradient(180deg,#0b1626 0%, #070d17 100%);
      min-height:560px;
    }

    .avatarVideoWrap{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
      overflow:hidden;
    }

    #consia-avatar video,
    #consia-avatar audio{
      max-width:100%;
      max-height:100%;
    }

    #consia-avatar video{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
      background:#0b1220;
    }

    .hud{
      position:absolute;
      inset:auto 18px 18px 18px;
      display:grid;
      grid-template-columns:1fr auto;
      gap:14px;
      align-items:end;
      pointer-events:none;
    }

    .transcript{
      pointer-events:auto;
      background:rgba(4,10,18,.72);
      border:1px solid rgba(255,255,255,.08);
      backdrop-filter: blur(10px);
      border-radius:18px;
      padding:14px 16px;
      min-height:78px;
      color:#ecf6ff;
      box-shadow:var(--shadow);
    }

    .transcript .small{
      color:var(--muted);
      font-size:12px;
      margin-bottom:6px;
      text-transform:uppercase;
      letter-spacing:.05em;
    }

    .micOrb{
      width:88px;
      height:88px;
      border-radius:50%;
      pointer-events:auto;
      display:flex;
      align-items:center;
      justify-content:center;
      background:
        radial-gradient(circle at center, rgba(47,211,255,.35) 0%, rgba(47,211,255,.14) 42%, rgba(47,211,255,.05) 65%, rgba(47,211,255,0) 72%),
        rgba(255,255,255,.02);
      border:1px solid rgba(47,211,255,.22);
      box-shadow:0 0 50px rgba(47,211,255,.16), inset 0 0 40px rgba(47,211,255,.08);
      font-size:28px;
      user-select:none;
    }

    .pulse{
      animation:pulse 1.4s infinite;
    }

    @keyframes pulse{
      0%{transform:scale(1); box-shadow:0 0 0 0 rgba(47,211,255,.22)}
      70%{transform:scale(1.04); box-shadow:0 0 0 24px rgba(47,211,255,0)}
      100%{transform:scale(1); box-shadow:0 0 0 0 rgba(47,211,255,0)}
    }

    .bottomControls{
      display:grid;
      grid-template-columns:1fr 1fr 1fr 1fr;
      gap:12px;
    }

    .tiny{
      font-size:12px;
      color:var(--muted);
    }

    @media (max-width: 980px){
      .wrap{grid-template-columns:1fr}
      .sidebar,.main{min-height:auto}
      .avatarStage{min-height:62vh}
      .bottomControls{grid-template-columns:1fr 1fr}
      .hud{grid-template-columns:1fr}
    }

    @media (max-width: 640px){
      .grid2,.bottomControls{grid-template-columns:1fr}
      .avatarStage{min-height:54vh}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <aside class="sidebar card">
      <div class="brand">
        <h1>CONSIA</h1>
        <div class="pill">Realtime + Avatar</div>
      </div>

      <div class="section">
        <h2>Control</h2>
        <div class="grid2">
          <button class="btn" id="btnVoiceStart">🎙️ Iniciar voz</button>
          <button class="btn secondary" id="btnVoiceStop">⏹️ Detener voz</button>
          <button class="btn" id="btnAvatarStart">🧠 Iniciar avatar</button>
          <button class="btn secondary" id="btnAvatarStop">🛑 Detener avatar</button>
        </div>
      </div>

      <div class="section">
        <h2>Estado</h2>
        <div class="statusRow">
          <div class="statusLabel">Realtime OpenAI</div>
          <div class="statusValue" id="voiceStatus">idle</div>
        </div>
        <div class="statusRow">
          <div class="statusLabel">Avatar LiveAvatar</div>
          <div class="statusValue" id="avatarStatus">idle</div>
        </div>
        <div class="statusRow">
          <div class="statusLabel">Modo</div>
          <div class="statusValue">Nivel 2</div>
        </div>
      </div>

      <div class="section">
        <h2>Consola</h2>
        <div class="chatBox" id="logBox">CONSIA listo.\nEsperando conexión…</div>
      </div>

      <div class="section">
        <h2>Comandos rápidos</h2>
        <div class="grid2">
          <button class="btn secondary quickPrompt" data-text="Presentate como CONSIA en una frase premium y ejecutiva.">Intro</button>
          <button class="btn secondary quickPrompt" data-text="Decime el estado actual del sistema en una sola respuesta corta.">Estado</button>
          <button class="btn secondary quickPrompt" data-text="Guiame con el siguiente paso exacto para activar CONSIA al máximo nivel.">Siguiente paso</button>
          <button class="btn secondary" id="btnAvatarTest">🗣️ Probar avatar</button>
        </div>
      </div>

      <div class="tiny">Backend esperado: <strong>https://api.consia.world</strong></div>
    </aside>

    <main class="main card">
      <div class="topbar">
        <h2>CONSIA LIVE COMMAND CENTER</h2>
        <div class="pill" id="topBadge">offline</div>
      </div>

      <section class="avatarStage">
        <div class="avatarVideoWrap" id="consia-avatar"></div>
        <div id="consia-avatar-audio" style="display:none;"></div>

        <div class="hud">
          <div class="transcript">
            <div class="small">Última interacción</div>
            <div id="transcriptText">Todavía no hay interacción.</div>
          </div>
          <div class="micOrb" id="micOrb">🎙️</div>
        </div>
      </section>

      <div class="bottomControls">
        <button class="btn" id="btnStartAll">⚡ Iniciar todo</button>
        <button class="btn secondary" id="btnStopAll">⛔ Parar todo</button>
        <button class="btn secondary" id="btnSpeakStatus">📡 Hablar estado</button>
        <button class="btn danger" id="btnHardReset">♻ Reset</button>
      </div>
    </main>
  </div>

  <script>
    (() => {
      const API_BASE = window.CONSIA_API_BASE || "https://api.consia.world";

      const $voiceStatus = document.getElementById("voiceStatus");
      const $avatarStatus = document.getElementById("avatarStatus");
      const $topBadge = document.getElementById("topBadge");
      const $logBox = document.getElementById("logBox");
      const $transcriptText = document.getElementById("transcriptText");
      const $avatarWrap = document.getElementById("consia-avatar");
      const $avatarAudioWrap = document.getElementById("consia-avatar-audio");
      const $micOrb = document.getElementById("micOrb");

      const state = {
        pc: null,
        dc: null,
        micStream: null,
        remoteAudio: null,
        callId: null,
        avatarRoom: null,
        avatarSessionId: null,
        avatarSessionToken: null,
        avatarLivekitUrl: null,
        avatarLivekitClientToken: null,
        lastAssistantText: "",
        lastUserText: "",
      };

      function log(msg) {
        const time = new Date().toLocaleTimeString("es-AR", { hour: "2-digit", minute: "2-digit", second: "2-digit" });
        $logBox.textContent += `\n[${time}] ${msg}`;
        $logBox.scrollTop = $logBox.scrollHeight;
      }

      function setVoiceStatus(text) {
        $voiceStatus.textContent = text;
        refreshTopBadge();
      }

      function setAvatarStatus(text) {
        $avatarStatus.textContent = text;
        refreshTopBadge();
      }

      function refreshTopBadge() {
        const live = ($voiceStatus.textContent === "live" || $avatarStatus.textContent === "live");
        $topBadge.textContent = live ? "online" : "offline";
        $topBadge.className = "pill" + (live ? " ok" : "");
      }

      function setTranscript(text) {
        $transcriptText.textContent = text || "Sin texto.";
      }

      function setMicLive(isLive) {
        if (isLive) $micOrb.classList.add("pulse");
        else $micOrb.classList.remove("pulse");
      }

      function ensureRemoteAudio() {
        if (!state.remoteAudio) {
          const audio = document.createElement("audio");
          audio.autoplay = true;
          audio.playsInline = true;
          audio.style.display = "none";
          document.body.appendChild(audio);
          state.remoteAudio = audio;
        }
        return state.remoteAudio;
      }

      async function waitForIce(pc) {
        if (pc.iceGatheringState === "complete") return;
        await new Promise((resolve) => {
          const onChange = () => {
            if (pc.iceGatheringState === "complete") {
              pc.removeEventListener("icegatheringstatechange", onChange);
              resolve();
            }
          };
          pc.addEventListener("icegatheringstatechange", onChange);
        });
      }

      function sendRealtimeEvent(event) {
        if (state.dc && state.dc.readyState === "open") {
          state.dc.send(JSON.stringify(event));
        } else {
          log("Canal realtime no disponible.");
        }
      }

      function closeVoice() {
        try { state.dc?.close(); } catch {}
        try { state.pc?.close(); } catch {}
        try { state.micStream?.getTracks()?.forEach((t) => t.stop()); } catch {}

        state.dc = null;
        state.pc = null;
        state.micStream = null;
        state.callId = null;
        setVoiceStatus("idle");
        setMicLive(false);
        log("Realtime voz detenido.");
      }

      async function startVoice() {
        closeVoice();
        setVoiceStatus("connecting");
        setMicLive(true);
        log("Iniciando realtime OpenAI…");

        const pc = new RTCPeerConnection();
        const dc = pc.createDataChannel("oai-events");

        state.pc = pc;
        state.dc = dc;

        dc.addEventListener("open", () => {
          setVoiceStatus("live");
          log("Canal realtime conectado.");
          sendRealtimeEvent({
            type: "response.create",
            response: {
              output_modalities: ["audio", "text"],
              instructions: "Presentate como CONSIA en una frase breve, premium, ejecutiva y en español."
            }
          });
        });

        dc.addEventListener("message", (ev) => {
          try {
            const data = JSON.parse(ev.data);

            if (data.type === "conversation.item.input_audio_transcription.completed" && data.transcript) {
              state.lastUserText = data.transcript;
              setTranscript(`Usuario: ${data.transcript}`);
              log(`Usuario: ${data.transcript}`);
            }

            if (data.type === "response.output_text.delta" && data.delta) {
              state.lastAssistantText += data.delta;
              setTranscript(`CONSIA: ${state.lastAssistantText}`);
            }

            if (data.type === "response.completed") {
              const finalText = state.lastAssistantText.trim();
              if (finalText) {
                log(`CONSIA: ${finalText}`);
                if (state.avatarRoom && state.avatarSessionId) {
                  avatarSpeakText(finalText).catch((err) => log("Avatar speak error: " + (err?.message || err)));
                }
              }
              state.lastAssistantText = "";
            }

            if (data.type === "error") {
              log("Error realtime: " + JSON.stringify(data));
            }
          } catch {
            log("Evento realtime recibido.");
          }
        });

        pc.addEventListener("connectionstatechange", () => {
          setVoiceStatus(pc.connectionState || "connecting");
          log("Estado realtime: " + (pc.connectionState || "connecting"));
        });

        pc.addEventListener("track", (ev) => {
          const audio = ensureRemoteAudio();
          audio.srcObject = ev.streams[0];
          audio.play().catch(() => {});
          log("Audio remoto realtime activo.");
        });

        const stream = await navigator.mediaDevices.getUserMedia({
          audio: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true,
          },
          video: false,
        });

        state.micStream = stream;
        stream.getTracks().forEach((track) => pc.addTrack(track, stream));

        const offer = await pc.createOffer();
        await pc.setLocalDescription(offer);
        await waitForIce(pc);

        const resp = await fetch(`${API_BASE}/v1/realtime/call`, {
          method: "POST",
          headers: { "Content-Type": "application/sdp" },
          body: pc.localDescription.sdp,
        });

        const answerSdp = await resp.text();
        if (!resp.ok) {
          throw new Error(answerSdp || "realtime_call_failed");
        }

        state.callId = resp.headers.get("X-OpenAI-Call-Id") || null;

        await pc.setRemoteDescription({
          type: "answer",
          sdp: answerSdp,
        });

        log("Respuesta SDP aplicada.");
      }

      function closeAvatar() {
        try { state.avatarRoom?.disconnect(); } catch {}
        state.avatarRoom = null;
        state.avatarSessionId = null;
        state.avatarSessionToken = null;
        state.avatarLivekitUrl = null;
        state.avatarLivekitClientToken = null;
        $avatarWrap.innerHTML = "";
        $avatarAudioWrap.innerHTML = "";
        setAvatarStatus("idle");
        log("Avatar detenido.");
      }

      async function startAvatar() {
        closeAvatar();
        setAvatarStatus("creating_session");
        log("Creando sesión LiveAvatar…");

        const sessionResp = await fetch(`${API_BASE}/v1/avatar/session`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            mode: "FULL",
            language: "es",
          }),
        });

        const sessionData = await sessionResp.json();
        if (!sessionResp.ok) {
          throw new Error(sessionData?.message || JSON.stringify(sessionData));
        }

        state.avatarSessionId = sessionData.session_id;
        state.avatarSessionToken = sessionData.session_token;

        setAvatarStatus("starting_session");
        log("Session token LiveAvatar recibido.");

        const startResp = await fetch(`${API_BASE}/v1/avatar/start`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            session_token: state.avatarSessionToken,
          }),
        });

        const startData = await startResp.json();
        if (!startResp.ok) {
          throw new Error(startData?.message || JSON.stringify(startData));
        }

        state.avatarSessionId = startData.session_id || state.avatarSessionId;
        state.avatarLivekitUrl = startData.livekit_url;
        state.avatarLivekitClientToken = startData.livekit_client_token;

        const room = new LivekitClient.Room({
          adaptiveStream: true,
          dynacast: true,
        });

        state.avatarRoom = room;

        room.on(LivekitClient.RoomEvent.TrackSubscribed, (track, publication) => {
          if (publication.kind === LivekitClient.Track.Kind.Video) {
            const el = track.attach();
            el.autoplay = true;
            el.playsInline = true;
            el.muted = true;
            el.style.width = "100%";
            el.style.height = "100%";
            el.style.objectFit = "cover";
            $avatarWrap.innerHTML = "";
            $avatarWrap.appendChild(el);
            log("Video de avatar activo.");
          }

          if (publication.kind === LivekitClient.Track.Kind.Audio) {
            const el = track.attach();
            el.autoplay = true;
            el.playsInline = true;
            $avatarAudioWrap.innerHTML = "";
            $avatarAudioWrap.appendChild(el);
            log("Audio de avatar activo.");
          }
        });

        room.on(LivekitClient.RoomEvent.DataReceived, (payload, participant, kind, topic) => {
          try {
            const data = JSON.parse(new TextDecoder().decode(payload));
            log(`Evento avatar (${topic || "sin-topic"}): ${JSON.stringify(data)}`);
          } catch {
            log(`Evento avatar (${topic || "sin-topic"}) recibido.`);
          }
        });

        await room.connect(state.avatarLivekitUrl, state.avatarLivekitClientToken, {
          autoSubscribe: true,
          audio: true,
          video: true,
        });

        await room.startAudio();
        setAvatarStatus("live");
        log("Avatar conectado.");
      }

      async function avatarSpeakText(text) {
        if (!state.avatarRoom || !state.avatarSessionId) return;
        const payload = new TextEncoder().encode(JSON.stringify({
          event_type: "avatar.speak_text",
          session_id: state.avatarSessionId,
          text
        }));

        await state.avatarRoom.localParticipant.publishData(payload, {
          reliable: true,
          topic: "agent-control",
        });

        log("Texto enviado al avatar.");
      }

      async function stopAll() {
        closeVoice();
        closeAvatar();
        log("Sistema detenido.");
      }

      async function startAll() {
        try {
          await startAvatar();
          await startVoice();
        } catch (err) {
          log("Error startAll: " + (err?.message || err));
        }
      }

      async function hardReset() {
        await stopAll();
        state.lastAssistantText = "";
        state.lastUserText = "";
        setTranscript("Sistema reiniciado.");
        $logBox.textContent = "CONSIA listo.\nEsperando conexión…";
      }

      document.getElementById("btnVoiceStart").addEventListener("click", async () => {
        try { await startVoice(); } catch (err) { log("Error voz: " + (err?.message || err)); setVoiceStatus("error"); }
      });

      document.getElementById("btnVoiceStop").addEventListener("click", async () => closeVoice());

      document.getElementById("btnAvatarStart").addEventListener("click", async () => {
        try { await startAvatar(); } catch (err) { log("Error avatar: " + (err?.message || err)); setAvatarStatus("error"); }
      });

      document.getElementById("btnAvatarStop").addEventListener("click", async () => closeAvatar());

      document.getElementById("btnStartAll").addEventListener("click", startAll);
      document.getElementById("btnStopAll").addEventListener("click", stopAll);
      document.getElementById("btnHardReset").addEventListener("click", hardReset);

      document.getElementById("btnSpeakStatus").addEventListener("click", async () => {
        const text = "CONSIA online. Realtime y avatar listos.";
        setTranscript(`CONSIA: ${text}`);
        try {
          if (state.avatarRoom && state.avatarSessionId) {
            await avatarSpeakText(text);
          } else {
            log("Avatar no iniciado.");
          }
        } catch (err) {
          log("Error speak status: " + (err?.message || err));
        }
      });

      document.getElementById("btnAvatarTest").addEventListener("click", async () => {
        const text = "Hola. Soy CONSIA. Sistema online y listo para ejecutar.";
        try {
          await avatarSpeakText(text);
          setTranscript(`CONSIA: ${text}`);
        } catch (err) {
          log("Error avatar test: " + (err?.message || err));
        }
      });

      document.querySelectorAll(".quickPrompt").forEach((btn) => {
        btn.addEventListener("click", () => {
          const text = btn.dataset.text;
          if (!state.dc || state.dc.readyState !== "open") {
            log("Realtime no está abierto.");
            return;
          }
          state.lastAssistantText = "";
          setTranscript(`Prompt enviado: ${text}`);
          sendRealtimeEvent({
            type: "response.create",
            response: {
              output_modalities: ["audio", "text"],
              instructions: text
            }
          });
        });
      });

      $micOrb.addEventListener("click", async () => {
        if ($voiceStatus.textContent === "live") {
          closeVoice();
        } else {
          try { await startVoice(); } catch (err) { log("Error mic orb: " + (err?.message || err)); }
        }
      });

      refreshTopBadge();
      log("Frontend Nivel 2 cargado.");
