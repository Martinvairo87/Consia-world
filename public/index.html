<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSIA AI OS</title>

<style>
body { margin:0; background:black; color:#00ffcc; font-family:Arial; }
#chat { height:90vh; overflow:auto; padding:20px; }
#input { display:flex; }
input { flex:1; padding:15px; background:black; color:#00ffcc; border:none; }
button { padding:15px; background:#00ffcc; border:none; font-weight:bold; }
video { position:fixed; right:20px; bottom:20px; width:200px; }
</style>
</head>

<body>

<div id="chat"></div>

<div id="input">
  <input id="msg" placeholder="Orden para CONSIA..." />
  <button onclick="send()">Ejecutar</button>
</div>

<video autoplay loop muted>
<source src="https://drive.google.com/uc?export=download&id=1Kg08jNfEQGizofXZrRLjMLfss9A9ikXY">
</video>

<script>
const API = "https://api.consia.world/v1/chat";

async function send() {
  const msg = document.getElementById("msg").value;

  add("🧑", msg);

  const res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:msg})
  });

  const data = await res.json();

  add("🤖", data.reply);
}

// AUTO EJECUCIÓN INICIAL
window.onload = () => {
  auto("activar sistema completo");
};

async function auto(cmd){
  const res = await fetch(API,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({message:cmd})
  });
  const data = await res.json();
  add("⚡ AUTO", data.reply);
}

function add(user,text){
  const div=document.createElement("div");
  div.innerHTML="<b>"+user+":</b> "+text;
  document.getElementById("chat").appendChild(div);
}
</script>

</body>
</html>
