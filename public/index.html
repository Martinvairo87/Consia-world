<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>CONSIA AI-OS</title>

<style>

body{
background:#0b0f19;
color:white;
font-family:Arial;
padding:40px;
}

.card{
background:#141b2d;
padding:30px;
border-radius:12px;
margin-bottom:30px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:none;
}

button{
background:#33c27f;
border:none;
padding:10px 16px;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>CONSIA AI-OS</h1>

<div class="card">

<h2>Chat</h2>

<input id="msg">

<button onclick="chat()">Enviar</button>

<button onclick="voice()">🎙 Hablar</button>

<pre id="chat"></pre>

</div>

<div class="card">

<h2>Swarm</h2>

<input id="task">

<button onclick="swarm()">Ejecutar</button>

<pre id="swarm"></pre>

</div>

<div class="card">

<h2>Autopilot</h2>

<input id="auto">

<button onclick="autopilot()">Ejecutar</button>

<pre id="auto_result"></pre>

</div>

<div class="card">

<h2>Agent Factory</h2>

<input id="agent_name" placeholder="nombre">

<input id="agent_role" placeholder="rol">

<button onclick="createAgent()">Crear agente</button>

</div>

<div class="card">

<h2>Memory</h2>

<input id="key">

<input id="value">

<button onclick="saveMemory()">Guardar</button>

</div>

<div class="card">

<h2>Files</h2>

<input type="file" id="file">

<button onclick="upload()">Subir</button>

</div>

<div class="card">

<h2>Marketplace</h2>

<button onclick="products()">Listar</button>

<pre id="products"></pre>

</div>

<div class="card">

<h2>Descargar resultado</h2>

<button onclick="download()">Descargar</button>

</div>

<script>

const API="https://api.consia.world"

async function chat(){

let m=msg.value

let r=await fetch(API+"/chat",{
method:"POST",
body:JSON.stringify({message:m})
})

let j=await r.json()

chat.innerText=JSON.stringify(j,null,2)

}

async function swarm(){

let t=task.value

let r=await fetch(API+"/swarm",{
method:"POST",
body:JSON.stringify({task:t})
})

let j=await r.json()

swarm.innerText=JSON.stringify(j,null,2)

}

async function autopilot(){

let t=auto.value

let r=await fetch(API+"/autopilot",{
method:"POST",
body:JSON.stringify({task:t})
})

let j=await r.json()

auto_result.innerText=JSON.stringify(j,null,2)

}

async function createAgent(){

let name=agent_name.value
let role=agent_role.value

await fetch(API+"/agents/create",{
method:"POST",
body:JSON.stringify({name,role})
})

}

async function saveMemory(){

let key=document.getElementById("key").value
let value=document.getElementById("value").value

await fetch(API+"/memory/save",{
method:"POST",
body:JSON.stringify({key,value})
})

}

async function upload(){

let file=document.getElementById("file").files[0]

let fd=new FormData()

fd.append("file",file)

await fetch(API+"/files/upload",{
method:"POST",
body:fd
})

}

async function products(){

let r=await fetch(API+"/marketplace/products")

let j=await r.json()

products.innerText=JSON.stringify(j,null,2)

}

function download(){

const text=chat.innerText

const blob=new Blob([text])

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download="consia_result.txt"

a.click()

}

function voice(){

const rec=new webkitSpeechRecognition()

rec.lang="es-ES"

rec.onresult=e=>{

msg.value=e.results[0][0].transcript

chat()

}

rec.start()

}

</script>

</body>

</html>
