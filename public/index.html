<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CONSIA AI-OS</title>

<style>

body{
font-family:system-ui;
background:#070f1e;
color:white;
margin:0;
padding:40px;
}

h1{
font-size:40px;
margin-bottom:30px;
}

.panel{
background:#0f1b34;
padding:25px;
border-radius:12px;
margin-bottom:30px;
}

input,textarea{
width:100%;
padding:14px;
margin-top:8px;
margin-bottom:14px;
border-radius:8px;
border:none;
background:#16274d;
color:white;
}

button{
background:#3ddc84;
border:none;
padding:12px 20px;
border-radius:8px;
cursor:pointer;
font-weight:bold;
margin-right:8px;
}

button.secondary{
background:#4a63ff;
}

pre{
background:#0a1226;
padding:16px;
border-radius:8px;
overflow:auto;
}

</style>

</head>

<body>

<h1>CONSIA</h1>

<!-- OWNER -->

<div class="panel">

<h2>Owner Access</h2>

<button onclick="registerPasskey()">Registrar Passkey</button>
<button onclick="loginPasskey()">Entrar con FaceID</button>
<button onclick="logout()">Cerrar</button>

</div>


<!-- CHAT -->

<div class="panel">

<h2>Chat CONSIA</h2>

<textarea id="chat_input" placeholder="Escribí o hablá..."></textarea>

<button onclick="sendChat()">Enviar</button>
<button onclick="startVoice()">Hablar</button>

<pre id="chat_result"></pre>

</div>


<!-- SWARM -->

<div class="panel">

<h2>Swarm</h2>

<input id="swarm_input" placeholder="Ej: Crear plan comercial">

<button onclick="runSwarm()">Ejecutar swarm</button>

<pre id="swarm_result"></pre>

</div>


<!-- MEMORY -->

<div class="panel">

<h2>Memory</h2>

<input id="mem_key" placeholder="key">
<input id="mem_value" placeholder="value">

<button onclick="saveMemory()">Guardar</button>

</div>


<!-- FILES -->

<div class="panel">

<h2>Files R2</h2>

<input type="file" id="file_upload">

<button onclick="uploadFile()">Subir</button>

</div>


<!-- MARKETPLACE -->

<div class="panel">

<h2>Marketplace</h2>

<button onclick="listProducts()">Listar productos</button>

<pre id="market_result"></pre>

</div>


<!-- OWNER ACTIONS -->

<div class="panel">

<h2>Owner Actions</h2>

<input id="owner_action" placeholder="tipo acción">

<textarea id="owner_payload">{}</textarea>

<button onclick="ownerAction()">Ejecutar</button>

<pre id="owner_result"></pre>

</div>


<!-- AUTOPILOT -->

<div class="panel">

<h2>CONSIA AUTOPILOT MASTER</h2>

<input id="auto_company" placeholder="empresa">

<input id="auto_action" placeholder="acción">

<textarea id="auto_input" placeholder="decile qué querés crear"></textarea>

<button onclick="runAutopilot()">Ejecutar Autopilot</button>

<pre id="auto_result"></pre>

<div style="margin-top:12px">

<button onclick="copyResult()">Copiar</button>
<button onclick="downloadTxt()">TXT</button>
<button onclick="downloadPDF()">PDF</button>
<button onclick="downloadDoc()">Word</button>
<button onclick="downloadXls()">Excel</button>
<button onclick="saveToFiles()">Guardar en CONSIA Files</button>

</div>

</div>



<script>

let ownerSession=null

/* PASSKEY */

async function registerPasskey(){

const r=await fetch("/v1/auth/passkey/register",{method:"POST"})
alert("Passkey registrada")

}

async function loginPasskey(){

const r=await fetch("/v1/auth/passkey/login",{method:"POST"})
const j=await r.json()

ownerSession=j.owner_session

alert("Owner conectado")

}

function logout(){

ownerSession=null
alert("Sesión cerrada")

}


/* CHAT */

async function sendChat(){

const text=document.getElementById("chat_input").value

const r=await fetch("/v1/chat",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({message:text})

})

const j=await r.json()

document.getElementById("chat_result").innerText=
JSON.stringify(j,null,2)

speak(j.answer)

}


/* VOICE */

function startVoice(){

const rec=new webkitSpeechRecognition()

rec.lang="es"

rec.onresult=(e)=>{

document.getElementById("chat_input").value=
e.results[0][0].transcript

}

rec.start()

}

function speak(text){

const msg=new SpeechSynthesisUtterance(text)
speechSynthesis.speak(msg)

}


/* SWARM */

async function runSwarm(){

const input=document.getElementById("swarm_input").value

const r=await fetch("/v1/swarm/run",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({task:input})

})

const j=await r.json()

document.getElementById("swarm_result").innerText=
JSON.stringify(j,null,2)

}


/* MEMORY */

async function saveMemory(){

await fetch("/v1/memory/set",{

method:"POST",
headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

key:mem_key.value,
value:mem_value.value

})

})

alert("Memory guardada")

}


/* FILE */

async function uploadFile(){

const file=document.getElementById("file_upload").files[0]

const form=new FormData()

form.append("file",file)

await fetch("/v1/files/upload",{method:"POST",body:form})

alert("Archivo subido")

}


/* MARKET */

async function listProducts(){

const r=await fetch("/v1/marketplace/products")

const j=await r.json()

document.getElementById("market_result").innerText=
JSON.stringify(j,null,2)

}


/* OWNER */

async function ownerAction(){

const action=document.getElementById("owner_action").value
const payload=document.getElementById("owner_payload").value

const r=await fetch("/v1/owner/action",{

method:"POST",

headers:{
"Content-Type":"application/json",
"x-owner-session":ownerSession
},

body:payload

})

const j=await r.json()

document.getElementById("owner_result").innerText=
JSON.stringify(j,null,2)

}


/* AUTOPILOT */

async function runAutopilot(){

const company=auto_company.value
const action=auto_action.value
const input=auto_input.value

const r=await fetch("/v1/autopilot/run",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
company,
action,
input
})

})

const j=await r.json()

document.getElementById("auto_result").innerText=
JSON.stringify(j,null,2)

speak(j.narration)

}


/* EXPORT */

function getResult(){

return document.getElementById("auto_result").innerText

}

function copyResult(){

navigator.clipboard.writeText(getResult())

}

function downloadTxt(){

download("consia.txt","text/plain")

}

function downloadPDF(){

download("consia.pdf","application/pdf")

}

function downloadDoc(){

download("consia.doc","application/msword")

}

function downloadXls(){

download("consia.xls","application/vnd.ms-excel")

}

function download(name,type){

const blob=new Blob([getResult()],{type})

const a=document.createElement("a")

a.href=URL.createObjectURL(blob)

a.download=name

a.click()

}

async function saveToFiles(){

await fetch("/v1/files/save",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:"consia_export.txt",
content:getResult()

})

})

alert("Guardado en CONSIA Files")

}

</script>

</body>
</html>
