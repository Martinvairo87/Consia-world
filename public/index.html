<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA JARVIS COMMAND CENTER</title>

<style>

body{
margin:0;
font-family:Arial;
background:#040f1f;
color:white;
}

header{
padding:20px;
background:#081a2f;
border-bottom:1px solid #00eaff33;
}

h1{
margin:0;
color:#00eaff;
font-size:36px;
}

.container{
display:grid;
grid-template-columns:260px 1fr;
height:calc(100vh - 70px);
}

.sidebar{
background:#07192f;
padding:20px;
border-right:1px solid #00eaff22;
}

.sidebar button{
width:100%;
padding:14px;
margin-bottom:12px;
background:#0d294a;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
font-size:15px;
}

.sidebar button:hover{
background:#17457a;
}

.main{
padding:30px;
overflow:auto;
}

.card{
background:#0e223f;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.status{
font-size:18px;
margin-bottom:10px;
}

.green{color:#00ff9c}
.red{color:#ff4d4d}

textarea{
width:100%;
height:100px;
background:#07192f;
border:none;
border-radius:6px;
color:white;
padding:10px;
font-size:16px;
}

button.run{
margin-top:10px;
padding:12px 20px;
background:#2f7cff;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

pre{
background:#020b16;
padding:15px;
border-radius:8px;
overflow:auto;
font-size:14px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.agent{
background:#081a2f;
padding:15px;
border-radius:8px;
}

.agent h4{
margin:0 0 8px 0;
color:#00eaff;
}

</style>

</head>


<body>

<header>
<h1>CONSIA JARVIS COMMAND CENTER</h1>
</header>

<div class="container">

<div class="sidebar">

<button onclick="loadSystem()">System</button>
<button onclick="loadBrain()">Global Brain</button>
<button onclick="loadAgents()">Agent Swarm</button>
<button onclick="loadAutopilot()">Autopilot</button>
<button onclick="loadEconomy()">Economy</button>

</div>


<div class="main">

<div class="card">

<div class="status">
CORE: <span id="core" class="red">offline</span>
</div>

<div class="status">
API: <span id="api" class="red">offline</span>
</div>

<div class="status">
AGENTS: <span id="agents" class="red">offline</span>
</div>

<div class="status">
ECONOMY: <span id="economy" class="red">offline</span>
</div>

</div>


<div class="card">

<h2>CONSIA GLOBAL BRAIN</h2>

<textarea id="objective">crear negocio digital para Real Work</textarea>

<br>

<button class="run" onclick="runBrain()">RUN BRAIN</button>

<pre id="result"></pre>

</div>


<div class="card">

<h2>AGENT SWARM</h2>

<div class="grid">

<div class="agent">
<h4>Research Agent</h4>
<div id="agent_research">idle</div>
</div>

<div class="agent">
<h4>Analysis Agent</h4>
<div id="agent_analysis">idle</div>
</div>

<div class="agent">
<h4>Strategy Agent</h4>
<div id="agent_strategy">idle</div>
</div>

<div class="agent">
<h4>Execution Agent</h4>
<div id="agent_execution">idle</div>
</div>

</div>

</div>


</div>

</div>


<script>

const API="https://api.consia.world"


async function loadSystem(){

try{

const r=await fetch(API+"/health")
const j=await r.json()

if(j.ok){

document.getElementById("core").className="green"
document.getElementById("core").innerText="ACTIVE"

document.getElementById("api").className="green"
document.getElementById("api").innerText="ONLINE"

}

}catch(e){}

}


async function loadAgents(){

try{

const r=await fetch(API+"/v1/agents")
const j=await r.json()

if(j.ok){

document.getElementById("agents").className="green"
document.getElementById("agents").innerText="ACTIVE"

}

}catch(e){}

}


async function loadEconomy(){

try{

const r=await fetch(API+"/v1/economy")
const j=await r.json()

if(j.ok){

document.getElementById("economy").className="green"
document.getElementById("economy").innerText="ACTIVE"

}

}catch(e){}

}


async function loadBrain(){

const r=await fetch(API+"/v1/brain")
const j=await r.json()

document.getElementById("result").innerText=
JSON.stringify(j,null,2)

}


async function loadAutopilot(){

const r=await fetch(API+"/v1/autopilot")
const j=await r.json()

document.getElementById("result").innerText=
JSON.stringify(j,null,2)

}


async function runBrain(){

const objective=document.getElementById("objective").value

const r=await fetch(API+"/v1/brain/run",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
objective
})

})

const j=await r.json()

document.getElementById("result").innerText=
JSON.stringify(j,null,2)

document.getElementById("agent_research").innerText="completed"
document.getElementById("agent_analysis").innerText="completed"
document.getElementById("agent_strategy").innerText="completed"
document.getElementById("agent_execution").innerText="completed"

}


/* INIT */

async function init(){

await loadSystem()
await loadAgents()
await loadEconomy()

}

init()

</script>


</body>
</html>
