<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CONSIA - GOD MODE</title>

<style>
body {
  margin:0;
  background:#0a0f1c;
  color:#00f0ff;
  font-family:Arial;
}

.container {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

h1 {
  font-size:28px;
  margin-bottom:10px;
}

.status {
  color:#00ff88;
  margin-bottom:20px;
}

.chat {
  width:90%;
  max-width:500px;
  background:#11182b;
  border-radius:12px;
  padding:15px;
  height:300px;
  overflow:auto;
  margin-bottom:10px;
}

.input {
  display:flex;
  gap:10px;
  width:90%;
  max-width:500px;
}

input {
  flex:1;
  padding:10px;
  border-radius:8px;
  border:none;
}

button {
  padding:10px 15px;
  border:none;
  border-radius:8px;
  background:#00f0ff;
  color:black;
  cursor:pointer;
}

.voice-btn {
  margin-top:15px;
  background:#00ff88;
}
</style>
</head>

<body>

<div class="container">

<h1>CONSIA GOD MODE</h1>
<div class="status">🟢 SISTEMA ACTIVO</div>

<div class="chat" id="chat"></div>

<div class="input">
  <input id="text" placeholder="Escribí a CONSIA..." />
  <button onclick="enviar()">Enviar</button>
</div>

<button class="voice-btn" onclick="hablar()">🎤 Activar Voz</button>

</div>

<script>

const chat = document.getElementById("chat");

function agregar(msg) {
  chat.innerHTML += "<div>"+msg+"</div>";
  chat.scrollTop = chat.scrollHeight;
}

async function enviar() {
  const text = document.getElementById("text").value;

  agregar("🧑: " + text);

  // RESPUESTA SIMULADA (podés conectar al /v1/chat después)
  const respuesta = "CONSIA: Procesando → " + text;

  agregar("🤖: " + respuesta);

  // HABLAR AUTOMÁTICO
  hablarTexto(respuesta);
}

async function hablar() {
  hablarTexto("Hola Martín, CONSIA está en modo dios");
}

async function hablarTexto(texto) {
  const res = await fetch("https://api.consia.world/v1/voice", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ text: texto })
  });

  const blob = await res.blob();
  const url = URL.createObjectURL(blob);

  const audio = new Audio(url);
  audio.play();
}

</script>

</body>
</html>
