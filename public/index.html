<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONSIA CONTROL</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #000;
      color: #00e5ff;
      font-family: Arial, sans-serif;
    }
    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }
    h1 {
      margin: 0 0 16px;
      font-size: 32px;
    }
    .grid {
      display: grid;
      gap: 12px;
    }
    button {
      width: 100%;
      padding: 16px;
      border: 0;
      cursor: pointer;
      font-size: 16px;
      background: #00e5ff;
      color: #000;
      border-radius: 10px;
      font-weight: bold;
    }
    textarea, input {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #222;
      background: #111;
      color: #fff;
      font-size: 15px;
    }
    pre {
      background: #111;
      color: #fff;
      padding: 16px;
      border-radius: 10px;
      overflow: auto;
      min-height: 220px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .row {
      display: grid;
      gap: 12px;
      grid-template-columns: 1fr 1fr;
    }
    @media (max-width: 700px) {
      .row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>CONSIA CONTROL</h1>

    <div class="grid">
      <input id="api" value="https://api.consia.world" />

      <div class="row">
        <button onclick="getStatus()">STATUS</button>
        <button onclick="getMemory()">MEMORY</button>
      </div>

      <textarea id="message" rows="4" placeholder='Escribí algo. Ej: mi nombre es martin'></textarea>

      <div class="row">
        <button onclick="sendChat()">ENVIAR CHAT</button>
        <button onclick="getRealtime()">REALTIME</button>
      </div>

      <pre id="output">CONSIA listo.</pre>
    </div>
  </div>

  <script>
    function apiBase() {
      return document.getElementById("api").value.trim();
    }

    function show(data) {
      document.getElementById("output").textContent =
        typeof data === "string" ? data : JSON.stringify(data, null, 2);
    }

    async function getStatus() {
      const res = await fetch(apiBase() + "/v1/status");
      show(await res.json());
    }

    async function getMemory() {
      const res = await fetch(apiBase() + "/v1/memory");
      show(await res.json());
    }

    async function getRealtime() {
      const res = await fetch(apiBase() + "/v1/realtime/session");
      show(await res.json());
    }

    async function sendChat() {
      const message = document.getElementById("message").value.trim();

      const res = await fetch(apiBase() + "/v1/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message })
      });

      show(await res.json());
    }
  </script>
</body>
</html>
