<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CONSIA COMMAND CENTER</title>

<style>

body{
background:#0b0f19;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#05070f;
padding:20px;
font-size:22px;
font-weight:bold;
border-bottom:1px solid #222;
}

.container{
display:flex;
height:100vh;
}

.sidebar{
width:260px;
background:#070a12;
padding:20px;
border-right:1px solid #222;
}

.sidebar button{
width:100%;
margin-bottom:10px;
padding:12px;
background:#11172a;
border:none;
color:white;
cursor:pointer;
border-radius:6px;
}

.sidebar button:hover{
background:#1c2542;
}

.main{
flex:1;
padding:20px;
overflow:auto;
}

.card{
background:#11172a;
padding:20px;
border-radius:8px;
margin-bottom:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:10px;
background:#05070f;
border:1px solid #333;
color:white;
}

button.action{
margin-top:10px;
padding:10px 16px;
background:#2b4eff;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

pre{
background:#05070f;
padding:15px;
overflow:auto;
}

</style>
</head>

<body>

<header>
CONSIA COMMAND CENTER
</header>

<div class="container">

<div class="sidebar">

<button onclick="status()">System Status</button>
<button onclick="chat()">AI Chat</button>
<button onclick="addMemory()">Add Memory</button>
<button onclick="searchMemory()">Search Memory</button>
<button onclick="uploadFile()">Upload File</button>

</div>

<div class="main" id="main">

<div class="card">
<h3>CONSIA SYSTEM</h3>

<pre id="output">Loading...</pre>

</div>

</div>

</div>

<script>

const API="https://api.consia.world"

async function status(){

let res=await fetch(API)
let data=await res.json()

document.getElementById("output").innerText=
JSON.stringify(data,null,2)

}

async function chat(){

document.getElementById("main").innerHTML=`

<div class="card">

<h3>CONSIA CHAT</h3>

<textarea id="msg" placeholder="message"></textarea>

<button class="action" onclick="sendChat()">Send</button>

<pre id="chatRes"></pre>

</div>
`

}

async function sendChat(){

let message=document.getElementById("msg").value

let res=await fetch(API+"/v1/chat",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({message})
})

let data=await res.json()

document.getElementById("chatRes").innerText=
JSON.stringify(data,null,2)

}

async function addMemory(){

document.getElementById("main").innerHTML=`

<div class="card">

<h3>Add Memory</h3>

<textarea id="memory"></textarea>

<button class="action" onclick="sendMemory()">Save</button>

<pre id="memRes"></pre>

</div>
`

}

async function sendMemory(){

let text=document.getElementById("memory").value

let res=await fetch(API+"/v1/memory/add",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({text})
})

let data=await res.json()

document.getElementById("memRes").innerText=
JSON.stringify(data,null,2)

}

async function searchMemory(){

document.getElementById("main").innerHTML=`

<div class="card">

<h3>Search Memory</h3>

<input id="query">

<button class="action" onclick="sendSearch()">Search</button>

<pre id="searchRes"></pre>

</div>
`

}

async function sendSearch(){

let query=document.getElementById("query").value

let res=await fetch(API+"/v1/memory/search",{
method:"POST",
headers:{ "Content-Type":"application/json" },
body:JSON.stringify({query})
})

let data=await res.json()

document.getElementById("searchRes").innerText=
JSON.stringify(data,null,2)

}

async function uploadFile(){

document.getElementById("main").innerHTML=`

<div class="card">

<h3>Upload File</h3>

<input type="file" id="file">

<button class="action" onclick="sendFile()">Upload</button>

<pre id="fileRes"></pre>

</div>
`

}

async function sendFile(){

let file=document.getElementById("file").files[0]

let fd=new FormData()

fd.append("file",file)

let res=await fetch(API+"/v1/files/upload",{
method:"POST",
body:fd
})

let data=await res.json()

document.getElementById("fileRes").innerText=
JSON.stringify(data,null,2)

}

status()

</script>

</body>
</html>
