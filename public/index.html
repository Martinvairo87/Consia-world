<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CONSIA</title>
<style>
body{background:#02050d;color:#00e5ff;font-family:Arial;margin:0;text-align:center}
button,input,textarea{margin:6px;padding:12px;border-radius:10px;border:0;width:90%}
button{background:#00e5ff;color:#000;font-weight:bold}
#avatar{margin:20px auto;display:block}
pre{background:#111;padding:10px}
</style>
</head>

<body>

<h1>CONSIA JARVIS</h1>

<canvas id="avatar" width="200" height="200"></canvas>

<input id="api" value="https://api.consia.world">
<textarea id="msg" placeholder="Hablar con CONSIA"></textarea>

<button onclick="chat()">CHAT</button>
<button onclick="voice()">🎤 VOZ</button>

<textarea id="obj" placeholder="Objetivo"></textarea>

<button onclick="swarm()">SWARM</button>
<button onclick="auto()">AUTO</button>

<pre id="out">READY</pre>

<script>

// AVATAR
const ctx = document.getElementById("avatar").getContext("2d");
setInterval(()=>{
ctx.clearRect(0,0,200,200);
ctx.beginPath();
ctx.arc(100,100,60,0,Math.PI*2);
ctx.fillStyle="#00e5ff";
ctx.fill();
},500);

// CHAT
async function chat(){
const res=await fetch(API()+"/v1/chat",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({message:val("msg")})});
const data=await res.json();
out(data);
speak(data.response);
}

// VOZ
function voice(){
const r=new(window.SpeechRecognition||webkitSpeechRecognition)();
r.lang="es-AR";
r.onresult=e=>{
valSet("msg",e.results[0][0].transcript);
chat();
};
r.start();
}

// SWARM
async function swarm(){
const res=await fetch(API()+"/v1/swarm/run",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({objective:val("obj")})});
out(await res.json());
}

// AUTO
async function auto(){
const res=await fetch(API()+"/v1/autopilot/chain",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({objective:val("obj")})});
out(await res.json());
}

// SPEAK
function speak(t){
const u=new SpeechSynthesisUtterance(t);
u.lang="es-AR";
speechSynthesis.speak(u);
}

// UTILS
function API(){return val("api")}
function val(id){return document.getElementById(id).value}
function valSet(id,v){document.getElementById(id).value=v}
function out(d){document.getElementById("out").textContent=JSON.stringify(d,null,2)}

// REALTIME LOOP
setInterval(async()=>{
try{
const r=await fetch(API()+"/v1/dashboard/summary");
out(await r.json());
}catch{}
},4000);

</script>
</body>
</html>
