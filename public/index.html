<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CONSIA GOD MODE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; background:black; color:white; font-family:sans-serif; }

#avatar {
  width:100%;
  height:70vh;
  object-fit:cover;
}

.controls {
  position:fixed;
  bottom:20px;
  width:100%;
  text-align:center;
}

input,button {
  padding:15px;
  font-size:18px;
}
</style>
</head>

<body>

<video id="avatar" autoplay loop muted playsinline>
  <source src="https://cdn.pixabay.com/vimeo/458834826/business-47817.mp4?width=1280&hash=1c6b4c7" type="video/mp4">
</video>

<div class="controls">
  <input id="text" placeholder="Hablar con CONSIA">
  <button onclick="run()">Hablar</button>
</div>

<audio id="audio"></audio>

<script>
const API = "https://consia-api.jbdkb7r94d.workers.dev";
const audio = document.getElementById("audio");

async function run() {
  const text = document.getElementById("text").value;

  // IA
  const ai = await fetch(API + "/v1/brain", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ text })
  });

  const data = await ai.json();

  // VOZ PRO
  const tts = await fetch(API + "/v1/tts", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ text: data.text })
  });

  const blob = await tts.blob();
  const url = URL.createObjectURL(blob);

  audio.src = url;

  // lipsync básico por volumen
  const ctx = new AudioContext();
  const src = ctx.createMediaElementSource(audio);
  const analyser = ctx.createAnalyser();
  src.connect(analyser);
  analyser.connect(ctx.destination);

  const dataArray = new Uint8Array(analyser.frequencyBinCount);

  function anim() {
    analyser.getByteFrequencyData(dataArray);
    const volume = dataArray.reduce((a,b)=>a+b)/dataArray.length;

    const scale = 1 + volume / 500;
    document.getElementById("avatar").style.transform = `scale(${scale})`;

    requestAnimationFrame(anim);
  }

  audio.onplay = () => anim();
  audio.play();
}
</script>

</body>
</html>
