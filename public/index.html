<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CONSIA COMMAND CENTER PRO</title>
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  background: #03060d;
  color: #00e5ff;
  font-family: Arial, sans-serif;
}
.wrap {
  max-width: 1250px;
  margin: auto;
  padding: 24px;
}
h1 {
  margin: 0 0 20px;
  font-size: 34px;
}
.grid {
  display: grid;
  gap: 14px;
}
.row {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 12px;
}
input, textarea {
  width: 100%;
  padding: 14px;
  background: #111722;
  color: #fff;
  border: 1px solid #1d2633;
  border-radius: 12px;
  font-size: 15px;
}
textarea {
  min-height: 110px;
  resize: vertical;
}
button {
  padding: 14px;
  border: 0;
  border-radius: 12px;
  background: #00e5ff;
  color: #000;
  font-weight: bold;
  cursor: pointer;
}
pre {
  background: #111722;
  padding: 16px;
  border-radius: 12px;
  min-height: 280px;
  white-space: pre-wrap;
  word-break: break-word;
  overflow: auto;
  color: #fff;
}
@media (max-width: 900px) {
  .row { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="wrap">
  <h1>CONSIA COMMAND CENTER PRO</h1>

  <div class="grid">
    <input id="api" value="https://api.consia.world" />
    <textarea id="objective" placeholder="Objetivo..."></textarea>

    <div class="row">
      <button onclick="runSwarm()">SWARM RUN</button>
      <button onclick="loadExecutions()">EXECUTIONS</button>
      <button onclick="loadDashboard()">DASHBOARD</button>
    </div>

    <div class="row">
      <button onclick="runAutopilot()">AUTOPILOT</button>
      <button onclick="loadStatus()">STATUS</button>
      <button onclick="clearOut()">LIMPIAR</button>
    </div>

    <pre id="output">CONSIA READY</pre>
  </div>
</div>

<script>
function API() {
  return document.getElementById("api").value.trim();
}

function show(data) {
  document.getElementById("output").textContent =
    typeof data === "string" ? data : JSON.stringify(data, null, 2);
}

async function runSwarm() {
  const objective = document.getElementById("objective").value.trim();
  if (!objective) return;
  show("Cargando...");
  const res = await fetch(`${API()}/v1/swarm/run`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ objective })
  });
  show(await res.json());
}

async function loadExecutions() {
  show("Cargando...");
  const res = await fetch(`${API()}/v1/executions`);
  show(await res.json());
}

async function loadDashboard() {
  show("Cargando...");
  const res = await fetch(`${API()}/v1/dashboard/summary`);
  show(await res.json());
}

async function runAutopilot() {
  const objective = document.getElementById("objective").value.trim();
  if (!objective) return;
  show("Cargando...");
  const res = await fetch(`${API()}/v1/autopilot/run`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ objective })
  });
  show(await res.json());
}

async function loadStatus() {
  show("Cargando...");
  const res = await fetch(`${API()}/v1/status`);
  show(await res.json());
}

function clearOut() {
  show("CONSIA READY");
}
</script>
</body>
</html>
