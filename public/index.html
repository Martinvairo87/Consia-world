<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<title>CONSIA OS</title>

<style>

body{
margin:0;
background:#01030a;
color:#00eaff;
font-family:Arial;
overflow:hidden;
}

header{
background:#050a14;
padding:15px;
border-bottom:1px solid #00eaff33;
}

.container{
display:grid;
grid-template-columns:260px 1fr;
height:100vh;
}

.sidebar{
background:#060a14;
border-right:1px solid #00eaff22;
padding:15px;
}

.sidebar button{

width:100%;
padding:12px;
margin-bottom:10px;
background:#0c1424;
border:1px solid #00eaff33;
color:#00eaff;
cursor:pointer;

}

.sidebar button:hover{
background:#132040;
}

.main{
position:relative;
}

#panel{

position:absolute;
top:15px;
left:15px;
background:#060a14;
border:1px solid #00eaff33;
padding:15px;
width:320px;
font-size:12px;
z-index:10;

}

#avatar{

position:absolute;
bottom:25px;
right:25px;
width:200px;
height:200px;
border-radius:50%;
border:2px solid #00eaff;
background:radial-gradient(#00eaff55,#02040a);
display:flex;
align-items:center;
justify-content:center;
text-align:center;

}

canvas{
position:absolute;
top:0;
left:0;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

</head>

<body>

<header>

CONSIA OS INTERFACE

</header>

<div class="container">

<div class="sidebar">

<button onclick="health()">System Status</button>

<button onclick="memory()">Memory</button>

<button onclick="projects()">Projects</button>

<button onclick="create()">Create Project</button>

<button onclick="autopilot()">Start Autopilot</button>

<button onclick="autopilotStatus()">Autopilot Status</button>

<button onclick="voice()">Voice Command</button>

</div>

<div class="main">

<div id="panel">

CONSIA READY

</div>

<div id="avatar">

CONSIA<br>AI GUIDE

</div>

</div>

</div>

<script>

const API="https://api.consia.world"

function show(d){

document.getElementById("panel").innerText=
JSON.stringify(d,null,2)

}

/* API */

async function health(){

const r=await fetch(API+"/v1/health")
show(await r.json())

}

async function memory(){

const r=await fetch(API+"/v1/memory/status")
show(await r.json())

}

async function projects(){

const r=await fetch(API+"/v1/projects/status")
show(await r.json())

}

async function create(){

const r=await fetch(API+"/v1/project/create")
show(await r.json())

}

async function autopilot(){

const r=await fetch(API+"/v1/autopilot/start")
show(await r.json())

speak("Autopilot activated")

}

async function autopilotStatus(){

const r=await fetch(API+"/v1/autopilot/status")
show(await r.json())

}

/* VOICE */

function voice(){

const rec=new webkitSpeechRecognition()

rec.lang="en-US"

rec.onresult=e=>{

const text=e.results[0][0].transcript

document.getElementById("panel").innerText="VOICE: "+text

}

rec.start()

}

/* SPEECH */

function speak(text){

const s=new SpeechSynthesisUtterance(text)

speechSynthesis.speak(s)

}

/* THREE JS */

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(

75,
window.innerWidth/window.innerHeight,
0.1,
1000

)

const renderer=new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

camera.position.z=20

/* PLANET */

const geo=new THREE.SphereGeometry(7,64,64)

const mat=new THREE.MeshBasicMaterial({

color:0x00eaff,
wireframe:true

})

const planet=new THREE.Mesh(geo,mat)

scene.add(planet)

/* AGENTS */

const agents=[]

for(let i=0;i<60;i++){

const g=new THREE.SphereGeometry(.15,8,8)

const m=new THREE.MeshBasicMaterial({color:0xffffff})

const node=new THREE.Mesh(g,m)

node.position.x=(Math.random()-0.5)*16
node.position.y=(Math.random()-0.5)*16
node.position.z=(Math.random()-0.5)*16

scene.add(node)

agents.push(node)

}

/* CONNECTIONS */

const lines=[]

for(let i=0;i<agents.length;i++){

for(let j=i+1;j<agents.length;j++){

if(Math.random()<0.03){

const material=new THREE.LineBasicMaterial({color:0x00eaff})

const points=[]

points.push(agents[i].position)

points.push(agents[j].position)

const geometry=new THREE.BufferGeometry().setFromPoints(points)

const line=new THREE.Line(geometry,material)

scene.add(line)

lines.push(line)

}

}

}

/* ANIMATION */

function animate(){

requestAnimationFrame(animate)

planet.rotation.y+=0.002

agents.forEach(a=>{

a.rotation.y+=0.01

})

renderer.render(scene,camera)

}

animate()

</script>

</body>

</html>
