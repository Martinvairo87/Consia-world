<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CONSIA OS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  background: black;
  color: #00f0ff;
  font-family: Arial;
  text-align: center;
}
video {
  width: 100%;
  height: 60vh;
  object-fit: cover;
}
button {
  padding: 15px;
  margin: 10px;
  background: #00f0ff;
  border: none;
  font-size: 18px;
}
input {
  width: 80%;
  padding: 15px;
  font-size: 18px;
}
</style>
</head>

<body>

<h1>CONSIA AI</h1>

<video id="avatar" autoplay loop muted></video>

<input id="text" placeholder="Decile algo a CONSIA">
<br>
<button onclick="hablar()">Hablar</button>

<script>

const API = "https://TU-WORKER.workers.dev"; // CAMBIAR

async function hablar() {
  const text = document.getElementById("text").value;

  const res = await fetch(API + "/v1/avatar/create", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  esperarVideo(data.id);
}

async function esperarVideo(id) {
  let ready = false;

  while (!ready) {
    await new Promise(r => setTimeout(r, 2000));

    const res = await fetch(API + "/v1/avatar/status/" + id);
    const data = await res.json();

    if (data.result_url) {
      document.getElementById("avatar").src = data.result_url;
      ready = true;
    }
  }
}

</script>

</body>
</html>
