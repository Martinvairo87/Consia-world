<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CONSIA AVATAR</title>

<style>
body{
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}
</style>
</head>

<body>

<video id="avatar" autoplay muted loop playsinline>
  <source src="https://raw.githubusercontent.com/Martinvairo87/consia-avatar/main/avatar.mp4" type="video/mp4">
</video>

<script>
const API = "https://consia-api.jbdkb7r94d.workers.dev";

async function speak() {
  const res = await fetch(API);
  const text = await res.text();

  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "es-AR";
  msg.rate = 1;
  speechSynthesis.speak(msg);
}

setInterval(speak, 8000);
</script>

</body>
</html>
