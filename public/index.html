<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CONSIA</title>
</head>

<body style="background:#0b1020;color:white;font-family:Arial;padding:40px">

<h1>CONSIA SYSTEM ONLINE</h1>

<p>API Status:</p>

<pre id="health"></pre>

<input id="msg" placeholder="Hablar con CONSIA">
<button onclick="send()">Enviar</button>

<pre id="chat"></pre>

<script>

const API="https://api.consia.world"

async function load(){

const r=await fetch(API+"/health")
const j=await r.json()

document.getElementById("health").innerText=
JSON.stringify(j,null,2)

}

async function send(){

const msg=document.getElementById("msg").value

const r=await fetch(API+"/v1/chat",{
method:"POST",
headers:{ "Content-Type":"application/json"},
body:JSON.stringify({message:msg})
})

const j=await r.json()

document.getElementById("chat").innerText=j.answer

}

load()

</script>

</body>
</html>
