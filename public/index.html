<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CONSIA MARTIN REAL</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body { margin:0; background:black; }

#avatar {
  width:100%;
  height:70vh;
  object-fit:cover;
}

.controls {
  position:fixed;
  bottom:20px;
  width:100%;
  text-align:center;
}

input,button {
  padding:15px;
  font-size:18px;
}
</style>
</head>

<body>

<video id="avatar" autoplay loop muted playsinline></video>

<div class="controls">
  <input id="text" placeholder="Hablar con CONSIA">
  <button onclick="run()">Hablar</button>
</div>

<script>
const API = "https://consia-api.jbdkb7r94d.workers.dev";
const video = document.getElementById("avatar");

// 👉 SUBÍ TU VIDEO A INTERNET (Drive / GitHub / Cloudflare R2)
// 👉 y pegá el link acá
video.src = "https://TU-VIDEO.mp4";

async function run() {
  const text = document.getElementById("text").value;

  const res = await fetch(API + "/v1/brain", {
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  hablar(data.text);
}

function hablar(texto) {
  const utter = new SpeechSynthesisUtterance(texto);

  utter.onstart = () => {
    video.playbackRate = 1.1; // leve animación
  };

  utter.onend = () => {
    video.playbackRate = 1;
  };

  speechSynthesis.speak(utter);
}
</script>

</body>
</html>
