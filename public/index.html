<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA</title>

<style>

body{
font-family:system-ui;
background:#0b1220;
color:white;
margin:0;
padding:40px;
}

h1{
font-size:34px;
margin-bottom:20px;
}

.card{
background:#111a2f;
padding:24px;
border-radius:16px;
margin-bottom:20px;
}

button{
padding:10px 16px;
border:none;
border-radius:10px;
background:#27c07d;
color:white;
cursor:pointer;
margin-right:10px;
}

input,textarea{
width:100%;
padding:10px;
border-radius:10px;
border:none;
margin-top:10px;
margin-bottom:10px;
background:#1a2542;
color:white;
}

.small{
opacity:0.6;
font-size:13px;
}

</style>

</head>

<body>

<h1>CONSIA</h1>

<div class="card">

<h3>Owner Access</h3>

<button onclick="registerPasskey()">Registrar Passkey</button>
<button onclick="loginPasskey()">Entrar con FaceID</button>
<button onclick="logout()">Cerrar</button>

<pre id="owner"></pre>

</div>


<div class="card">

<h3>Chat CONSIA</h3>

<input id="chat_input" placeholder="Escribí tu mensaje...">

<button onclick="chat()">Enviar</button>

<pre id="chat_result"></pre>

</div>


<div class="card">

<h3>Swarm</h3>

<input id="swarm_task" placeholder="Ej: Crear plan comercial">

<button onclick="runSwarm()">Ejecutar swarm</button>

<pre id="swarm_result"></pre>

</div>


<div class="card">

<h3>Memory</h3>

<input id="memory_key" placeholder="key">

<textarea id="memory_value" placeholder="value"></textarea>

<button onclick="saveMemory()">Guardar</button>

<pre id="memory_result"></pre>

</div>


<div class="card">

<h3>Files R2</h3>

<input type="file" id="file_input">

<button onclick="upload()">Subir</button>

<pre id="files_result"></pre>

</div>


<div class="card">

<h3>Marketplace</h3>

<button onclick="market()">Listar productos</button>

<pre id="market_result"></pre>

</div>


<div class="card">

<h3>Owner Actions</h3>

<input id="action_type" placeholder="tipo acción">

<textarea id="action_payload">{}</textarea>

<button onclick="runAction()">Ejecutar</button>

<pre id="action_result"></pre>

</div>


<div class="card">

<h3>CONSIA AUTOPILOT MASTER</h3>

<input id="auto_company" placeholder="empresa">

<input id="auto_action" placeholder="acción">

<textarea id="auto_input" placeholder="decile qué querés crear"></textarea>

<button onclick="runAutopilot()">Ejecutar Autopilot</button>

<pre id="auto_result"></pre>

</div>


<script>

let ownerSession=null


async function registerPasskey(){

let r=await fetch("/v1/passkey/register/challenge")
let c=await r.json()

document.getElementById("owner").innerText=JSON.stringify(c,null,2)

}


async function loginPasskey(){

let r=await fetch("/v1/passkey/login/challenge")
let c=await r.json()

let res=await fetch("/v1/passkey/login/verify",{
method:"POST",
headers:{'Content-Type':'application/json'},
body:JSON.stringify({challenge:c.challenge})
})

let j=await res.json()

ownerSession=j.owner_session

document.getElementById("owner").innerText=JSON.stringify(j,null,2)

}


function logout(){

ownerSession=null

}


async function chat(){

let msg=document.getElementById("chat_input").value

let r=await fetch("/v1/chat",{

method:"POST",

headers:{
'Content-Type':'application/json',
'x-owner-session':ownerSession
},

body:JSON.stringify({message:msg})

})

let j=await r.json()

document.getElementById("chat_result").innerText=JSON.stringify(j,null,2)

}



async function runSwarm(){

let task=document.getElementById("swarm_task").value

let r=await fetch("/v1/swarm/run",{

method:"POST",

headers:{
'Content-Type':'application/json',
'x-owner-session':ownerSession
},

body:JSON.stringify({task})

})

let j=await r.json()

document.getElementById("swarm_result").innerText=JSON.stringify(j,null,2)

}



async function saveMemory(){

let key=document.getElementById("memory_key").value
let value=document.getElementById("memory_value").value

let r=await fetch("/v1/memory/save",{

method:"POST",

headers:{
'Content-Type':'application/json',
'x-owner-session':ownerSession
},

body:JSON.stringify({key,value})

})

let j=await r.json()

document.getElementById("memory_result").innerText=JSON.stringify(j,null,2)

}



async function upload(){

let f=document.getElementById("file_input").files[0]

let fd=new FormData()

fd.append("file",f)

let r=await fetch("/v1/files/upload",{

method:"POST",

headers:{
'x-owner-session':ownerSession
},

body:fd

})

let j=await r.json()

document.getElementById("files_result").innerText=JSON.stringify(j,null,2)

}



async function market(){

let r=await fetch("/v1/marketplace/products")

let j=await r.json()

document.getElementById("market_result").innerText=JSON.stringify(j,null,2)

}



async function runAction(){

let type=document.getElementById("action_type").value

let payload=document.getElementById("action_payload").value

let r=await fetch("/v1/owner/action",{

method:"POST",

headers:{
'Content-Type':'application/json',
'x-owner-session':ownerSession
},

body:JSON.stringify({

type:type,
payload:JSON.parse(payload)

})

})

let j=await r.json()

document.getElementById("action_result").innerText=JSON.stringify(j,null,2)

}



async function runAutopilot(){

let company=document.getElementById("auto_company").value
let action=document.getElementById("auto_action").value
let input=document.getElementById("auto_input").value

let r=await fetch("/v1/autopilot/run",{

method:"POST",

headers:{
'Content-Type':'application/json',
'x-owner-session':ownerSession
},

body:JSON.stringify({

company,
action,
input

})

})

let j=await r.json()

document.getElementById("auto_result").innerText=JSON.stringify(j,null,2)

}

</script>

</body>
</html>
