<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA</title>

<link rel="icon" href="/favicon.ico">

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,Segoe UI,Roboto,Helvetica,Arial;
background:#0b0b0c;
color:white;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
height:100vh;
text-align:center;
}

h1{
font-size:64px;
margin-bottom:10px;
}

p{
opacity:0.6;
font-size:18px;
}

button{
margin-top:30px;
padding:14px 28px;
border-radius:10px;
border:none;
background:white;
color:black;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:0.8;
}

#status{
margin-top:40px;
font-size:14px;
opacity:0.5;
}

</style>

</head>
<body>

<h1>CONSIA</h1>

<p>Autonomous Intelligence Infrastructure</p>

<button onclick="openApp()">
Open CONSIA
</button>

<div id="status">
Checking system...
</div>

<script>

const API = "https://api.consia.world"

async function checkSystem(){

try{

const res = await fetch(API + "/v1/health")

const data = await res.json()

if(data.ok){

document.getElementById("status").innerHTML =
"CONSIA CORE ACTIVE"

}else{

document.getElementById("status").innerHTML =
"API ERROR"

}

}catch(e){

document.getElementById("status").innerHTML =
"API OFFLINE"

}

}

function openApp(){

window.location.href = "/app"

}

checkSystem()

</script>

</body>
</html>
