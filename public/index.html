<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CONSIA</title>

<style>
body{
  margin:0;
  background:#0b0f19;
  font-family:Arial;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  height:100vh;
}

#avatar{
  width:420px;
  height:520px;
  background:#111;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 0 40px rgba(0,150,255,0.3);
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
}

.controls{
  margin-top:20px;
  display:flex;
  gap:10px;
}

button{
  padding:12px 18px;
  border:none;
  border-radius:10px;
  background:#00c2ff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

button:hover{
  background:#00a8e0;
}

.status{
  margin-top:10px;
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>

<h1>CONSIA</h1>

<div id="avatar">
  <video id="video" autoplay muted></video>
</div>

<div class="controls">
  <button onclick="start()">🎙 Hablar</button>
  <button onclick="stop()">⛔ Stop</button>
</div>

<div class="status" id="status">Esperando...</div>

<script>
let recognition;
let isRunning = false;

async function start(){
  if(isRunning) return;
  isRunning = true;

  document.getElementById("status").innerText = "Escuchando...";

  recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
  recognition.lang = "es-AR";
  recognition.continuous = true;

  recognition.onresult = async (event)=>{
    let text = event.results[event.results.length -1][0].transcript;
    document.getElementById("status").innerText = "Pensando: " + text;

    const res = await fetch("https://api.consia.world/v1/chat",{
      method:"POST",
      headers:{ "Content-Type":"application/json"},
      body: JSON.stringify({ message:text })
    });

    const data = await res.json();

    speak(data.reply);
  };

  recognition.start();
}

function stop(){
  isRunning = false;
  if(recognition) recognition.stop();
  document.getElementById("status").innerText = "Detenido";
}

function speak(text){
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang = "es-AR";
  speechSynthesis.speak(utter);
}
</script>

</body>
</html>
