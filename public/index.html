<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>CONSIA CORE ULTRA</title>

<style>

body{
margin:0;
background:#02040a;
color:#00eaff;
font-family:Arial;
}

header{
background:#050a14;
padding:20px;
border-bottom:1px solid #00eaff33;
letter-spacing:2px;
}

.container{
display:grid;
grid-template-columns:220px 1fr;
height:100vh;
}

.sidebar{
background:#060a14;
border-right:1px solid #00eaff22;
padding:15px;
}

.sidebar button{
width:100%;
padding:10px;
margin-bottom:10px;
background:#0c1424;
border:1px solid #00eaff33;
color:#00eaff;
cursor:pointer;
}

.main{
padding:20px;
}

.panel{
background:#060a14;
border:1px solid #00eaff33;
padding:15px;
margin-bottom:15px;
}

canvas{
width:100%;
height:250px;
background:#000;
}

</style>

</head>

<body>

<header>
CONSIA CORE ULTRA
</header>

<div class="container">

<div class="sidebar">

<button onclick="status()">System</button>
<button onclick="agents()">Agents</button>
<button onclick="projects()">Projects</button>
<button onclick="memory()">Memory</button>
<button onclick="start()">Autopilot</button>

</div>

<div class="main">

<div id="output" class="panel">
CONSIA READY
</div>

<canvas id="map"></canvas>

</div>

</div>

<script>

const API="https://api.consia.world";

async function status(){
const r=await fetch(API+"/v1/health");
show(await r.json());
}

async function agents(){
const r=await fetch(API+"/v1/agents");
show(await r.json());
}

async function projects(){
const r=await fetch(API+"/v1/projects");
show(await r.json());
}

async function memory(){
const r=await fetch(API+"/v1/memory");
show(await r.json());
}

async function start(){
const r=await fetch(API+"/v1/autopilot/start");
show(await r.json());
}

function show(d){
document.getElementById("output").innerText=
JSON.stringify(d,null,2);
}

/* simple network map */

const c=document.getElementById("map");
const ctx=c.getContext("2d");

function draw(){

ctx.fillStyle="black";
ctx.fillRect(0,0,c.width,c.height);

for(let i=0;i<30;i++){

ctx.fillStyle="#00eaff";

ctx.beginPath();

ctx.arc(
Math.random()*c.width,
Math.random()*c.height,
2,
0,
6.28
);

ctx.fill();

}

}

setInterval(draw,1000);

</script>

</body>
</html>
