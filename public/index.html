<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CONSIA OS</title>

<style>
body {
  margin:0;
  background:black;
  color:#00f0ff;
  font-family:Arial;
}
.panel {
  padding:20px;
}
button {
  width:100%;
  padding:18px;
  margin:6px 0;
  font-size:16px;
  background:#00f0ff;
  color:black;
  border:none;
}
#log {
  background:#111;
  padding:10px;
  height:300px;
  overflow:auto;
}
</style>
</head>

<body>

<div class="panel">
  <h2>CONSIA CONTROL</h2>

  <button onclick="run('status')">STATUS</button>
  <button onclick="run('chat')">ACTIVAR</button>
  <button onclick="run('memory')">MEMORY</button>
  <button onclick="run('realtime')">REALTIME</button>
  <button onclick="run('autopilot')">AUTOPILOT</button>

  <pre id="log"></pre>
</div>

<script>
const API = "https://api.consia.world";

async function run(type){
  let res;

  if(type === "status"){
    res = await fetch(API + "/v1/status");
  }

  if(type === "chat"){
    res = await fetch(API + "/v1/chat", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({message:"activar consia"})
    });
  }

  if(type === "memory"){
    res = await fetch(API + "/v1/memory");
  }

  if(type === "realtime"){
    res = await fetch(API + "/v1/realtime/session");
  }

  if(type === "autopilot"){
    res = await fetch(API + "/v1/autopilot/start", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({task:"crear negocio automatico"})
    });
  }

  document.getElementById("log").innerText = await res.text();
}
</script>

</body>
</html>
