<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CONSIA AVATAR CORE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  background:black;
  color:#00f0ff;
  font-family:Arial;
  text-align:center;
}

canvas {
  width:100%;
  height:70vh;
  background:black;
}

.controls {
  position:fixed;
  bottom:20px;
  width:100%;
}

input,button {
  padding:15px;
  font-size:18px;
}
</style>
</head>

<body>

<canvas id="avatar"></canvas>

<div class="controls">
  <input id="text" placeholder="Hablar con CONSIA">
  <button onclick="run()">Hablar</button>
</div>

<script>
const API = "https://consia-api.jbdkb7r94d.workers.dev";
const canvas = document.getElementById("avatar");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight * 0.7;

// cara base
function drawFace(mouthOpen) {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // cabeza
  ctx.beginPath();
  ctx.arc(canvas.width/2, canvas.height/2, 120, 0, Math.PI*2);
  ctx.strokeStyle = "#00f0ff";
  ctx.lineWidth = 3;
  ctx.stroke();

  // ojos
  ctx.beginPath();
  ctx.arc(canvas.width/2 - 40, canvas.height/2 - 30, 10, 0, Math.PI*2);
  ctx.arc(canvas.width/2 + 40, canvas.height/2 - 30, 10, 0, Math.PI*2);
  ctx.fillStyle = "#00f0ff";
  ctx.fill();

  // boca
  ctx.fillRect(canvas.width/2 - 50, canvas.height/2 + 40, 100, mouthOpen);
}

drawFace(10);

async function run() {
  const text = document.getElementById("text").value;

  const res = await fetch(API + "/v1/brain", {
    method: "POST",
    headers: { "Content-Type":"application/json" },
    body: JSON.stringify({ text })
  });

  const data = await res.json();

  hablar(data.text);
}

function hablar(texto) {
  const utter = new SpeechSynthesisUtterance(texto);

  let interval;

  utter.onstart = () => {
    interval = setInterval(()=>{
      const open = 10 + Math.random()*50;
      drawFace(open);
    }, 80);
  };

  utter.onend = () => {
    clearInterval(interval);
    drawFace(10);
  };

  speechSynthesis.speak(utter);
}
</script>

</body>
</html>
