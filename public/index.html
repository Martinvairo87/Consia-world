<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CONSIA REAL AVATAR</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body { margin:0; background:black; color:white; font-family:sans-serif; text-align:center; }
video {
  width:100%;
  height:70vh;
  object-fit:cover;
}
input,button {
  padding:15px;
  font-size:18px;
  margin:10px;
}
</style>
</head>

<body>

<h1>CONSIA REALTIME AVATAR</h1>

<video id="avatar" autoplay loop muted playsinline>
  <source src="https://cdn.pixabay.com/vimeo/458834826/business-47817.mp4?width=1280&hash=1c6b4c7" type="video/mp4">
</video>

<input id="text" placeholder="Hablar con CONSIA">
<br>
<button onclick="hablar()">Hablar</button>

<script>
const API = "https://consia-api.jbdkb7r94d.workers.dev";

async function hablar() {
  const input = document.getElementById("text").value;

  const res = await fetch(API + "/v1/brain", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ text: input })
  });

  const data = await res.json();

  hablarVoz(data.text);
}

function hablarVoz(texto) {
  const utter = new SpeechSynthesisUtterance(texto);

  utter.rate = 1;
  utter.pitch = 1;

  speechSynthesis.speak(utter);
}
</script>

</body>
</html>
