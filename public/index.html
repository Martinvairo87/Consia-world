<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>CONSIA CONTROL CENTER V2</title>

<style>

body{
margin:0;
background:#02040a;
color:#00eaff;
font-family:Arial;
overflow:hidden;
}

header{
background:#050a14;
padding:16px;
border-bottom:1px solid #00eaff33;
font-size:18px;
}

.container{
display:grid;
grid-template-columns:260px 1fr;
height:100vh;
}

.sidebar{
background:#060a14;
border-right:1px solid #00eaff22;
padding:15px;
}

.sidebar button{

width:100%;
padding:12px;
margin-bottom:10px;
background:#0c1424;
border:1px solid #00eaff33;
color:#00eaff;
cursor:pointer;
font-size:14px;

}

.sidebar button:hover{
background:#102040;
}

.main{
position:relative;
}

#panel{

position:absolute;
top:10px;
left:10px;
background:#060a14;
border:1px solid #00eaff33;
padding:15px;
width:320px;
font-size:12px;
z-index:20;

}

#avatar{

position:absolute;
bottom:20px;
right:20px;
width:140px;
height:140px;
border-radius:50%;
border:2px solid #00eaff;
background:radial-gradient(#00eaff33,#02040a);

display:flex;
align-items:center;
justify-content:center;

font-size:12px;
text-align:center;

}

canvas{
position:absolute;
top:0;
left:0;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

</head>

<body>

<header>

CONSIA CONTROL CENTER V2

</header>

<div class="container">

<div class="sidebar">

<button onclick="health()">System Status</button>

<button onclick="memory()">Memory</button>

<button onclick="projects()">Projects</button>

<button onclick="create()">Create Project</button>

<button onclick="autopilot()">Start Autopilot</button>

<button onclick="autopilotStatus()">Autopilot Status</button>

<button onclick="voice()">Voice Command</button>

</div>

<div class="main">

<div id="panel">

CONSIA READY

</div>

<div id="avatar">

CONSIA<br>Guide

</div>

</div>

</div>

<script>

const API="https://api.consia.world"

function show(data){

document.getElementById("panel").innerText=

JSON.stringify(data,null,2)

}

/* API */

async function health(){

const r=await fetch(API+"/v1/health")

show(await r.json())

}

async function memory(){

const r=await fetch(API+"/v1/memory/status")

show(await r.json())

}

async function projects(){

const r=await fetch(API+"/v1/projects/status")

show(await r.json())

}

async function create(){

const r=await fetch(API+"/v1/project/create")

show(await r.json())

}

async function autopilot(){

const r=await fetch(API+"/v1/autopilot/start")

show(await r.json())

speak("Autopilot activated")

}

async function autopilotStatus(){

const r=await fetch(API+"/v1/autopilot/status")

show(await r.json())

}

/* VOICE */

function voice(){

const rec=new webkitSpeechRecognition()

rec.lang="en-US"

rec.onresult=e=>{

const text=e.results[0][0].transcript

document.getElementById("panel").innerText="VOICE: "+text

}

rec.start()

}

/* SPEECH */

function speak(text){

const s=new SpeechSynthesisUtterance(text)

speechSynthesis.speak(s)

}

/* 3D MAP */

const scene=new THREE.Scene()

const camera=new THREE.PerspectiveCamera(

75,

window.innerWidth/window.innerHeight,

0.1,

1000

)

const renderer=new THREE.WebGLRenderer({antialias:true})

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

const geometry=new THREE.SphereGeometry(5,64,64)

const material=new THREE.MeshBasicMaterial({

color:0x00eaff,

wireframe:true

})

const globe=new THREE.Mesh(geometry,material)

scene.add(globe)

camera.position.z=12

function animate(){

requestAnimationFrame(animate)

globe.rotation.y+=0.002

renderer.render(scene,camera)

}

animate()

</script>

</body>

</html>
