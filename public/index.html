<!DOCTYPE html>
<html>

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA GLOBAL COMMAND CENTER</title>

<style>

body{
margin:0;
background:#061021;
font-family:Arial;
color:white;
}

header{
padding:20px;
background:#0b1d33;
border-bottom:1px solid #0ff3;
}

h1{
margin:0;
color:#00eaff;
}

.container{
display:grid;
grid-template-columns:260px 1fr;
height:calc(100vh - 70px);
}

.sidebar{
background:#081a2f;
padding:20px;
border-right:1px solid #0ff3;
}

.sidebar button{
width:100%;
padding:14px;
margin-bottom:12px;
background:#0e2c4c;
border:none;
border-radius:6px;
color:#fff;
cursor:pointer;
font-size:14px;
}

.sidebar button:hover{
background:#1c4f7c;
}

.main{
padding:30px;
overflow:auto;
}

.card{
background:#0e223f;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}

.status{
font-size:18px;
margin-bottom:10px;
}

.green{
color:#00ff9c;
}

.red{
color:#ff4d4d;
}

textarea{
width:100%;
height:80px;
background:#07192f;
border:none;
border-radius:6px;
color:white;
padding:10px;
}

button.run{
margin-top:10px;
padding:12px 20px;
background:#2f7cff;
border:none;
border-radius:6px;
color:white;
cursor:pointer;
}

pre{
background:#05101d;
padding:15px;
border-radius:8px;
overflow:auto;
}

</style>

</head>

<body>

<header>
<h1>CONSIA GLOBAL COMMAND CENTER</h1>
</header>

<div class="container">

<div class="sidebar">

<button onclick="loadSystem()">System</button>
<button onclick="loadBrain()">Global Brain</button>
<button onclick="loadAgents()">Agent Swarm</button>
<button onclick="loadAutopilot()">Autopilot</button>
<button onclick="loadEconomy()">Economy</button>

</div>

<div class="main">

<div class="card">

<div class="status">
CORE: <span id="core" class="red">offline</span>
</div>

<div class="status">
API: <span id="api" class="red">offline</span>
</div>

<div class="status">
AGENTS: <span id="agents" class="red">offline</span>
</div>

<div class="status">
ECONOMY: <span id="economy" class="red">offline</span>
</div>

</div>

<div class="card">

<h3>CONSIA GLOBAL BRAIN</h3>

<textarea id="objective">crear negocio digital para Real Work</textarea>

<br>

<button class="run" onclick="runBrain()">RUN BRAIN</button>

<pre id="result"></pre>

</div>

</div>

</div>

<script>

const API="https://api.consia.world"


async function loadSystem(){

try{

const r=await fetch(API+"/health")
const j=await r.json()

if(j.ok){

document.getElementById("core").className="green"
document.getElementById("core").innerText="ACTIVE"

document.getElementById("api").className="green"
document.getElementById("api").innerText="ONLINE"

}

}catch(e){

console.log(e)

}

}


async function loadBrain(){

const r=await fetch(API+"/v1/brain")
const j=await r.json()

document.getElementById("result").innerText=
JSON.stringify(j,null,2)

}


async function loadAgents(){

const r=await fetch(API+"/v1/agents")
const j=await r.json()

document.getElementById("agents").className="green"
document.getElementById("agents").innerText="ACTIVE"

document.getElementById("result").innerText=
JSON.stringify(j,null,2)

}


async function loadAutopilot(){

const r=await fetch(API+"/v1/autopilot")
const j=await r.json()

document.getElementById("result").innerText=
JSON.stringify(j,null,2)

}


async function loadEconomy(){

const r=await fetch(API+"/v1/economy")
const j=await r.json()

document.getElementById("economy").className="green"
document.getElementById("economy").innerText="ACTIVE"

document.getElementById("result").innerText=
JSON.stringify(j,null,2)

}


async function runBrain(){

const objective=document.getElementById("objective").value

const r=await fetch(API+"/v1/brain/run",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
objective:objective
})

})

const j=await r.json()

document.getElementById("result").innerText=
JSON.stringify(j,null,2)

}


loadSystem()

</script>

</body>
</html>
