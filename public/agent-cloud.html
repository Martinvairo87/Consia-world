<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA AGENT CLOUD</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial;
color:white;
}

.container{
max-width:1200px;
margin:auto;
padding:40px;
}

h1{
text-align:center;
color:#00eaff;
}

.panel{
background:#071426;
border-radius:12px;
padding:30px;
margin-top:30px;
}

.grid{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:30px;

}

.card{

background:#0d1f35;
padding:20px;
border-radius:10px;
text-align:center;

}

button{

margin-top:10px;
padding:10px 16px;
border:none;
border-radius:20px;
background:#00eaff;
cursor:pointer;

}

.result{

margin-top:30px;
background:#081424;
padding:20px;
border-radius:10px;
white-space:pre-wrap;

}

</style>

</head>

<body>

<div class="container">

<h1>CONSIA AGENT CLOUD</h1>

<div class="panel">

<div class="grid" id="agentGrid">

</div>

<div class="result" id="agentResult">
Resultado del agente aparecerá aquí
</div>

</div>

</div>

<script>

const agents=[

{name:"research_agent",desc:"Investigación"},
{name:"analysis_agent",desc:"Análisis"},
{name:"strategy_agent",desc:"Estrategia"},
{name:"execution_agent",desc:"Ejecución"},

{name:"marketing_agent",desc:"Marketing"},
{name:"growth_agent",desc:"Growth"},
{name:"finance_agent",desc:"Finanzas"},
{name:"legal_agent",desc:"Legal"},

{name:"sales_agent",desc:"Ventas"},
{name:"product_agent",desc:"Producto"},
{name:"design_agent",desc:"Diseño"},
{name:"automation_agent",desc:"Automatización"}

]

const API="https://api.consia.world"

function loadAgents(){

let html=""

agents.forEach((a,i)=>{

html+=`
<div class="card">

<b>${a.name}</b>
<br>
${a.desc}
<br>

<button onclick="runAgent('${a.name}')">
Ejecutar
</button>

</div>
`

})

document.getElementById("agentGrid").innerHTML=html

}

async function runAgent(agent){

const r=await fetch(API+"/v1/brain/run",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

objective:"run "+agent

})

})

const j=await r.json()

document.getElementById("agentResult").innerText=
JSON.stringify(j,null,2)

}

loadAgents()

</script>

</body>
</html>
