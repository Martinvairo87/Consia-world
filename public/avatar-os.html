<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CONSIA Avatar OS</title>

<style>
body{
margin:0;
background:#07111f;
color:white;
font-family:sans-serif;
text-align:center;
}

#avatarCanvas{
width:100%;
height:70vh;
}

button{
padding:12px 18px;
margin:6px;
border-radius:12px;
border:none;
background:#0ea5e9;
color:white;
font-weight:700;
}
</style>
</head>

<body>

<h1>CONSIA AVATAR</h1>

<canvas id="avatarCanvas"></canvas>

<div>

<button onclick="loadCONSIA('consia')">CONSIA</button>
<button onclick="loadCONSIA('martin')">MARTIN</button>
<button onclick="loadCONSIA('martin-futurista')">MARTIN FUTURE</button>

</div>

<script type="module">

import {
initAvatar,
loadAvatar,
startListening,
startCamera
} from "/avatar/consia-avatar-engine-v3.js";

initAvatar("avatarCanvas");

loadAvatar("consia");

startListening();
startCamera();

window.loadCONSIA = loadAvatar;

</script>

</body>
</html>
