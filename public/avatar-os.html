<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CONSIA AVATAR OS</title>

<style>

body{
margin:0;
background:#050f1c;
font-family:system-ui;
color:white;
text-align:center;
}

header{
padding:20px;
}

canvas{
width:100%;
height:70vh;
}

button{
padding:12px 20px;
margin:6px;
border-radius:12px;
border:none;
background:#0ea5e9;
color:white;
font-weight:600;
}

.avatar-selector{
margin-top:10px;
}

</style>

</head>

<body>

<header>

<h2>CONSIA AVATAR OS</h2>

<div class="avatar-selector">

<button onclick="loadAvatar('consia')">CONSIA</button>

<button onclick="loadAvatar('martin')">MARTIN</button>

<button onclick="loadAvatar('future')">MARTIN FUTURE</button>

</div>

</header>

<canvas id="scene"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/build/three.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/three@0.160/examples/js/loaders/GLTFLoader.js"></script>

<script>

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,0.1,1000)

let renderer=new THREE.WebGLRenderer({canvas:document.getElementById("scene"),alpha:true})

renderer.setSize(window.innerWidth,window.innerHeight)

camera.position.z=3

let light=new THREE.HemisphereLight(0xffffff,0x444444,1)

scene.add(light)

let loader=new THREE.GLTFLoader()

let avatar

function loadAvatar(type){

if(avatar) scene.remove(avatar)

let model

if(type==="consia"){

model="/avatar/consia.glb"

}

if(type==="martin"){

model="/avatar/martin.glb"

}

if(type==="future"){

model="/avatar/martin-futurista.glb"

}

loader.load(model,function(gltf){

avatar=gltf.scene

scene.add(avatar)

})

}

function animate(){

requestAnimationFrame(animate)

renderer.render(scene,camera)

}

animate()

</script>

<script>

async function startCamera(){

let stream=await navigator.mediaDevices.getUserMedia({video:true})

}

startCamera()

</script>

<script>

const recognition=new webkitSpeechRecognition()

recognition.continuous=true

recognition.start()

recognition.onresult=(e)=>{

let text=e.results[e.results.length-1][0].transcript

fetch("https://api.consia.world/v1/chat",{

method:"POST",

headers:{"Content-Type":"application/json"},

body:JSON.stringify({message:text})

})

}

</script>

</body>
</html>
