<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CONSIA Avatar</title>

<style>

body{
margin:0;
background:#07111f;
color:white;
font-family:system-ui;
text-align:center;
}

#avatarCanvas{
width:100%;
height:70vh;
}

button{
padding:12px 20px;
margin:6px;
border-radius:10px;
border:none;
background:#0ea5e9;
color:white;
font-weight:700;
cursor:pointer;
}

</style>

</head>

<body>

<h1>CONSIA Avatar</h1>

<canvas id="avatarCanvas"></canvas>

<div>

<button onclick="loadCONSIA('consia')">CONSIA</button>

<button onclick="loadCONSIA('martin')">MARTIN</button>

<button onclick="loadCONSIA('martin-futurista')">MARTIN FUTURE</button>

</div>

<script type="module">

import {

initCONSIAAvatar,
loadAvatar,
startListening,
startCamera

} from "/avatar/consia-avatar-engine-v5.js";

initCONSIAAvatar("avatarCanvas");

loadAvatar("consia");

startListening();

startCamera();

window.loadCONSIA = loadAvatar;

</script>

</body>
</html>
