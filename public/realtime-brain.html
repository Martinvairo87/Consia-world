<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA GLOBAL REALTIME BRAIN</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial,Helvetica,sans-serif;
color:white;
}

.header{
text-align:center;
padding:30px;
font-size:30px;
color:#00eaff;
letter-spacing:2px;
}

.container{
max-width:1300px;
margin:auto;
padding:30px;
}

.panel{
background:#071426;
padding:25px;
border-radius:14px;
margin-bottom:25px;
box-shadow:0 0 18px rgba(0,234,255,0.08);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.box{
background:#081424;
padding:18px;
border-radius:12px;
text-align:center;
}

.box h3{
margin:0 0 10px 0;
font-size:14px;
letter-spacing:1px;
color:#00eaff;
}

.value{
font-size:24px;
font-weight:bold;
}

input{
width:100%;
padding:14px;
border-radius:20px;
border:none;
background:#0f223c;
color:white;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 24px;
border:none;
border-radius:25px;
background:#00eaff;
color:#00151f;
font-weight:bold;
cursor:pointer;
margin-right:10px;
}

button:hover{
transform:scale(1.04);
}

.log{
margin-top:20px;
background:#081424;
padding:20px;
border-radius:12px;
font-size:13px;
white-space:pre-wrap;
max-height:360px;
overflow:auto;
}

.stream{
margin-top:20px;
background:#081424;
padding:20px;
border-radius:12px;
font-size:13px;
max-height:300px;
overflow:auto;
}

.event{
border-bottom:1px solid #0f223c;
padding:10px 0;
}

.footer{
text-align:center;
padding:20px;
font-size:12px;
color:#3aaec9;
}

</style>

</head>

<body>

<div class="header">
CONSIA GLOBAL REALTIME BRAIN
</div>

<div class="container">

<div class="panel">

<h2>Control en tiempo real</h2>

<input id="objective" placeholder="Ej: coordinar agentes para crear negocio digital inmobiliario">

<button onclick="startRealtimeBrain()">Iniciar cerebro</button>
<button onclick="stopRealtimeBrain()">Detener</button>
<button onclick="triggerCycle()">Ejecutar ciclo</button>

<div class="grid">

<div class="box">
<h3>ESTADO</h3>
<div class="value" id="brainState">IDLE</div>
</div>

<div class="box">
<h3>CICLOS</h3>
<div class="value" id="cycles">0</div>
</div>

<div class="box">
<h3>EVENTOS</h3>
<div class="value" id="eventsCount">0</div>
</div>

<div class="box">
<h3>AGENTES</h3>
<div class="value" id="activeAgents">0</div>
</div>

<div class="box">
<h3>OBJETIVOS</h3>
<div class="value" id="goalsCount">0</div>
</div>

<div class="box">
<h3>SEÑALES</h3>
<div class="value" id="signals">0</div>
</div>

</div>

</div>

<div class="panel">

<h2>Realtime stream</h2>

<div class="stream" id="stream">
Esperando actividad en tiempo real...
</div>

</div>

<div class="panel">

<h2>Brain log</h2>

<div class="log" id="log">
Sistema esperando inicialización...
</div>

</div>

</div>

<div class="footer">
CONSIA AI OPERATING SYSTEM — REALTIME BRAIN ACTIVE LAYER
</div>

<script>

let brainRuntime={
active:false,
cycles:0,
events:0,
signals:0,
goals:[],
agents:[
"research_agent",
"analysis_agent",
"strategy_agent",
"execution_agent"
],
interval:null
}

function saveRealtimeState(){
localStorage.setItem("consia_realtime_brain",JSON.stringify({
active:brainRuntime.active,
cycles:brainRuntime.cycles,
events:brainRuntime.events,
signals:brainRuntime.signals,
goals:brainRuntime.goals,
agents:brainRuntime.agents
}))
}

function loadRealtimeState(){

const data=JSON.parse(localStorage.getItem("consia_realtime_brain"))

if(!data) return

brainRuntime.active=data.active||false
brainRuntime.cycles=data.cycles||0
brainRuntime.events=data.events||0
brainRuntime.signals=data.signals||0
brainRuntime.goals=data.goals||[]
brainRuntime.agents=data.agents||brainRuntime.agents

}

function updateUI(){

document.getElementById("brainState").innerText=brainRuntime.active?"ACTIVE":"IDLE"
document.getElementById("cycles").innerText=brainRuntime.cycles
document.getElementById("eventsCount").innerText=brainRuntime.events
document.getElementById("signals").innerText=brainRuntime.signals
document.getElementById("activeAgents").innerText=brainRuntime.agents.length
document.getElementById("goalsCount").innerText=brainRuntime.goals.length

saveRealtimeState()

}

function appendStream(text){

const stream=document.getElementById("stream")
const div=document.createElement("div")
div.className="event"
div.innerText=text
stream.prepend(div)

}

function appendLog(text){

const log=document.getElementById("log")
log.innerText=text+"\n\n"+log.innerText

}

async function triggerCycle(){

const objective=document.getElementById("objective").value || "ciclo autónomo CONSIA"

brainRuntime.cycles+=1
brainRuntime.events+=4
brainRuntime.signals+=1

if(objective && !brainRuntime.goals.includes(objective)){
brainRuntime.goals.push(objective)
}

appendStream("Ciclo "+brainRuntime.cycles+" iniciado")
appendLog("Brain cycle "+brainRuntime.cycles+" → objetivo: "+objective)

try{

const r=await fetch("https://api.consia.world/v1/brain/run",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
objective:objective
})
})

const data=await r.json()

appendStream("Research, Analysis, Strategy, Execution completados")
appendLog(JSON.stringify(data,null,2))

}catch(e){

appendStream("Error en ciclo realtime")
appendLog("Error de conexión con CONSIA API")

}

updateUI()

}

function startRealtimeBrain(){

const objective=document.getElementById("objective").value

if(objective && !brainRuntime.goals.includes(objective)){
brainRuntime.goals.push(objective)
}

if(brainRuntime.active) return

brainRuntime.active=true

appendStream("CONSIA REALTIME BRAIN activado")
appendLog("Sistema realtime iniciado")

updateUI()

brainRuntime.interval=setInterval(()=>{
if(brainRuntime.active){
triggerCycle()
}
},7000)

}

function stopRealtimeBrain(){

brainRuntime.active=false

if(brainRuntime.interval){
clearInterval(brainRuntime.interval)
brainRuntime.interval=null
}

appendStream("CONSIA REALTIME BRAIN detenido")
appendLog("Sistema realtime detenido")

updateUI()

}

loadRealtimeState()
updateUI()

if(brainRuntime.active){
startRealtimeBrain()
}

</script>

</body>
</html>
