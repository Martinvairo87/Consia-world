<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA VECTOR BRAIN</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial;
color:white;
}

.container{
max-width:1000px;
margin:auto;
padding:40px;
}

h1{
text-align:center;
color:#00eaff;
}

.panel{
background:#071426;
border-radius:12px;
padding:30px;
margin-top:30px;
}

textarea{
width:100%;
height:120px;
padding:16px;
border-radius:20px;
border:none;
background:#0f223c;
color:white;
}

input{
width:100%;
padding:14px;
border-radius:20px;
border:none;
background:#0f223c;
color:white;
margin-top:10px;
}

button{
margin-top:20px;
padding:14px 24px;
border:none;
border-radius:30px;
background:#00eaff;
color:black;
font-weight:bold;
cursor:pointer;
margin-right:10px;
}

.result{
margin-top:30px;
background:#081424;
padding:20px;
border-radius:10px;
white-space:pre-wrap;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.card{
background:#0d1f35;
padding:20px;
border-radius:10px;
text-align:center;
}

</style>

</head>

<body>

<div class="container">

<h1>CONSIA GLOBAL VECTOR BRAIN</h1>

<div class="panel">

<textarea id="knowledgeInput"
placeholder="Agregar conocimiento al cerebro de CONSIA"></textarea>

<button onclick="addKnowledge()">
Guardar conocimiento
</button>

<input id="searchInput"
placeholder="Buscar conocimiento"/>

<button onclick="searchKnowledge()">
Buscar
</button>

<div class="grid">

<div class="card">
Vector Brain<br>
<span>activo</span>
</div>

<div class="card">
Embeddings<br>
<span>local</span>
</div>

<div class="card">
RAG Engine<br>
<span>listo</span>
</div>

</div>

<div class="result" id="vectorResults">
Resultados aparecerán aquí
</div>

</div>

</div>

<script>

let knowledgeBase=[]

function embed(text){

let words=text.toLowerCase().split(" ")
let vector={}

words.forEach(w=>{

vector[w]=(vector[w]||0)+1

})

return vector

}

function similarity(v1,v2){

let score=0

for(let k in v1){

if(v2[k]){

score+=Math.min(v1[k],v2[k])

}

}

return score

}

function addKnowledge(){

const text=document.getElementById("knowledgeInput").value

if(!text)return

const vector=embed(text)

knowledgeBase.push({

text:text,
vector:vector

})

localStorage.setItem("consia_vector_brain",
JSON.stringify(knowledgeBase))

document.getElementById("vectorResults").innerText=
"Conocimiento guardado"

}

function searchKnowledge(){

const query=document.getElementById("searchInput").value

const qVector=embed(query)

let results=[]

knowledgeBase.forEach(k=>{

let score=similarity(qVector,k.vector)

results.push({

text:k.text,
score:score

})

})

results.sort((a,b)=>b.score-a.score)

let output=""

results.slice(0,5).forEach(r=>{

output+=
"Score: "+r.score+"\n"+
r.text+"\n\n"

})

document.getElementById("vectorResults").innerText=output

}

function load(){

const data=localStorage.getItem("consia_vector_brain")

if(data){

knowledgeBase=JSON.parse(data)

}

}

load()

</script>

</body>
</html>
