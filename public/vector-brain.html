<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA VECTOR DATABASE ENGINE</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial;
color:white;
}

.header{
text-align:center;
padding:30px;
font-size:28px;
color:#00eaff;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.panel{
background:#071426;
padding:25px;
border-radius:12px;
margin-bottom:25px;
}

textarea{
width:100%;
height:120px;
padding:15px;
border-radius:10px;
border:none;
background:#0f223c;
color:white;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:25px;
background:#00eaff;
color:#00151f;
font-weight:bold;
cursor:pointer;
}

.result{
margin-top:25px;
background:#081424;
padding:20px;
border-radius:10px;
white-space:pre-wrap;
font-size:13px;
}

.memory{
margin-top:25px;
background:#081424;
padding:20px;
border-radius:10px;
}

.item{
border-bottom:1px solid #0f223c;
padding:10px;
font-size:13px;
}

</style>

</head>

<body>

<div class="header">
CONSIA VECTOR DATABASE ENGINE
</div>

<div class="container">

<div class="panel">

<h3>Agregar conocimiento vectorial</h3>

<textarea id="knowledge" placeholder="Agregar información para vectorizar"></textarea>

<button onclick="saveVector()">
Vectorizar
</button>

</div>

<div class="panel">

<h3>Buscar semánticamente</h3>

<textarea id="query" placeholder="Buscar en la memoria semántica"></textarea>

<button onclick="searchVector()">
Buscar
</button>

<div class="result" id="result">
Esperando consulta...
</div>

</div>

<div class="memory" id="vectorList">

Vectores almacenados aparecerán aquí

</div>

</div>

<script>

function createEmbedding(text){

let vector=[]

for(let i=0;i<text.length;i++){
vector.push(text.charCodeAt(i)/255)
}

return vector

}

function saveVector(){

const text=document.getElementById("knowledge").value

if(!text) return

let vectors=JSON.parse(localStorage.getItem("consia_vectors"))||[]

const embedding=createEmbedding(text)

vectors.push({
text:text,
vector:embedding,
date:new Date().toISOString()
})

localStorage.setItem("consia_vectors",JSON.stringify(vectors))

document.getElementById("knowledge").value=""

loadVectors()

}

function similarity(v1,v2){

let score=0

const len=Math.min(v1.length,v2.length)

for(let i=0;i<len;i++){
score+=v1[i]*v2[i]
}

return score

}

function searchVector(){

const query=document.getElementById("query").value

const queryVector=createEmbedding(query)

const vectors=JSON.parse(localStorage.getItem("consia_vectors"))||[]

let results=vectors.map(v=>{

return{
text:v.text,
score:similarity(queryVector,v.vector)
}

})

results.sort((a,b)=>b.score-a.score)

let output=""

results.slice(0,5).forEach(r=>{
output+=r.text+"\n\n"
})

if(!output){
output="No se encontraron resultados"
}

document.getElementById("result").innerText=output

}

function loadVectors(){

const vectors=JSON.parse(localStorage.getItem("consia_vectors"))||[]

let html=""

vectors.forEach(v=>{

html+=`<div class="item">${v.text}</div>`

})

document.getElementById("vectorList").innerHTML=html

}

loadVectors()

</script>

</body>
</html>
