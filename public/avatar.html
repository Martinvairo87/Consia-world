<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CONSIA AVATAR</title>

<style>

body{
margin:0;
background:#050b18;
color:white;
font-family:system-ui;
text-align:center;
}

#avatarContainer{
width:100%;
height:70vh;
}

#controls{
padding:30px;
}

button{
padding:14px 22px;
border:none;
border-radius:10px;
background:#3ddc84;
font-weight:bold;
cursor:pointer;
margin:6px;
}

input{
width:60%;
padding:14px;
border-radius:10px;
border:none;
background:#0f1b34;
color:white;
}

</style>

</head>

<body>

<h1>CONSIA Avatar</h1>

<div id="avatarContainer"></div>

<div id="controls">

<input id="command" placeholder="decile algo a CONSIA">

<button onclick="talk()">Hablar</button>

<button onclick="startVoice()">🎤 voz</button>

</div>


<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000)

let renderer=new THREE.WebGLRenderer({alpha:true})

renderer.setSize(window.innerWidth,window.innerHeight*0.7)

document.getElementById("avatarContainer").appendChild(renderer.domElement)

camera.position.z=3

let geometry=new THREE.SphereGeometry(1,64,64)

let material=new THREE.MeshBasicMaterial({
color:0x3ddc84,
wireframe:true
})

let avatar=new THREE.Mesh(geometry,material)

scene.add(avatar)

function animate(){

requestAnimationFrame(animate)

avatar.rotation.y+=0.01

renderer.render(scene,camera)

}

animate()


async function talk(){

const text=document.getElementById("command").value

const r=await fetch("/v1/autopilot/run",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

company:"CONSIA",

action:"execute",

input:text

})

})

const j=await r.json()

speak(j.narration)

}


function speak(text){

const msg=new SpeechSynthesisUtterance(text)

msg.lang="es"

speechSynthesis.speak(msg)

}


function startVoice(){

const rec=new webkitSpeechRecognition()

rec.lang="es"

rec.onresult=(e)=>{

const text=e.results[0][0].transcript

document.getElementById("command").value=text

talk()

}

rec.start()

}

</script>

</body>
</html>
