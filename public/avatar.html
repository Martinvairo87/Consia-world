<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>CONSIA Avatar</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
text-align:center;
width:90%;
max-width:700px;
}

.avatar{

width:240px;
height:240px;

margin:auto;

border-radius:50%;

display:flex;
align-items:center;
justify-content:center;

font-size:28px;

color:#00eaff;

border:3px solid #00eaff;

box-shadow:
0 0 40px #00eaff,
inset 0 0 40px #00eaff;

animation:pulse 3s infinite;

}

@keyframes pulse{

0%{box-shadow:0 0 20px #00eaff}
50%{box-shadow:0 0 80px #00eaff}
100%{box-shadow:0 0 20px #00eaff}

}

button{

margin-top:30px;

padding:14px 30px;

border:none;

border-radius:30px;

font-size:16px;

background:#00eaff;

cursor:pointer;

}

input{

width:100%;

padding:14px;

border-radius:20px;

border:none;

margin-top:40px;

background:#0e1c30;

color:white;

}

#response{

margin-top:30px;

font-size:14px;

text-align:left;

white-space:pre-wrap;

background:#081424;

padding:20px;

border-radius:10px;

}

</style>

</head>


<body>

<div class="container">

<div class="avatar">
CONSIA
</div>

<input
id="textInput"
placeholder="decile algo a CONSIA"
/>

<br>

<button onclick="runBrain()">
Hablar con CONSIA
</button>

<button onclick="voiceMode()">
🎤 voz
</button>

<div id="response"></div>

</div>


<script>

const API="https://api.consia.world"


function speak(text){

const speech=new SpeechSynthesisUtterance(text)

speech.lang="es-ES"

speech.rate=1

speech.pitch=1

speechSynthesis.speak(speech)

}


async function runBrain(){

const text=document.getElementById("textInput").value

if(!text)return

const r=await fetch(API+"/v1/brain/run",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
objective:text
})

})

const j=await r.json()

document.getElementById("response").innerText=

JSON.stringify(j,null,2)

speak("Proceso ejecutado")

}


function voiceMode(){

alert(
"Safari en iPad no permite reconocimiento de voz directo.\n\nUsá el micrófono del teclado."
)

}


speak("CONSIA lista")

</script>


</body>
</html>
