<!doctype html>
<html lang="es">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CONSIA AVATAR</title>

<style>

body{
margin:0;
background:#020617;
color:white;
font-family:system-ui;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

h1{
font-size:40px;
margin-bottom:10px;
}

.avatar{
width:260px;
height:260px;
margin:auto;
border-radius:50%;
background:radial-gradient(circle,#6d8fff,#2747b7);
display:flex;
align-items:center;
justify-content:center;
font-size:90px;
box-shadow:0 0 60px rgba(100,140,255,.4);
animation:pulse 4s infinite;
}

@keyframes pulse{
0%{transform:scale(1)}
50%{transform:scale(1.05)}
100%{transform:scale(1)}
}

button{
margin-top:25px;
padding:16px 26px;
border:none;
border-radius:12px;
background:#4c6fff;
color:white;
font-size:18px;
cursor:pointer;
}

.chat{
margin-top:30px;
max-width:700px;
margin-left:auto;
margin-right:auto;
text-align:left;
}

.msg{
margin-bottom:10px;
padding:12px;
background:#0b1225;
border-radius:8px;
}

.status{
margin-top:15px;
opacity:.7;
}

</style>

</head>

<body>

<div class="container">

<h1>CONSIA AVATAR</h1>

<div class="avatar" id="avatar">
C
</div>

<button onclick="talk()">
Hablar con CONSIA
</button>

<div class="status" id="status">
Avatar ready
</div>

<div class="chat" id="chat"></div>

</div>

<script>

const API="https://api.consia.world"

const recognition = new webkitSpeechRecognition()

recognition.lang="es-ES"

recognition.continuous=false

recognition.interimResults=false

function add(text){

document.getElementById("chat").innerHTML+=`

<div class="msg">${text}</div>

`

}

function speak(text){

const speech = new SpeechSynthesisUtterance(text)

speech.lang="es-ES"

speechSynthesis.speak(speech)

}

function talk(){

document.getElementById("status").innerText="Escuchando..."

recognition.start()

}

recognition.onresult = async function(event){

const text = event.results[0][0].transcript

add("👤 "+text)

document.getElementById("status").innerText="CONSIA pensando..."

const res = await fetch(API+"/v1/chat",{
method:"POST",
headers:{
"content-type":"application/json"
},
body:JSON.stringify({
input:text
})
})

const data = await res.json()

add("CONSIA: "+data.reply)

speak(data.reply)

document.getElementById("status").innerText="Avatar ready"

}

</script>

</body>
</html>
