<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA AI AVATAR</title>

<style>

body{
margin:0;
font-family:Arial;
background:#020b16;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
overflow:hidden;
}

.container{
text-align:center;
}

.avatar{

width:220px;
height:220px;

border-radius:50%;

border:3px solid #00eaff;

display:flex;
align-items:center;
justify-content:center;

font-size:28px;

color:#00eaff;

box-shadow:

0 0 40px #00eaff,
inset 0 0 40px #00eaff;

margin:auto;

animation:pulse 3s infinite;

}

@keyframes pulse{

0%{box-shadow:0 0 20px #00eaff}
50%{box-shadow:0 0 60px #00eaff}
100%{box-shadow:0 0 20px #00eaff}

}

button{

margin-top:30px;

padding:14px 26px;

font-size:16px;

border:none;

border-radius:30px;

background:#00eaff;

color:black;

cursor:pointer;

}

#text{

margin-top:30px;

font-size:18px;

max-width:600px;

margin-left:auto;
margin-right:auto;

}

</style>

</head>

<body>

<div class="container">

<div class="avatar">
CONSIA
</div>

<button onclick="listen()">
🎤 Hablar con CONSIA
</button>

<div id="text">
Esperando comando...
</div>

</div>


<script>

const API="https://api.consia.world"

function speak(text){

const speech=new SpeechSynthesisUtterance(text)

speech.lang="es-ES"

speech.rate=1

speech.pitch=1

speechSynthesis.speak(speech)

}

function listen(){

const recognition=

new(window.SpeechRecognition||
window.webkitSpeechRecognition)()

recognition.lang="es-ES"

recognition.onresult=async function(event){

const text=event.results[0][0].transcript

document.getElementById("text").innerText="Comando: "+text

runBrain(text)

}

recognition.start()

}

async function runBrain(objective){

const r=await fetch(API+"/v1/brain/run",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
objective
})

})

const j=await r.json()

const answer="Brain ejecutado. Plan generado."

document.getElementById("text").innerText=

JSON.stringify(j,null,2)

speak(answer)

}

speak("CONSIA lista")

</script>

</body>
</html>
