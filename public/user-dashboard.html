<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA USER DASHBOARD</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial,Helvetica,sans-serif;
color:white;
}

.header{
padding:25px;
background:#071426;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
font-size:20px;
color:#00eaff;
letter-spacing:2px;
}

.user{
font-size:14px;
color:#9feaff;
}

.container{
max-width:1600px;
margin:auto;
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
margin-bottom:30px;
}

.card{
background:#071426;
padding:22px;
border-radius:14px;
box-shadow:0 0 20px rgba(0,234,255,0.08);
}

.card h3{
font-size:13px;
letter-spacing:1px;
margin-bottom:12px;
}

.value{
font-size:28px;
color:#00eaff;
}

.section{
background:#071426;
padding:25px;
border-radius:14px;
margin-bottom:25px;
}

.section h2{
font-size:16px;
margin-bottom:15px;
}

input{
width:100%;
padding:12px;
border-radius:20px;
border:none;
background:#0f223c;
color:white;
margin-bottom:12px;
}

textarea{
width:100%;
padding:12px;
border-radius:12px;
border:none;
background:#0f223c;
color:white;
min-height:100px;
margin-bottom:12px;
}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#00eaff;
color:#00151f;
font-weight:bold;
cursor:pointer;
}

.list{
margin-top:15px;
}

.item{
padding:12px;
border-bottom:1px solid #0f223c;
}

.price{
color:#00eaff;
}

.footer{
text-align:center;
padding:20px;
font-size:12px;
color:#3aaec9;
}

</style>

</head>

<body>

<div class="header">
<div class="logo">CONSIA</div>
<div class="user" id="userEmail">user</div>
</div>

<div class="container">

<div class="grid">

<div class="card">
<h3>PROYECTOS</h3>
<div class="value" id="projectsCount">0</div>
</div>

<div class="card">
<h3>AGENTES</h3>
<div class="value" id="agentsCount">0</div>
</div>

<div class="card">
<h3>DOCUMENTOS RAG</h3>
<div class="value" id="ragDocs">0</div>
</div>

<div class="card">
<h3>BALANCE</h3>
<div class="value" id="walletBalance">$0</div>
</div>

</div>

<div class="section">

<h2>Crear proyecto</h2>

<input id="projectName" placeholder="Nombre del proyecto">

<input id="projectType" placeholder="Tipo (ej: SaaS, marketplace)">

<textarea id="projectData" placeholder="Descripción"></textarea>

<button onclick="createProject()">Crear</button>

</div>

<div class="section">

<h2>Subir conocimiento (RAG)</h2>

<textarea id="ragText" placeholder="Pegá conocimiento..."></textarea>

<button onclick="uploadRag()">Ingestar</button>

</div>

<div class="section">

<h2>Marketplace de agentes</h2>

<input id="agentName" placeholder="Nombre agente">

<input id="agentPrice" placeholder="Precio USD">

<textarea id="agentData" placeholder="Descripción agente"></textarea>

<button onclick="publishAgent()">Publicar agente</button>

<div class="list" id="agentList"></div>

</div>

</div>

<div class="footer">
CONSIA AI PLATFORM
</div>

<script>

const API="https://api.consia.world"

let user="demo@consia.ai"

document.getElementById("userEmail").innerText=user

async function loadDashboard(){

try{

const analytics=await fetch(API+"/v1/analytics")
const data=await analytics.json()

document.getElementById("projectsCount").innerText=data.analytics.projects
document.getElementById("agentsCount").innerText=data.analytics.agents

}catch(e){}

loadAgents()

}

async function createProject(){

let name=document.getElementById("projectName").value
let type=document.getElementById("projectType").value
let data=document.getElementById("projectData").value

await fetch(API+"/v1/projects/create",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

name,
type,
data

})

})

loadDashboard()

}

async function uploadRag(){

let text=document.getElementById("ragText").value

await fetch(API+"/v1/rag/ingest",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

file_name:"user-doc",
text

})

})

document.getElementById("ragDocs").innerText="OK"

}

async function publishAgent(){

let name=document.getElementById("agentName").value
let price=document.getElementById("agentPrice").value
let data=document.getElementById("agentData").value

await fetch(API+"/v1/agents/create",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

name,
price,
data,
owner_email:user

})

})

loadAgents()

}

async function loadAgents(){

const r=await fetch(API+"/v1/marketplace/agents")
const data=await r.json()

const list=document.getElementById("agentList")

list.innerHTML=""

data.items.forEach(a=>{

let div=document.createElement("div")

div.className="item"

div.innerHTML=

`<b>${a.name}</b>
<br>
<span class="price">$${a.price}</span>`

list.appendChild(div)

})

}

loadDashboard()

</script>

</body>
</html>
