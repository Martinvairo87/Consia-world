<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA GLOBAL NETWORK</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

.header{
text-align:center;
padding:30px;
font-size:28px;
color:#00eaff;
}

.container{
max-width:1100px;
margin:auto;
padding:30px;
}

.panel{
background:#071426;
padding:25px;
border-radius:12px;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;
border-radius:25px;
border:none;
background:#0f223c;
color:white;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 25px;
border:none;
border-radius:25px;
background:#00eaff;
color:#00151f;
font-weight:bold;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:25px;
}

.card{
background:#081424;
padding:20px;
border-radius:10px;
font-size:13px;
}

</style>

</head>

<body>

<div class="header">
CONSIA GLOBAL NETWORK
</div>

<div class="container">

<div class="panel">

<h3>Crear equipo</h3>

<input id="teamName" placeholder="Nombre del equipo">

<button onclick="createTeam()">Crear equipo</button>

</div>

<div class="panel">

<h3>Unirse a equipo</h3>

<input id="joinTeam" placeholder="Nombre del equipo">

<button onclick="joinTeam()">Unirse</button>

</div>

<div class="panel">

<h3>Equipos activos</h3>

<div class="grid" id="teams">
Equipos aparecerán aquí
</div>

</div>

</div>

<script>

function createTeam(){

const name=document.getElementById("teamName").value

if(!name) return

let teams=JSON.parse(localStorage.getItem("consia_teams"))||[]

teams.push({
name:name,
members:1,
date:new Date().toISOString()
})

localStorage.setItem("consia_teams",JSON.stringify(teams))

loadTeams()

}

function joinTeam(){

const name=document.getElementById("joinTeam").value

let teams=JSON.parse(localStorage.getItem("consia_teams"))||[]

teams=teams.map(t=>{
if(t.name===name){
t.members++
}
return t
})

localStorage.setItem("consia_teams",JSON.stringify(teams))

loadTeams()

}

function loadTeams(){

const data=JSON.parse(localStorage.getItem("consia_teams"))||[]

let html=""

data.forEach(t=>{

html+=`
<div class="card">
Equipo: ${t.name}
<br>
Miembros: ${t.members}
</div>
`

})

document.getElementById("teams").innerHTML=html

}

loadTeams()

</script>

</body>
</html>
