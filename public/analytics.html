<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA ANALYTICS ENGINE</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

.header{
text-align:center;
padding:30px;
font-size:28px;
color:#00eaff;
}

.container{
max-width:1200px;
margin:auto;
padding:30px;
}

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat{
background:#071426;
padding:20px;
border-radius:10px;
text-align:center;
}

.stat h2{
color:#00eaff;
font-size:26px;
margin:10px 0;
}

.chart{
background:#071426;
padding:25px;
border-radius:10px;
margin-top:25px;
}

canvas{
width:100%;
height:300px;
}

</style>

</head>

<body>

<div class="header">
CONSIA GLOBAL ANALYTICS ENGINE
</div>

<div class="container">

<div class="stats">

<div class="stat">
Usuarios
<h2 id="users">0</h2>
</div>

<div class="stat">
Proyectos
<h2 id="projects">0</h2>
</div>

<div class="stat">
Agentes
<h2 id="agents">0</h2>
</div>

<div class="stat">
Ingresos
<h2 id="revenue">$0</h2>
</div>

</div>

<div class="chart">
<canvas id="growthChart"></canvas>
</div>

</div>

<script>

const users=Math.floor(Math.random()*500)+100
const projects=Math.floor(Math.random()*200)+50
const agents=Math.floor(Math.random()*100)+20
const revenue=Math.floor(Math.random()*10000)+2000

document.getElementById("users").innerText=users
document.getElementById("projects").innerText=projects
document.getElementById("agents").innerText=agents
document.getElementById("revenue").innerText="$"+revenue

const canvas=document.getElementById("growthChart")
const ctx=canvas.getContext("2d")

canvas.width=800
canvas.height=300

const data=[]

for(let i=0;i<12;i++){
data.push(Math.random()*100)
}

function draw(){

ctx.clearRect(0,0,800,300)

ctx.beginPath()

ctx.strokeStyle="#00eaff"
ctx.lineWidth=2

data.forEach((v,i)=>{

const x=i*70
const y=300-(v*2)

if(i===0){
ctx.moveTo(x,y)
}else{
ctx.lineTo(x,y)
}

})

ctx.stroke()

}

draw()

</script>

</body>
</html>
