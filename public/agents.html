<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CONSIA • Agents</title>
<style>
body{margin:0;background:#020617;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto}
.wrap{max-width:1100px;margin:auto;padding:30px}
.top{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:24px}
h1{margin:0;font-size:38px}
.sub{opacity:.7;margin-top:8px}
a{color:#fff;text-decoration:none}
.btn{padding:12px 16px;border-radius:14px;background:#111a33;border:1px solid #1f2b4d}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}
.card{background:#0b1225;border:1px solid #1f2b4d;border-radius:20px;padding:22px}
.name{font-size:22px;font-weight:700;margin-bottom:10px}
.badge{display:inline-block;padding:8px 14px;border-radius:999px;background:#10311f;border:1px solid #1f5c3b;color:#7ff0b0;margin-top:12px}
.state{margin-top:24px;background:#0b1225;border:1px solid #1f2b4d;border-radius:20px;padding:20px;opacity:.82}
</style>
</head>
<body>
<div class="wrap">

<div class="top">
  <div>
    <h1>CONSIA Agents</h1>
    <div class="sub">Agentes automáticos del ecosistema CONSIA</div>
  </div>
  <a class="btn" href="/">← Home</a>
</div>

<div class="grid" id="agentsList">
  <div class="card">
    <div class="name">Cargando agentes...</div>
  </div>
</div>

<div class="state" id="stateBox">Conectando al sistema de agentes...</div>

</div>

<script>
const API="https://api.consia.world"

async function loadAgents(){
  try{
    const res = await fetch(API + "/v1/agents")
    const data = await res.json()

    const list = document.getElementById("agentsList")

    if(!data.agents || data.agents.length === 0){
      list.innerHTML = `
        <div class="card">
          <div class="name">Sin agentes</div>
          <div>No hay agentes cargados todavía.</div>
        </div>
      `
      document.getElementById("stateBox").textContent = "Sistema de agentes ONLINE"
      return
    }

    list.innerHTML = ""

    data.agents.forEach(agent => {
      list.innerHTML += `
        <div class="card">
          <div class="name">${agent.name}</div>
          <div>ID: ${agent.id}</div>
          <div class="badge">${String(agent.status || "online").toUpperCase()}</div>
        </div>
      `
    })

    document.getElementById("stateBox").textContent = "Agents ONLINE"
  }catch(e){
    document.getElementById("stateBox").textContent = "Error conectando agentes"
  }
}

loadAgents()
</script>
</body>
</html>
