<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CONSIA • Agents</title>

<style>
body{
margin:0;
background:#020617;
color:white;
font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Roboto;
}

.wrap{
max-width:1100px;
margin:auto;
padding:30px;
}

h1{
font-size:36px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:16px;
}

.card{
background:#0b1225;
border:1px solid #1f2b4d;
border-radius:16px;
padding:20px;
}

.title{
font-size:18px;
font-weight:700;
margin-bottom:8px;
}

.desc{
opacity:.75;
min-height:40px;
}

.badge{
margin-top:10px;
display:inline-block;
padding:6px 12px;
border-radius:999px;
background:#13381c;
color:#8cffb2;
font-size:12px;
}

.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:30px;
}

a{
color:white;
text-decoration:none;
background:#111a33;
padding:10px 16px;
border-radius:12px;
}

</style>
</head>

<body>

<div class="wrap">

<div class="top">
<h1>CONSIA Agents</h1>
<a href="/">Home</a>
</div>

<div id="agents" class="grid">
<div class="card">Cargando agentes...</div>
</div>

</div>

<script>

const API="https://api.consia.world"

async function loadAgents(){

try{

const r=await fetch(API+"/v1/agents")
const data=await r.json()

const box=document.getElementById("agents")
box.innerHTML=""

data.agents.forEach(a=>{

box.innerHTML+=`
<div class="card">
<div class="title">${a.name}</div>
<div class="desc">${a.description}</div>
<div class="badge">${a.status.toUpperCase()}</div>
</div>
`

})

}catch(e){

document.getElementById("agents").innerHTML=
'<div class="card">Error cargando agentes.</div>'

}

}

loadAgents()

</script>

</body>
</html>
