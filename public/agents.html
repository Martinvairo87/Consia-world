<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CONSIA Agents</title>
<style>
body{margin:0;background:#030712;color:#fff;font-family:-apple-system}
.wrap{max-width:900px;margin:auto;padding:30px}
.card{background:#0b1225;border:1px solid #1f2b4d;border-radius:20px;padding:20px;margin-bottom:12px}
</style>
</head>
<body>

<div class="wrap">

<h1>CONSIA Agents</h1>

<div id="list"></div>

<br>
<a href="/">← Home</a>

</div>

<script>
fetch("https://api.consia.world/v1/agents")
.then(r=>r.json())
.then(j=>{
const list=document.getElementById("list")

j.agents.forEach(a=>{
list.innerHTML+=`
<div class="card">
<strong>${a.name}</strong>
<br>Status: ${a.status}
</div>`
})
})
</script>

</body>
</html>
