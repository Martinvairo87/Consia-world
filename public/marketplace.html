<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CONSIA Marketplace</title>
<style>
body{margin:0;background:#030712;color:#fff;font-family:-apple-system}
.wrap{max-width:1100px;margin:auto;padding:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px}
.card{background:#0b1225;border:1px solid #1f2b4d;border-radius:20px;padding:20px}
.price{font-size:22px;margin-top:10px}
</style>
</head>
<body>

<div class="wrap">

<h1>CONSIA Marketplace</h1>

<div class="grid" id="products"></div>

<br>
<a href="/">← Home</a>

</div>

<script>
const API="https://api.consia.world"

fetch(API+"/v1/marketplace")
.then(r=>r.json())
.then(j=>{
const el=document.getElementById("products")

if(j.items.length===0){
el.innerHTML="<p>Marketplace vacío</p>"
return
}

j.items.forEach(p=>{
el.innerHTML+=`
<div class="card">
<h3>${p.name}</h3>
<p>${p.description||""}</p>
<div class="price">$${p.price_usd}</div>
</div>`
})
})
</script>

</body>
</html>
