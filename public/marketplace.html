<body style="background:#0b0b0b;color:white;font-family:Arial,Helvetica,sans-serif;margin:0;padding:40px;">

<h1 style="font-size:32px;margin-bottom:10px;">CONSIA Marketplace</h1>
<p style="opacity:.7;margin-bottom:40px;">Productos y servicios del ecosistema CONSIA</p>

<div id="products" style="max-width:800px;"></div>

<script>
async function loadProducts() {
  try {
    const res = await fetch("https://api.consia.world/v1/marketplace/products");
    const data = await res.json();

    const container = document.getElementById("products");

    if (!data.ok || !data.items || !data.items.length) {
      container.innerHTML = "<p>No hay productos disponibles</p>";
      return;
    }

    container.innerHTML = data.items.map(item => `
      <div style="
        background:#111;
        border:1px solid #333;
        border-radius:14px;
        padding:24px;
        margin-bottom:20px;
      ">
        <h2 style="margin:0 0 10px 0;">${item.name}</h2>
        <p style="opacity:.7;margin-bottom:14px;">${item.description || ""}</p>

        <div style="display:flex;justify-content:space-between;align-items:center;">
          <strong style="font-size:18px;">USD ${item.price_usd}</strong>

          <button onclick="buyProduct('${item.id}')" style="
            background:#00ff9c;
            border:none;
            padding:10px 18px;
            border-radius:8px;
            font-weight:bold;
            cursor:pointer;
          ">
            Comprar
          </button>
        </div>
      </div>
    `).join("");
  } catch (err) {
    document.getElementById("products").innerHTML = "<p>Error cargando productos</p>";
  }
}

function buyProduct(id) {
  alert("Compra iniciada: " + id);
}

loadProducts();
</script>

</body>
