<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA GLOBAL WALLET</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial,Helvetica,sans-serif;
color:white;
}

.header{
text-align:center;
padding:30px;
font-size:28px;
color:#00eaff;
}

.container{
max-width:900px;
margin:auto;
padding:40px;
}

.panel{
background:#071426;
padding:25px;
border-radius:12px;
margin-bottom:25px;
}

.wallet{
font-size:28px;
color:#00eaff;
margin-top:10px;
}

input{
width:100%;
padding:14px;
border-radius:20px;
border:none;
background:#0f223c;
color:white;
margin-top:10px;
}

button{
margin-top:15px;
padding:12px 24px;
border:none;
border-radius:25px;
background:#00eaff;
color:#00151f;
font-weight:bold;
cursor:pointer;
}

.transactions{
margin-top:20px;
background:#081424;
padding:20px;
border-radius:10px;
font-size:13px;
}

.tx{
border-bottom:1px solid #0f223c;
padding:8px 0;
}

</style>

</head>

<body>

<div class="header">
CONSIA GLOBAL WALLET
</div>

<div class="container">

<div class="panel">

<h3>Balance</h3>

<div class="wallet" id="balance">$0</div>

<button onclick="addFunds()">
Agregar fondos
</button>

</div>

<div class="panel">

<h3>Transferir</h3>

<input id="amount" placeholder="Monto">

<button onclick="sendPayment()">
Enviar pago
</button>

</div>

<div class="panel">

<h3>Transacciones</h3>

<div class="transactions" id="txs"></div>

</div>

</div>

<script>

function loadWallet(){

let wallet=JSON.parse(localStorage.getItem("consia_wallet"))||{
balance:0,
tx:[]
}

document.getElementById("balance").innerText="$"+wallet.balance

let html=""

wallet.tx.forEach(t=>{
html+=`<div class="tx">${t}</div>`
})

document.getElementById("txs").innerHTML=html

}

function addFunds(){

let wallet=JSON.parse(localStorage.getItem("consia_wallet"))||{
balance:0,
tx:[]
}

wallet.balance+=100

wallet.tx.push("Depósito +100")

localStorage.setItem("consia_wallet",JSON.stringify(wallet))

loadWallet()

}

function sendPayment(){

let wallet=JSON.parse(localStorage.getItem("consia_wallet"))||{
balance:0,
tx:[]
}

const amount=parseInt(document.getElementById("amount").value)

if(wallet.balance<amount){

alert("Fondos insuficientes")
return

}

wallet.balance-=amount

wallet.tx.push("Pago enviado -"+amount)

localStorage.setItem("consia_wallet",JSON.stringify(wallet))

loadWallet()

}

loadWallet()

</script>

</body>
</html>
