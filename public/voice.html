<button onclick="start()">Hablar con CONSIA</button>

<script>

function start(){

const rec=new webkitSpeechRecognition()

rec.lang="es-ES"

rec.onresult=async e=>{

const text=e.results[0][0].transcript

const r=await fetch("https://api.consia.world/chat",{
method:"POST",
body:JSON.stringify({message:text})
})

const j=await r.json()

alert(j.answer)

}

rec.start()

}

</script>
