<!doctype html>
<html>
<head>
<meta charset="utf-8">
<title>CONSIA VOICE</title>

<style>

body{
background:#020617;
color:white;
font-family:system-ui;
margin:0;
padding:40px;
text-align:center;
}

h1{
font-size:42px;
margin-bottom:20px;
}

.avatar{
width:200px;
height:200px;
border-radius:50%;
background:linear-gradient(135deg,#4c6fff,#7aa6ff);
display:flex;
align-items:center;
justify-content:center;
font-size:70px;
margin:auto;
margin-bottom:30px;
}

button{
padding:16px 26px;
font-size:18px;
border-radius:12px;
border:none;
background:#4c6fff;
color:white;
cursor:pointer;
}

.status{
margin-top:20px;
opacity:.7;
}

.chat{
margin-top:30px;
max-width:700px;
margin-left:auto;
margin-right:auto;
text-align:left;
}

.msg{
margin-bottom:10px;
padding:10px;
background:#0b1225;
border-radius:8px;
}

</style>

</head>

<body>

<h1>CONSIA VOICE</h1>

<div class="avatar">
C
</div>

<button onclick="startVoice()">
Hablar con CONSIA
</button>

<div class="status" id="status">
Voice ready
</div>

<div class="chat" id="chat"></div>

<script>

const API="https://api.consia.world"

const recognition = new webkitSpeechRecognition()

recognition.lang="es-ES"

recognition.continuous=false

recognition.interimResults=false

function addMessage(text){

document.getElementById("chat").innerHTML+=`

<div class="msg">
${text}
</div>

`

}

function speak(text){

const speech = new SpeechSynthesisUtterance(text)

speech.lang="es-ES"

speechSynthesis.speak(speech)

}

function startVoice(){

document.getElementById("status").innerText="Escuchando..."

recognition.start()

}

recognition.onresult = async function(event){

const text = event.results[0][0].transcript

addMessage("👤 "+text)

document.getElementById("status").innerText="Pensando..."

const res = await fetch(API+"/v1/chat",{
method:"POST",
headers:{
"content-type":"application/json"
},
body:JSON.stringify({
input:text
})
})

const data = await res.json()

addMessage("CONSIA: "+data.reply)

speak(data.reply)

document.getElementById("status").innerText="Voice ready"

}

</script>

</body>
</html>
