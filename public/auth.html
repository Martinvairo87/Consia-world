<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA AUTH</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial,Helvetica,sans-serif;
color:white;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.panel{
background:#071426;
padding:40px;
border-radius:14px;
width:360px;
box-shadow:0 0 25px rgba(0,234,255,0.1);
}

.title{
text-align:center;
font-size:22px;
color:#00eaff;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:20px;
border:none;
background:#0f223c;
color:white;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:20px;
background:#00eaff;
color:#00151f;
font-weight:bold;
cursor:pointer;
}

.switch{
text-align:center;
margin-top:15px;
font-size:12px;
color:#9feaff;
cursor:pointer;
}

</style>

</head>

<body>

<div class="panel">

<div class="title">CONSIA</div>

<div id="login">

<input id="loginEmail" placeholder="Email">

<input id="loginPass" type="password" placeholder="Password">

<button onclick="login()">LOGIN</button>

<div class="switch" onclick="showSignup()">
Crear cuenta
</div>

</div>

<div id="signup" style="display:none">

<input id="signupEmail" placeholder="Email">

<input id="signupName" placeholder="Nombre">

<input id="signupPass" type="password" placeholder="Password">

<button onclick="signup()">SIGNUP</button>

<div class="switch" onclick="showLogin()">
Ya tengo cuenta
</div>

</div>

</div>

<script>

const API="https://api.consia.world"

function showSignup(){

document.getElementById("login").style.display="none"
document.getElementById("signup").style.display="block"

}

function showLogin(){

document.getElementById("signup").style.display="none"
document.getElementById("login").style.display="block"

}

async function signup(){

let email=document.getElementById("signupEmail").value
let name=document.getElementById("signupName").value
let password=document.getElementById("signupPass").value

const r=await fetch(API+"/v1/auth/signup",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

email,
name,
password

})

})

const data=await r.json()

if(data.ok){

localStorage.setItem("consia_token",data.token)
window.location="user-dashboard.html"

}

}

async function login(){

let email=document.getElementById("loginEmail").value
let password=document.getElementById("loginPass").value

const r=await fetch(API+"/v1/auth/login",{

method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({

email,
password

})

})

const data=await r.json()

if(data.ok){

localStorage.setItem("consia_token",data.token)
window.location="user-dashboard.html"

}

}

</script>

</body>
</html>
