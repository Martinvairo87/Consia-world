<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CONSIA GLOBAL COMMAND CENTER</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0a0f18;
color:white;
}

header{
background:#0f1a2e;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
border-bottom:1px solid #1f2a44;
}

.logo{
font-weight:bold;
font-size:18px;
}

.status{
color:#3cff9a;
}

.container{
display:flex;
height:calc(100vh - 60px);
}

.sidebar{
width:220px;
background:#0d1424;
border-right:1px solid #1f2a44;
padding:10px;
}

.sidebar button{
width:100%;
margin-bottom:10px;
padding:10px;
background:#18233d;
border:none;
color:white;
cursor:pointer;
}

.main{
flex:1;
display:flex;
flex-direction:column;
}

.widgets{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
padding:10px;
}

.widget{
background:#111b33;
padding:15px;
border:1px solid #1f2a44;
}

.chat{
flex:1;
display:flex;
flex-direction:column;
border-top:1px solid #1f2a44;
}

.chat-log{
flex:1;
overflow:auto;
padding:10px;
}

.chat-input{
display:flex;
border-top:1px solid #1f2a44;
}

.chat-input input{
flex:1;
padding:12px;
background:#0f1729;
border:none;
color:white;
}

.chat-input button{
padding:12px;
background:#2b4bff;
border:none;
color:white;
cursor:pointer;
}

.agent{
background:#18233d;
padding:8px;
margin-top:5px;
}

</style>
</head>

<body>

<header>
<div class="logo">CONSIA GLOBAL COMMAND CENTER</div>
<div class="status" id="systemStatus">Checking system...</div>
</header>

<div class="container">

<div class="sidebar">

<button onclick="loadAgents()">Agents</button>
<button onclick="loadProjects()">Projects</button>
<button onclick="loadMemory()">Memory</button>
<button onclick="systemStatus()">System</button>

</div>

<div class="main">

<div class="widgets">

<div class="widget">
<h3>CORE</h3>
<div id="coreStatus">loading...</div>
</div>

<div class="widget">
<h3>API</h3>
<div id="apiStatus">loading...</div>
</div>

<div class="widget">
<h3>AGENTS</h3>
<div id="agentStatus">loading...</div>
</div>

</div>

<div class="chat">

<div class="chat-log" id="chatLog"></div>

<div class="chat-input">
<input id="chatInput" placeholder="Send command to CONSIA">
<button onclick="sendCommand()">Send</button>
</div>

</div>

</div>

</div>

<script>

const API="https://api.consia.world";

async function systemStatus(){

try{

let r=await fetch(API+"/v1/chat");
let d=await r.json();

document.getElementById("systemStatus").innerText="SYSTEM ONLINE";
document.getElementById("coreStatus").innerText="ACTIVE";
document.getElementById("apiStatus").innerText="CONNECTED";

}catch(e){

document.getElementById("systemStatus").innerText="SYSTEM ERROR";

}

}

async function sendCommand(){

let input=document.getElementById("chatInput");
let log=document.getElementById("chatLog");

let text=input.value;

if(!text)return;

log.innerHTML+="<div>> "+text+"</div>";

input.value="";

let res=await fetch(API+"/v1/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:text})
});

let data=await res.json();

log.innerHTML+="<div style='color:#3cff9a'>CONSIA: "+(data.reply||JSON.stringify(data))+"</div>";

log.scrollTop=log.scrollHeight;

}

async function loadAgents(){

let log=document.getElementById("chatLog");
log.innerHTML="Loading agents...";

try{

let r=await fetch(API+"/v1/agents");
let d=await r.json();

log.innerHTML="<h3>Agent Swarm</h3>";

d.agents.forEach(a=>{
log.innerHTML+="<div class='agent'>"+a.name+" - "+a.role+"</div>";
});

}catch(e){

log.innerHTML="Agent system not available";

}

}

function loadProjects(){

let log=document.getElementById("chatLog");

log.innerHTML=`

<h3>Projects</h3>

<div class="agent">Real Work</div>
<div class="agent">Manglar Construcciones</div>
<div class="agent">VIP Work</div>
<div class="agent">Bambino</div>
<div class="agent">CONSIA</div>

`;

}

function loadMemory(){

let log=document.getElementById("chatLog");

log.innerHTML="<h3>Memory Hub</h3>Memory system active";

}

systemStatus();

</script>

</body>
</html>
