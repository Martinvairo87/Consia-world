<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA GLOBAL COMMAND CENTER</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

.header{
padding:25px;
text-align:center;
font-size:28px;
color:#00eaff;
letter-spacing:1px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:25px;
padding:30px;
max-width:1200px;
margin:auto;
}

.card{
background:#071426;
padding:30px;
border-radius:14px;
text-align:center;
box-shadow:0 0 20px rgba(0,234,255,0.08);
}

.card h3{
margin-bottom:15px;
font-size:16px;
letter-spacing:1px;
}

button{
padding:12px 22px;
border:none;
border-radius:25px;
background:#00eaff;
color:#00151f;
font-weight:bold;
cursor:pointer;
transition:0.2s;
}

button:hover{
transform:scale(1.05);
}

.status{
margin:30px auto;
max-width:1200px;
background:#081424;
padding:25px;
border-radius:12px;
white-space:pre-wrap;
font-size:13px;
color:#9feaff;
}

.footer{
text-align:center;
padding:20px;
font-size:12px;
color:#3aaec9;
}

</style>

</head>

<body>

<div class="header">
CONSIA GLOBAL COMMAND CENTER
</div>

<div class="grid">

<div class="card">
<h3>AUTOPILOT</h3>
<button onclick="openPage('autopilot.html')">Abrir</button>
</div>

<div class="card">
<h3>AGENT CLOUD</h3>
<button onclick="openPage('agent-cloud.html')">Abrir</button>
</div>

<div class="card">
<h3>PROJECT BRAIN</h3>
<button onclick="openPage('project-brain.html')">Abrir</button>
</div>

<div class="card">
<h3>VECTOR BRAIN</h3>
<button onclick="openPage('vector-brain.html')">Abrir</button>
</div>

<div class="card">
<h3>MEMORY ENGINE</h3>
<button onclick="openPage('memory.html')">Abrir</button>
</div>

<div class="card">
<h3>ECONOMY ENGINE</h3>
<button onclick="openPage('economy.html')">Abrir</button>
</div>

<div class="card">
<h3>FILE SYSTEM</h3>
<button onclick="openPage('files.html')">Abrir</button>
</div>

<div class="card">
<h3>VOICE ENGINE</h3>
<button onclick="openPage('voice.html')">Abrir</button>
</div>

<div class="card">
<h3>HUMAN AVATAR</h3>
<button onclick="openPage('avatar-human.html')">Abrir</button>
</div>

<div class="card">
<h3>MULTI-AI ENGINE</h3>
<button onclick="openPage('multi-ai.html')">Abrir</button>
</div>

</div>

<div class="status" id="status">
Cargando estado del sistema...
</div>

<div class="footer">
CONSIA AI OPERATING SYSTEM
</div>

<script>

const API="https://api.consia.world"

function openPage(p){
window.location.href=p
}

async function loadStatus(){

try{

const r=await fetch(API+"/health")
const j=await r.json()

document.getElementById("status").innerText=
JSON.stringify(j,null,2)

}catch(e){

document.getElementById("status").innerText=
"CONSIA CORE ACTIVE"

}

}

loadStatus()

</script>

</body>
</html>
