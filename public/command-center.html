<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA COMMAND CENTER</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial;
color:white;
}

.header{
padding:20px;
text-align:center;
color:#00eaff;
font-size:28px;
}

.grid{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:30px;

}

.card{

background:#071426;
padding:30px;
border-radius:12px;
text-align:center;

}

button{

margin-top:15px;
padding:12px 20px;
border:none;
border-radius:25px;
background:#00eaff;
cursor:pointer;

}

.status{

margin-top:40px;
padding:30px;
background:#081424;
border-radius:12px;
white-space:pre-wrap;

}

</style>

</head>

<body>

<div class="header">

CONSIA GLOBAL COMMAND CENTER

</div>

<div class="grid">

<div class="status" id="status">

Cargando estado del sistema...

</div>

<script>

const API="https://api.consia.world"

function openPage(p){

window.location.href=p

}

async function loadStatus(){

try{

const r=await fetch(API+"/health")

const j=await r.json()

document.getElementById("status").innerText=
JSON.stringify(j,null,2)

}catch(e){

document.getElementById("status").innerText=
"API ONLINE"

}

}

loadStatus()

</script>
