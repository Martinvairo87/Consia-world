<!DOCTYPE html>
<html>

<head>

<title>CONSIA COMMAND CENTER</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
background:#050b18;
color:white;
font-family:Arial;
margin:0;
}

header{
background:#0b1328;
padding:20px;
font-size:22px;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#0f1b33;
border-radius:10px;
padding:20px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

button{
background:#3a7afe;
border:none;
color:white;
padding:10px 20px;
border-radius:6px;
cursor:pointer;
margin-top:10px;
}

pre{
background:#000;
padding:10px;
border-radius:6px;
overflow:auto;
max-height:200px;
}

</style>

</head>

<body>

<header>

CONSIA GLOBAL COMMAND CENTER

</header>

<div class="container">

<div class="card">
<h3>API Status</h3>
<button onclick="health()">Check</button>
<pre id="health"></pre>
</div>

<div class="card">
<h3>Analytics</h3>
<button onclick="analytics()">Load</button>
<pre id="analytics"></pre>
</div>

<div class="card">
<h3>Create User</h3>

<input id="email" placeholder="email"><br><br>
<input id="name" placeholder="name"><br><br>

<button onclick="signup()">Signup</button>

<pre id="signup"></pre>

</div>

<div class="card">
<h3>Create Agent</h3>

<input id="agent_name" placeholder="agent name"><br><br>

<button onclick="createAgent()">Create</button>

<pre id="agent"></pre>

</div>

<div class="card">
<h3>Agent Marketplace</h3>

<button onclick="agents()">Load</button>

<pre id="agents"></pre>

</div>

<div class="card">
<h3>Startup Generator</h3>

<input id="idea" placeholder="startup idea"><br><br>

<button onclick="startup()">Generate</button>

<pre id="startup"></pre>

</div>

<div class="card">
<h3>RAG Memory</h3>

<textarea id="ragtext" placeholder="text"></textarea>

<button onclick="rag()">Ingest</button>

<pre id="rag"></pre>

</div>

</div>

<script>

const API="https://api.consia.world"

async function health(){

const r=await fetch(API+"/v1/health")

const d=await r.json()

document.getElementById("health").textContent=
JSON.stringify(d,null,2)

}

async function analytics(){

const r=await fetch(API+"/v1/analytics")

const d=await r.json()

document.getElementById("analytics").textContent=
JSON.stringify(d,null,2)

}

async function signup(){

const email=document.getElementById("email").value
const name=document.getElementById("name").value

const r=await fetch(API+"/v1/auth/signup",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

email:email,
name:name,
password:"123456"

})

})

const d=await r.json()

document.getElementById("signup").textContent=
JSON.stringify(d,null,2)

}

async function createAgent(){

const name=document.getElementById("agent_name").value

const r=await fetch(API+"/v1/agents/create",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

name:name,
type:"ai",
price:10,
owner_email:"martin@consia.world",
data:{}

})

})

const d=await r.json()

document.getElementById("agent").textContent=
JSON.stringify(d,null,2)

}

async function agents(){

const r=await fetch(API+"/v1/marketplace/agents")

const d=await r.json()

document.getElementById("agents").textContent=
JSON.stringify(d,null,2)

}

async function startup(){

const idea=document.getElementById("idea").value

const r=await fetch(API+"/v1/startup/generate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

idea:idea

})

})

const d=await r.json()

document.getElementById("startup").textContent=
JSON.stringify(d,null,2)

}

async function rag(){

const text=document.getElementById("ragtext").value

const r=await fetch(API+"/v1/rag/ingest",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({

text:text

})

})

const d=await r.json()

document.getElementById("rag").textContent=
JSON.stringify(d,null,2)

}

</script>

</body>

</html>
