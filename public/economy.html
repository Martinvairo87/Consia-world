<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CONSIA ECONOMY ENGINE</title>

<style>

body{
margin:0;
background:#020b16;
font-family:Arial;
color:white;
}

.container{
max-width:1100px;
margin:auto;
padding:40px;
}

h1{
text-align:center;
color:#00eaff;
}

.panel{
background:#071426;
border-radius:12px;
padding:30px;
margin-top:30px;
}

input{
width:100%;
padding:14px;
border-radius:20px;
border:none;
background:#0f223c;
color:white;
margin-top:10px;
}

button{
margin-top:20px;
padding:14px 24px;
border:none;
border-radius:30px;
background:#00eaff;
color:black;
font-weight:bold;
cursor:pointer;
}

.grid{

display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
margin-top:30px;

}

.card{

background:#0d1f35;
padding:20px;
border-radius:10px;
text-align:center;

}

.products{

margin-top:30px;
background:#081424;
padding:20px;
border-radius:10px;

}

.product{

padding:12px;
border-bottom:1px solid #0f223c;

}

.revenue{

margin-top:20px;
font-size:22px;
color:#00eaff;

}

</style>

</head>

<body>

<div class="container">

<h1>CONSIA ECONOMY ENGINE</h1>

<div class="panel">

<input
id="productName"
placeholder="Nombre del producto o servicio"
/>

<input
id="productPrice"
placeholder="Precio"
/>

<button onclick="addProduct()">
Crear producto
</button>

<div class="grid">

<div class="card">
Productos<br>
<span id="productCount">0</span>
</div>

<div class="card">
Ventas<br>
<span id="salesCount">0</span>
</div>

<div class="card">
Ingresos<br>
<span id="revenue">$0</span>
</div>

<div class="card">
Estado<br>
<span id="economyStatus">activo</span>
</div>

</div>

<div class="products" id="productList">
Productos aparecerán aquí
</div>

<div class="revenue" id="revenueTotal">
Ingresos totales: $0
</div>

</div>

</div>

<script>

let products=[]
let revenue=0
let sales=0

function addProduct(){

const name=document.getElementById("productName").value
const price=parseFloat(document.getElementById("productPrice").value)

if(!name || !price)return

const product={
name:name,
price:price
}

products.push(product)

updateProducts()

}

function updateProducts(){

document.getElementById("productCount").innerText=products.length

let html=""

products.forEach((p,i)=>{

html+=
'<div class="product">'+
p.name+
' - $'+p.price+
' <button onclick="buy('+i+')">Comprar</button>'+
'</div>'

})

document.getElementById("productList").innerHTML=html

}

function buy(index){

const product=products[index]

sales++
revenue+=product.price

document.getElementById("salesCount").innerText=sales
document.getElementById("revenue").innerText="$"+revenue
document.getElementById("revenueTotal").innerText="Ingresos totales: $"+revenue

}

</script>

</body>
</html>
