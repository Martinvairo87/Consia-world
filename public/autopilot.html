<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CONSIA AUTOPILOT</title>

<style>

body{
background:#020617;
color:white;
font-family:-apple-system,system-ui;
padding:40px;
}

.box{
max-width:900px;
margin:auto;
}

input{
width:100%;
padding:16px;
border-radius:14px;
border:none;
background:#0b1220;
color:white;
margin-bottom:10px;
}

button{
padding:14px 20px;
border:none;
border-radius:12px;
background:#4f6cff;
color:white;
cursor:pointer;
}

.console{
margin-top:20px;
background:#0b1220;
padding:20px;
border-radius:16px;
border:1px solid #182238;
white-space:pre-wrap;
}

</style>

</head>

<body>

<div class="box">

<h2>CONSIA AUTOPILOT AGENTS</h2>

<input id="goal" placeholder="Objetivo para CONSIA">

<button onclick="run()">Ejecutar Autopilot</button>

<div id="console" class="console">
Autopilot listo.
</div>

</div>

<script src="agents-core.js"></script>
<script src="autopilot-core.js"></script>

<script>

function log(text){
const box=document.getElementById("console");
box.textContent += "\n" + text;
}

async function run(){

const goal=document.getElementById("goal").value;

log("Goal: "+goal);

const result = await CONSIA_AUTOPILOT.run(goal);

log("Plan generado:");

result.plan.forEach(step=>{
log("→ "+step.task+" | "+step.input);
});

log("Resultados:");

result.results.forEach(r=>{
log(r.step+" → "+r.result);
});

}

</script>

</body>
</html>
