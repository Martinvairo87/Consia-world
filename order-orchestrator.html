<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CONSIA Global Order Orchestrator</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0b0f1a;
color:white;
}

header{
padding:20px;
text-align:center;
font-size:28px;
letter-spacing:6px;
border-bottom:1px solid #1a2135;
}

#layout{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
padding:30px;
max-width:1400px;
margin:auto;
}

.panel{
background:#101626;
border-radius:12px;
padding:20px;
}

.table{
width:100%;
border-collapse:collapse;
}

.table th,.table td{
padding:10px;
border-bottom:1px solid #1a2135;
text-align:left;
font-size:14px;
}

.status{
padding:4px 10px;
border-radius:999px;
font-size:12px;
}

.pending{ background:#92400e; }
.processing{ background:#1d4ed8; }
.shipped{ background:#065f46; }
.delivered{ background:#10b981; }

button{
padding:10px 14px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

.metric{
font-size:28px;
color:#9ecbff;
margin-top:10px;
}

</style>
</head>

<body>

<header>CONSIA GLOBAL ORDER ORCHESTRATOR</header>

<div id="layout">

<div class="panel">

<h2>Orders</h2>

<table class="table">

<thead>
<tr>
<th>Order</th>
<th>Product</th>
<th>Supplier</th>
<th>Cost</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="orders"></tbody>

</table>

</div>

<div class="panel">

<h2>Engine Metrics</h2>

<div>

<div>Total Orders</div>
<div id="ordersCount" class="metric">0</div>

</div>

<div>

<div>Revenue</div>
<div id="revenue" class="metric">$0</div>

</div>

<div>

<div>Margin</div>
<div id="margin" class="metric">$0</div>

</div>

<button onclick="simulateOrder()">Create Order</button>

</div>

</div>

<script>

let orders=[]

function simulateOrder(){

const suppliers=[
"AliExpress Global",
"Alibaba Factory",
"Global Tech Supplier"
]

const products=[
"Wireless Headphones Pro",
"Smart Watch Ultra",
"Gaming Mouse RGB"
]

const supplier=suppliers[Math.floor(Math.random()*suppliers.length)]

const product=products[Math.floor(Math.random()*products.length)]

const cost=Math.floor(Math.random()*20)+10

const consiaPrice=cost*1.6

orders.push({

id:"ORD"+Math.floor(Math.random()*100000),

product,

supplier,

cost,

price:consiaPrice,

status:"pending"

})

render()

}

function updateStatus(i){

const states=["pending","processing","shipped","delivered"]

let current=states.indexOf(orders[i].status)

if(current<states.length-1){

orders[i].status=states[current+1]

}

render()

}

function render(){

const container=document.getElementById("orders")

container.innerHTML=""

let revenue=0
let margin=0

orders.forEach((o,i)=>{

revenue+=o.price
margin+=o.price-o.cost

const tr=document.createElement("tr")

tr.innerHTML=`

<td>${o.id}</td>

<td>${o.product}</td>

<td>${o.supplier}</td>

<td>$${o.cost}</td>

<td><span class="status ${o.status}">${o.status}</span></td>

<td>

<button onclick="updateStatus(${i})">

Update

</button>

</td>

`

container.appendChild(tr)

})

document.getElementById("ordersCount").innerText=orders.length
document.getElementById("revenue").innerText="$"+revenue
document.getElementById("margin").innerText="$"+margin

}

render()

</script>

</body>
</html>
