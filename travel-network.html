<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CONSIA GLOBAL TRAVEL NETWORK</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#050913;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
border-bottom:1px solid #1a2135;
}

#logo{
font-size:20px;
letter-spacing:6px;
}

#container{
max-width:1400px;
margin:auto;
padding:40px 20px;
}

h1{
font-size:44px;
}

textarea{
width:100%;
height:140px;
padding:16px;
border-radius:10px;
border:none;
background:#0d1424;
color:white;
font-size:16px;
}

button{
margin-top:15px;
padding:14px;
border:none;
border-radius:10px;
background:#2563eb;
color:white;
cursor:pointer;
}

.section{
margin-top:40px;
}

.card{
background:#101626;
border:1px solid #1a2135;
border-radius:12px;
padding:20px;
margin-top:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.price{
font-size:24px;
color:#3b82f6;
}

.book{
background:#10b981;
}

.panel{
margin-top:40px;
background:#101626;
border:1px solid #1a2135;
border-radius:12px;
padding:20px;
}

.network{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-top:20px;
}

.node{
background:#0d1424;
padding:20px;
border-radius:10px;
border:1px solid #1a2135;
text-align:center;
}

</style>

</head>

<body>

<header>

<div id="logo">CONSIA NETWORK</div>

<button onclick="home()">HOME</button>

</header>

<div id="container">

<h1>CONSIA Global Travel Network</h1>

<p>La red global de viajes impulsada por inteligencia artificial.</p>

<textarea id="prompt" placeholder="Ej: quiero viajar desde Buenos Aires a Italia 10 días con hoteles 4 estrellas y excursiones..."></textarea>

<button onclick="runNetwork()">Buscar viaje en la red global</button>

<div id="results"></div>

<div class="panel">

<h2>Red de proveedores</h2>

<div class="network">

<div class="node">Aerolíneas</div>
<div class="node">Hoteles</div>
<div class="node">Tours</div>

<div class="node">Agencias</div>
<div class="node">Transfers</div>
<div class="node">Experiencias</div>

</div>

</div>

</div>

<script>

function home(){
window.location="/"
}

async function runNetwork(){

const prompt=document.getElementById("prompt").value

const box=document.getElementById("results")

box.innerHTML="CONSIA analizando red global..."

try{

const res=await fetch("https://api.consia.world/travel/network",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
prompt
})

})

const data=await res.json()

render(data)

}catch(e){

box.innerHTML="Error generando resultados"

}

}

function render(data){

const box=document.getElementById("results")

box.innerHTML=""

if(data.plan){

box.innerHTML+=`

<div class="section">

<h2>Plan de viaje</h2>

<p>${data.plan}</p>

</div>

`

}

if(data.options){

data.options.forEach(o=>{

box.innerHTML+=`

<div class="card">

<div>

<h3>${o.title}</h3>

<p>${o.provider}</p>

</div>

<div>

<div class="price">$${o.price}</div>

<button class="book" onclick="book('${o.link}')">Reservar</button>

</div>

</div>

`

})

}

}

function book(link){
window.open(link,"_blank")
}

</script>

</body>

</html>
