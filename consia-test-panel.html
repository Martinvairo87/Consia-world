<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>CONSIA TEST PANEL PRO</title>

<style>

body{
background:#0a0a0a;
color:white;
font-family:system-ui;
padding:40px;
}

.panel{
background:#141414;
padding:25px;
border-radius:12px;
margin-bottom:20px;
}

button{
background:#00ff9c;
border:none;
padding:10px 18px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

input{
padding:10px;
font-size:16px;
width:300px;
}

pre{
background:#000;
padding:20px;
margin-top:15px;
border-radius:10px;
overflow:auto;
}

.status{
color:#00ff9c;
}

</style>

</head>

<body>

<h1>CONSIA TEST PANEL PRO</h1>

<div class="panel">

<h3>API Status</h3>

<button onclick="check()">Check CONSIA</button>

<pre id="status"></pre>

</div>

<div class="panel">

<h3>Chat Test</h3>

<input id="msg" value="Hola CONSIA">

<button onclick="send()">Enviar</button>

<pre id="chat"></pre>

</div>

<div class="panel">

<h3>Latency Test</h3>

<button onclick="latency()">Test velocidad</button>

<pre id="lat"></pre>

</div>

<script>

async function check(){

const r = await fetch("https://api.consia.world/")
const data = await r.json()

document.getElementById("status").textContent =
JSON.stringify(data,null,2)

}

async function send(){

const start = Date.now()

const r = await fetch("https://api.consia.world/v1/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
user_id:"martin",
message:document.getElementById("msg").value
})
})

const data = await r.json()

const end = Date.now()

data.latency_ms = end-start

document.getElementById("chat").textContent =
JSON.stringify(data,null,2)

}

async function latency(){

const start = Date.now()

await fetch("https://api.consia.world/health")

const end = Date.now()

document.getElementById("lat").textContent =
"Latency: "+(end-start)+" ms"

}

</script>

</body>
</html>
