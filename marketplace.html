<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CONSIA Marketplace</title>

<style>

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0b0f1a;
color:white;
}

header{
padding:20px;
text-align:center;
font-size:28px;
letter-spacing:6px;
border-bottom:1px solid #1a2135;
}

#searchbar{
padding:15px;
display:flex;
justify-content:center;
gap:10px;
border-bottom:1px solid #1a2135;
}

#search{
width:400px;
max-width:80%;
padding:10px;
border-radius:8px;
border:none;
background:#101626;
color:white;
}

#categories{
display:flex;
justify-content:center;
gap:12px;
padding:12px;
border-bottom:1px solid #1a2135;
flex-wrap:wrap;
}

.cat{
padding:6px 14px;
background:#141b2e;
border-radius:20px;
cursor:pointer;
font-size:13px;
}

.cat.active{
background:#2563eb;
}

#products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:20px;
padding:30px;
max-width:1200px;
margin:auto;
}

.card{
background:#101626;
border-radius:12px;
padding:18px;
text-align:center;
transition:transform .2s;
}

.card:hover{
transform:scale(1.03);
}

.price{
color:#9ecbff;
font-size:18px;
margin-top:8px;
}

button{
margin-top:10px;
padding:10px 16px;
border:none;
border-radius:8px;
background:#2563eb;
color:white;
cursor:pointer;
}

#cart{
position:fixed;
right:0;
top:0;
width:320px;
height:100%;
background:#060912;
border-left:1px solid #1a2135;
padding:20px;
overflow:auto;
}

#cart h3{
margin-top:0;
}

.cartItem{
margin-bottom:10px;
font-size:14px;
}

.checkout{
margin-top:20px;
padding:12px;
width:100%;
background:#10b981;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<header>CONSIA MARKETPLACE</header>

<div id="searchbar">

<input id="search" placeholder="Buscar productos..." onkeyup="filterProducts()">

</div>

<div id="categories">

<div class="cat active" onclick="setCategory('all',event)">All</div>
<div class="cat" onclick="setCategory('app',event)">Apps</div>
<div class="cat" onclick="setCategory('agent',event)">Agents</div>
<div class="cat" onclick="setCategory('tool',event)">Tools</div>
<div class="cat" onclick="setCategory('prompt',event)">Prompts</div>

</div>

<div id="products"></div>

<div id="cart">

<h3>Cart</h3>

<div id="cartItems"></div>

<div>Total: $<span id="total">0</span></div>

<button class="checkout" onclick="checkout()">Checkout</button>

</div>

<script>

let category="all"
let cart=[]

const products=[

{
name:"AI Marketing Generator",
desc:"Genera campañas completas con IA",
price:9,
type:"app"
},

{
name:"Real Estate AI Agent",
desc:"Agente para ventas inmobiliarias",
price:19,
type:"agent"
},

{
name:"Prompt Pack Business",
desc:"Pack de prompts para negocios",
price:5,
type:"prompt"
},

{
name:"Image Creator PRO",
desc:"Generador avanzado de imágenes",
price:12,
type:"tool"
},

{
name:"SEO AI Toolkit",
desc:"Optimización SEO automática",
price:15,
type:"tool"
},

{
name:"CONSIA Sales Agent",
desc:"Agente automático de ventas",
price:25,
type:"agent"
}

]

function render(){

const container=document.getElementById("products")
container.innerHTML=""

products.forEach(p=>{

if(category!=="all" && p.type!==category) return

const div=document.createElement("div")

div.className="card"

div.innerHTML=`
<h3>${p.name}</h3>
<p>${p.desc}</p>
<div class="price">$${p.price}</div>
<button onclick="addCart('${p.name}',${p.price})">Add</button>
`

container.appendChild(div)

})

}

function setCategory(c,e){

category=c

document.querySelectorAll(".cat")
.forEach(el=>el.classList.remove("active"))

e.target.classList.add("active")

render()

}

function addCart(name,price){

cart.push({name,price})
updateCart()

}

function updateCart(){

const items=document.getElementById("cartItems")
items.innerHTML=""

let total=0

cart.forEach(i=>{

const div=document.createElement("div")

div.className="cartItem"

div.innerText=i.name+" - $"+i.price

items.appendChild(div)

total+=i.price

})

document.getElementById("total").innerText=total

}

function checkout(){

alert("Checkout iniciado")

}

function filterProducts(){

const q=document.getElementById("search").value.toLowerCase()
const cards=document.querySelectorAll(".card")

cards.forEach(c=>{

const t=c.innerText.toLowerCase()

c.style.display=t.includes(q)?"block":"none"

})

}

render()

</script>

</body>
</html>
